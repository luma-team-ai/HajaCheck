      required: [success, data, error]
      properties:
        success: { type: boolean }
        data:
          nullable: true
          oneOf:
            - { $ref: "#/components/schemas/DefectDetailItem" }
        error:
          nullable: true
          oneOf:
            - { $ref: "#/components/schemas/ApiError" }

    DefectRevisionRequest:
      type: object
      additionalProperties: false
      description: >
