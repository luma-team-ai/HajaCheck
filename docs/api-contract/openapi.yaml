        type:
          type: array
          uniqueItems: true
          items: { $ref: "#/components/schemas/DefectTypeCode" }
        grade:
          type: array
          uniqueItems: true
          items: { $ref: "#/components/schemas/DefectGradeCode" }
        status:
          type: array
          uniqueItems: true
          items: { $ref: "#/components/schemas/DefectStatusCode" }
        confidenceMin:
