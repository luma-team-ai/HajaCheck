openapi: 3.0.3
info:
  title: hajaCheck API
  version: "0.15.0-draft"
  description: >
    Contract-First 초안 (PRD §6, §8). 실제 소스 오브 트루스는 이 파일.
    2026-07-23 마이페이지 "내 플랜" Figma 리디자인 + 모의 결제(#711) — MyPlanResponse.plan에
    nextBillingDate(유료 플랜만, startedAt KST 기준 +1개월)·businessVerified(회사 구독만, Company.
    verificationStatus==VERIFIED) 추가. POST /api/me/plan/checkout 신설 — PG 실결제 없는 모의 결제로
    기존 ACTIVE(또는 UPGRADE_REQUESTED) 구독을 만료시키고 대상 요금제(STANDARD/ENTERPRISE만)로 신규
    ACTIVE 구독을 발급한다(멱등, 소유자만, AdminPlanService#changePlan과 동일 전이 패턴).
    2026-07-23 보고서 근거 재검증(구조 검증) API(#680 / HAJA-374) — POST /api/reports/{id}/grounding-recheck
    명세 추가.
    2026-07-23 플랫폼 관리자 플랜 정책 설정 API(#624 후속, 사용자 지시) 추가 — GET/PUT
    /api/platform-admin/plans. plans 테이블(FREE/STANDARD/ENTERPRISE)을 조회 전용에서 편집 가능하게
    전환(PLATFORM_ADMIN 전용). PUT은 3개 플랜을 한 번에 원자적으로 교체(부분 업데이트 없음), hasAiAddon은
    편집 대상 아님(요청에 없어도 기존값 유지).
    2026-07-23 플랫폼 관리자 플랜·쿼터 관리 API(#624) 추가 — /api/platform-admin/plans-quota 및
    PlatformAdminPlanQuota* 스키마. companyId 스코프 없이 전사 사용자별 소속 회사 플랜을 나열(#507 재사용,
    상속 규칙만 걷어냄). companyId/companyName 필드 추가, keyword 검색에 기업명 포함, plan 필터 추가
    (사용자 지시, 표에 기업 컬럼 노출 + 플랜별 검색 요구).
    2026-07-23 시설 소유 범위를 사용자에서 회사로 전환(#637 / HAJA-353) — FacilityResponse의
    ownerId를 제거하고 시설·점검·하자·보고서 경유 접근을 인증 사용자의 companyId 범위로 통일.
    2026-07-22 OCR 개업일자 추출(#598 / HAJA-338) — /ai/business-license-ocr 및 공개 프록시 응답에
    businessStartDate(ISO date, nullable) 추가. 국세청 진위확인(#596)에 사용.
    2026-07-22 기업가입에 businessStartDate(개업일자, 필수) 추가(#596 / HAJA-337) — 국세청 진위확인
    (번호+대표자명+개업일자) 연동. verificationStatus 실제 배선(VERIFIED/PENDING).
    2026-07-22 사업자등록증 OCR 공개 프록시(#557 / HAJA-324) — /api/auth/business-license/ocr(비로그인
    multipart) 추가: 파일검증(jpeg/png·10MB·매직바이트)→base64→ai-server 프록시, rate-limit(분당+일일 절대캡).
    2026-07-22 사업자등록증 OCR 실구현(#552 / HAJA-321) — /ai/business-license-ocr 를 stub 에서
    RapidOCR(한국어 인식)+LLM 파싱 실동작으로 교체(image_base64 필수·max_length, raw=집계값, stub=false).
    2026-07-22 관리자 플랜·쿼터 관리 API(#507) 추가 — /api/admin/plans, /api/admin/plan,
    /api/admin/plan/history, /api/admin/plan-quota 및 AdminPlan* 스키마.
    /api/admin/plan/history 에 page/size 페이지네이션 추가(PR#525 머신 리뷰 P3).
    2026-07-21 명세-구현 동기화 — 멤버십·계정복구·대시보드·AI프록시·OCR 추가, 보고서 API를 #455 구현 기준으로
    재작성(#498).
    2026-07-19 GET /api/notifications(AP-020, #25 / HAJA-38 FR-9) 계약 추가.
    2026-07-18 미릴리스 draft baseline을 현재 구현에 맞게 정정했다.
    구현된 엔드포인트(ai-server)는 실행 후 /docs(Swagger UI)에서 최신본 재확인 가능.
    나머지(Spring Boot)는 각 담당자가 이 파일에 스펙을 채워나감 — 임의로 필드명·구조를 바꾸지 말 것.
servers:
  - url: /api
    description: Spring Boot (백엔드)
  - url: /ai
    description: >
      FastAPI (ai-server) — **내부 전용**. 외부 공개 안 됨(nginx 공개 `/ai/` 제거, #236).
      스프링 `/api/ai/*` 프록시만 호출하며 `X-Internal-Key`(env `AI_INTERNAL_KEY`) 검증(설정 시 불일치 401, `/health` 제외).
      프론트는 이 서버를 직접 호출하지 않음 → `/api/ai/*`(세션 인증) 경유. 상세 `contract.md` §접근 모델.

paths:
  /health:
    get:
      summary: 헬스체크
      tags: [common]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }

  /ai/ping:
    get:
      summary: AI 서버 envelope 동작 확인
      tags: [ai]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AIResponse" }

  /ai/defect-explain:
    post:
      summary: AI 하자 원인·조치방안 설명 (FR-4 P1, 점검관리B)
      tags: [ai]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DefectExplainRequest" }
      responses:
        "200":
          description: 성공/실패 모두 200 — success 필드로 구분(AI_개발_컨벤션.md §4 표준 폴백)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AIResponse" }

  /ai/grounding-check:
    post:
      summary: 환각 방어 게이트 — 생성물 주장 수치·등급을 실측 defects와 코드로 대조 (HAJA-117)
      description: >
        LLM 호출 없음 — 결정론적 코드 대조. `ai-server/routers/ai_router.py` 구현됨(약 58~65행).
      tags: [ai]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/GroundingCheckRequest" }
      responses:
        "200":
          description: 성공/실패 모두 200 — success 필드로 구분
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AIResponse" }

  /ai/briefing:
    post:
      summary: 대시보드 AI 주간 브리핑 (대시보드 P1)
      description: >
        현황 데이터(코드 집계) → 자연어 요약. 전주 대비 변화율·추세는 코드로 계산해 프롬프트에 주입하고
        LLM은 자연어만 생성(수치 환각 방지). `ai-server/routers/ai_router.py` 구현됨(약 68~75행).
      tags: [ai]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DashboardStats" }
      responses:
        "200":
          description: 성공/실패 모두 200 — success 필드로 구분
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AIResponse" }

  /ai/report:
    post:
      summary: AI 보고서 4개 섹션 병렬 생성 및 Grounding Check (FR-5, 로그인/보고서 담당)
      description: >
        구현된 내부 전용 FastAPI 라우트다. 외부 클라이언트는 인증된 Spring `/api/ai/report`
        프록시를 경유한다. grounding_request_id, inspection_id, report_version은 모두 제공하거나
        모두 생략해야 한다. 모두 생략하면 기존 호환 경로로 처리되어 응답의 correlation 필드와
        content_hash도 생략된다. 모두 제공하면 같은 correlation 값과 보고서 본문의 canonical JSON
        SHA-256 content_hash를 반환한다. 현재 Spring 프록시는 이 값을 서버에서 강제 생성하지 않고
        요청 값을 전달하므로, correlation은 선택적 무결성 대조 계약이며 권한·귀속 보장은 아니다.
      x-internal: true
      security:
        - InternalKey: []
      tags: [ai]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ReportGenerateRequest" }
      responses:
        "200":
          description: 성공 또는 AI/보고서 검증 실패 — success 필드로 구분
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReportAIResponse" }
        "422":
          description: >
            요청 모델 검증 실패. correlation 필드 일부 입력, 빈 grounding_request_id,
            1 미만 inspection_id/report_version 등이 해당하며 FastAPI detail[] 형식으로 반환한다.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FastApiValidationError" }

  /ai/rag-chat:
    post:
      summary: RAG 챗봇 질의 (FR-6, 고객지원)
      description: >
        (계획/미구현, 내부 전용) Spring Boot가 인증 사용자 소유이면서 session_type=RAG인
        세션인지 검증한 뒤 호출한다. 존재하지 않거나 타인 소유인 세션은 Spring Boot가
        동일하게 404로 처리하며 FastAPI를 호출하지 않는다. 프론트엔드는 이 엔드포인트를
        직접 호출하지 않는다. Spring Boot는 환경변수로 주입된 내부 서비스 토큰을
        X-Internal-Service-Token 헤더로 전달하고 FastAPI는 누락 또는 불일치 요청을 거부한다.
        운영 nginx는 이 경로를 FastAPI로 직접 프록시하지 않는다. 성공 시 AIResponse.data는 RagAnswerData(answer, sources[])
        형태이며, sources[]는 문서명·컬렉션·표시 라벨·원문 발췌·Chroma 청크 참조를 포함한다.
      x-internal: true
      security:
        - InternalServiceToken: []
      tags: [ai]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [question, session_id]
              properties:
                question: { type: string, example: "균열 보수 기준은 무엇인가요?" }
                session_id:
                  type: integer
                  format: int64
                  description: Spring Boot가 소유권과 RAG 세션 유형을 검증한 서버 관리 식별자
                  example: 42
      responses:
        "200":
          description: 성공/실패 모두 200 — success 필드로 구분
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AIResponse" }

  /ai/nl-search:
    post:
      summary: 자연어 질의를 하자 필터로 변환 (HAJA-120, 계획/미구현)
      description: >
        Spring Boot의 공개 POST /api/defects/nl-search 게이트웨이만 호출하는 내부 전용 경로다.
        FastAPI는 X-Internal-Service-Token이 누락되거나 일치하지 않으면 LLM 호출 전에 거부한다.
        DB를 조회하지 않고 질의를 NlSearchResult로 변환하며, 입력 검증 및 LLM 실패도 공통
        AIResponse envelope으로 반환한다. 운영 nginx는 이 경로를 외부에 직접 노출하지 않는다.
      x-internal: true
      security:
        - InternalServiceToken: []
      tags: [ai, defect]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/NlSearchRequest" }
      responses:
        "200":
          description: 성공 또는 VALIDATION_ERROR/LLM 오류 — success 필드로 구분
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NlSearchAIResponse" }
        "401":
          description: X-Internal-Service-Token 누락 또는 불일치
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AIResponse" }

  /ai/business-license-ocr:
    post:
      summary: 사업자등록증 OCR (RapidOCR 실구현, #552 / HAJA-321)
      description: >
        `image_base64`(사업자등록증 이미지)를 RapidOCR(ONNXRuntime, 한국어 PP-OCR 인식 모델)로
        텍스트 추출 후 LLM structured output 으로 {businessRegistrationNumber, companyName,
        representativeName} 을 파싱해 반환한다. `image_base64` 필수(없으면 VALIDATION_ERROR),
        `file_ref` 는 아직 미구현(값이 와도 무시). OCR/모델로드/LLM 파싱 실패는 예외를 삼키지 않고
        서버 로그에 스택만 남긴 뒤(OCR 원문·개인정보는 로깅하지 않음) LLM_INVALID_OUTPUT 으로 반환 →
        클라이언트는 수동 입력으로 폴백한다. 내부 전용이며 X-Internal-Key 검증 대상이다.
      x-internal: true
      x-status: implemented
      security:
        - InternalKey: []
      tags: [ai]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BusinessLicenseOcrRequest" }
      responses:
        "200":
          description: >
            OCR 성공 시 success=true + 추출 필드(인식 실패한 필드는 null). 입력 검증/처리 실패 시
            success=false + error(VALIDATION_ERROR·LLM_INVALID_OUTPUT).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BusinessLicenseOcrAIResponse" }

  /api/ai/defect-explain:
    post:
      summary: 하자 원인·조치방안 설명 (인증 프록시, #228 / HAJA-188)
      description: >
        로그인 사용자 요청을 세션 인증 프록시로 내부 FastAPI `/ai/defect-explain` 에 전달한다(내부 호출은
        X-Internal-Key 부착). 요청 JSON 키는 FastAPI 계약과 동일하게 snake_case 유지
        (defect_type/severity_grade/location/facility_type). `AiProxyController.defectExplain` 구현됨.
      security:
        - SessionCookie: []
          XsrfToken: []
      tags: [ai]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DefectExplainRequest" }
      responses:
        "200":
          description: 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DefectExplainApiResponse" }
        "400":
          description: INVALID_INPUT | AI_REQUEST_REJECTED
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "401":
          description: 미인증 (UNAUTHORIZED)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "502":
          description: AI_INVALID_RESPONSE | AI_SERVER_ERROR — 내부 FastAPI 오류를 그대로 전달하지 않고 이 코드로 통일
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "503":
          description: AI_SERVER_UNREACHABLE
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "504":
          description: AI_SERVER_TIMEOUT
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }

  /api/ai/report:
    post:
      summary: AI 보고서 생성 (인증 프록시, #239 / HAJA-192)
      description: >
        확정된 하자 목록을 세션 인증 프록시로 내부 FastAPI `/ai/report` 에 전달해 개요·요약·상세·권고
        보고서를 반환한다. correlation 필드(grounding_request_id/inspection_id/report_version)는 모두
        제공하거나 모두 생략해야 한다(내부 ReportGenerateRequest 와 동일 계약). 실무에서는
        `POST /api/inspections/{inspectionId}/reports`(ReportController.generateDraft) 가 이 프록시를 내부
        호출해 grounding 캡처까지 포함한 전체 흐름을 담당한다 — 이 엔드포인트 자체를 프론트가 직접 호출하는
        경로는 별도다. `AiProxyController.report` 구현됨.
      security:
        - SessionCookie: []
          XsrfToken: []
      tags: [ai, report]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ReportGenerateRequest" }
      responses:
        "200":
          description: 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReportGenerateApiResponse" }
        "400":
          description: INVALID_INPUT | AI_REQUEST_REJECTED
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "401":
          description: 미인증 (UNAUTHORIZED)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "502":
          description: AI_INVALID_RESPONSE | AI_SERVER_ERROR
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "503":
          description: AI_SERVER_UNREACHABLE
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "504":
          description: AI_SERVER_TIMEOUT
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }

  /api/ai/briefing:
    post:
      summary: AI 주간 브리핑 (인증 프록시, 대시보드 P1, #248 / HAJA-197)
      description: >
        로그인 사용자 소유 범위로 대시보드 현황(BriefingStatsService)을 집계해 세션 인증 프록시로 내부
        FastAPI `/ai/briefing` 에 전달하고 자연어 브리핑 카드를 반환한다. 요청 바디 없음(집계는 서버가
        인증 주체 기준으로 수행 — cross-owner IDOR 방지). `AiProxyController.briefing` 구현됨.
      security:
        - SessionCookie: []
          XsrfToken: []
      tags: [ai, dashboard]
      responses:
        "200":
          description: 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BriefingApiResponse" }
        "401":
          description: 미인증 (UNAUTHORIZED)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "502":
          description: AI_INVALID_RESPONSE | AI_SERVER_ERROR
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "503":
          description: AI_SERVER_UNREACHABLE
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "504":
          description: AI_SERVER_TIMEOUT
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }

  /api/auth/companies:
    post:
      summary: 기업 회원가입 (multipart/form-data)
      description: >
        User(passwordHash·ACTIVE) + Company(PENDING_REVIEW) + UserConsent(약관 2건) 원자 생성.
        `CompanySignupController.signup` 구현됨. 검증 실패는 401 금지(400/404/409만 사용).
      tags: [auth]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema: { $ref: "#/components/schemas/CompanySignupRequest" }
      responses:
        "201":
          description: 가입 신청 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CompanySignupApiResponse" }
        "409":
          description: AUTH_EMAIL_DUPLICATED | AUTH_BUSINESS_NUMBER_DUPLICATED
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "400":
          description: FILE_REQUIRED | FILE_INVALID_TYPE | FILE_TOO_LARGE | INVALID_INPUT
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }

  /api/auth/business-license/ocr:
    post:
      summary: 사업자등록증 OCR (공개 프록시, multipart/form-data)
      description: >
        기업 가입 전(비로그인) 화면에서 사업자등록증 이미지를 업로드하면 사업자번호·상호·대표자명을 인식해
        자동채움용으로 반환한다. 파일검증(jpeg/png 매직바이트·10MB) 후 base64로 내부 ai-server
        `/ai/business-license-ocr`(X-Internal-Key)에 프록시한다. `BusinessLicenseOcrController.ocr` 구현됨.
        보조 기능이라 인식 실패해도 가입은 수동 입력으로 진행 가능. `/api/auth/**` permitAll(비로그인).
        rate-limit(전역 분당 + 일일 절대캡) 적용.
      tags: [auth]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [businessRegistrationFile]
              properties:
                businessRegistrationFile:
                  type: string
                  format: binary
                  description: 사업자등록증 이미지(jpeg/png, 최대 10MB)
      responses:
        "200":
          description: 인식 성공(인식 실패한 필드는 null — FE 수동 입력 폴백)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BusinessLicenseOcrProxyApiResponse" }
        "400":
          description: FILE_REQUIRED | FILE_INVALID_TYPE | FILE_TOO_LARGE
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "429":
          description: AUTH_TOO_MANY_REQUESTS (분당/일일 rate-limit 초과)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "5XX":
          description: >
            ai-server 실패 — AI_INVALID_RESPONSE·AI_SERVER_ERROR(502) | AI_SERVER_UNREACHABLE(503)
            | AI_SERVER_TIMEOUT(504). FE 수동 입력 폴백.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }

  /api/auth/email-availability:
    get:
      summary: 이메일(아이디) 중복확인
      description: "`CompanySignupController.checkEmailAvailability` 구현됨."
      tags: [auth]
      parameters:
        - name: email
          in: query
          required: true
          schema: { type: string, format: email }
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EmailAvailabilityApiResponse" }

  /api/auth/companies/status:
    get:
      summary: 가입 상태 조회 (승인 대기 화면 새로고침)
      description: "`CompanySignupController.getSignupStatus` 구현됨. token=signupToken(불투명 문자열)."
      tags: [auth]
      parameters:
        - name: token
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SignupStatusApiResponse" }
        "404":
          description: AUTH_SIGNUP_TOKEN_INVALID
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }

  /api/auth/id-inquiry:
    post:
      summary: 아이디(이메일) 찾기
      description: >
        사업자등록번호 + (대표자명|상호명 최소 1개) 매칭 → 마스킹 이메일. 계정 열거 방지를 위해
        무매칭 시 통일 메시지. `AccountRecoveryController.findId` 구현됨.
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/FindIdRequest" }
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FindIdApiResponse" }
        "404":
          description: AUTH_ACCOUNT_NOT_FOUND
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }

  /api/auth/password-reset-request:
    post:
      summary: 비밀번호 재설정 링크 발송 요청 (1단계, #194 / HAJA-172)
      description: >
        계정 존재 여부와 무관하게 항상 동일한 200 {requested:true}를 반환한다(계정 열거 방지). 계정이
        존재하고 비밀번호 로그인이 가능한 상태(hasPassword && !suspended)일 때만 실제로 메일을 비동기
        발송하며, 그 사실은 응답에 드러나지 않는다. resetToken은 응답에 절대 포함하지 않고 메일로만
        전달한다. `AccountRecoveryController.requestPasswordResetLink` 구현됨.
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PasswordResetLinkRequest" }
      responses:
        "200":
          description: 요청 접수 성공(계정 존재 여부와 무관하게 항상 동일)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PasswordResetLinkApiResponse" }
        "400":
          description: INVALID_INPUT(이메일 형식 오류)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "429":
          description: AUTH_TOO_MANY_REQUESTS(이메일 축 또는 전역 상한 초과)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }

  /api/auth/password-reset:
    post:
      summary: 새 비밀번호 설정 (2단계, #194 / HAJA-172)
      description: >
        메일 링크의 1회용 토큰을 소비해 비밀번호를 변경한다. 토큰은 조회 즉시 삭제되며(Redis 원자적
        consume), 무효·만료·이미 사용됨·발급 후 계정 상태 변경(정지·소셜 전용 전환) 모두 구분 없이
        AUTH_RESET_TOKEN_INVALID(400)로 통일 응답한다. 비밀번호 정책 위반(DTO 검증 실패)은 토큰을
        소비하지 않고 INVALID_INPUT(400)만 반환한다. `AccountRecoveryController.resetPassword` 구현됨.
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PasswordResetRequest" }
      responses:
        "200":
          description: 재설정 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PasswordResetApiResponse" }
        "400":
          description: INVALID_INPUT(비밀번호 정책 위반) | AUTH_RESET_TOKEN_INVALID(토큰 무효·만료·사용됨)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }

  # ── 아래는 계획 단계(경로안) — 각 담당자가 구현 시 requestBody/responses 채울 것 ──

  /api/auth/login:
    post:
      summary: 자체(기업 email/password) 로그인
      description: >
        loginId(=email)/password 로 인증. 성공 시 세션 쿠키(SESSION) 발급.
        실패는 계정 열거 방지를 위해 id/pw/미존재/잠금 구분 없이 401 AUTH_INVALID_CREDENTIALS 로 통일.
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: 로그인 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserApiResponse" }
        "401":
          description: 인증 실패 (AUTH_INVALID_CREDENTIALS)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }

  /api/auth/logout:
    post:
      summary: 로그아웃
      description: 세션 무효화 + SecurityContext clear
      tags: [auth]
      responses:
        "200":
          description: 로그아웃 성공 (data=null)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VoidApiResponse" }

  /api/auth/oauth2/{provider}:
    get:
      summary: 소셜 로그인 시작 (Kakao/Google)
      description: >
        브라우저를 이 경로로 이동시키면 제공자 인가 화면으로 302 리다이렉트된다.
        인가 완료 후 서버가 콜백(/login/oauth2/code/{provider})을 처리하고,
        성공 시 app.oauth2.success-redirect, 실패 시 failure-redirect(프론트)로 리다이렉트한다.
      tags: [auth]
      parameters:
        - name: provider
          in: path
          required: true
          schema: { type: string, enum: [kakao, google] }
      responses:
        "302": { description: 제공자 인가 화면 또는 프론트로 리다이렉트 }

  /api/users/me:
    get:
      summary: 내 정보 조회
      description: 세션의 인증 사용자 정보 반환. 미인증 시 401 UNAUTHORIZED(JSON).
      tags: [auth]
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserApiResponse" }
        "401":
          description: 미인증 (UNAUTHORIZED)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }

  /api/me/plan:
    get:
      summary: 내 플랜 + 사용량 조회 (마이페이지, HAJA-177)
      description: >
        구독 소유 판별은 companyId 있으면 회사 구독(user_plans.company_id), 없으면 개인 구독(user_plans.user_id).
        "현재 구독"은 ACTIVE 우선, 없으면 UPGRADE_REQUESTED 순으로 조회하고 둘 다 없으면(EXPIRED 만 존재)
        PLAN_NOT_FOUND(404)다. limits.* 는 plans.max_* 가 null(무제한)이면 null 을 그대로 반환한다.
        `MembershipController.getMyPlan` 구현됨.
      security:
        - SessionCookie: []
      tags: [membership]
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MyPlanApiResponse" }
        "401":
          description: 미인증 (UNAUTHORIZED)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "404":
          description: 활성 구독 없음 (PLAN_NOT_FOUND)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }

  /api/me/seats:
    get:
      summary: 좌석 현황 조회 (마이페이지, HAJA-177)
      description: >
        개인 사용자(companyId=null)는 본인 1인만 담은 좌석 목록을 반환한다. 회사 소속 사용자는 회사 소속
        ACTIVE 사용자 목록(최대 200건, MEMBERSHIP_SEATS_MAX)을 반환하되 used(총원 수)는 이 상한과 무관하게
        정확한 count 쿼리로 산출한다. 이메일은 비마스킹(동일 회사 소속만 조회 가능한 내부 명부이므로).
        `MembershipController.getSeats` 구현됨.
      security:
        - SessionCookie: []
      tags: [membership]
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SeatsApiResponse" }
        "401":
          description: 미인증 (UNAUTHORIZED)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "404":
          description: 활성 구독 없음 (PLAN_NOT_FOUND)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }

  /api/me/plan/checkout:
    post:
      summary: 모의 결제 — 플랜 업그레이드 (마이페이지, #711)
      description: >
        PG 실결제·카드청구 없는 테스트 수준 모의 결제. 기존 ACTIVE(또는 UPGRADE_REQUESTED) 구독을
        만료(EXPIRED)시키고 대상 요금제로 신규 ACTIVE 구독을 발급한다(단일 트랜잭션,
        AdminPlanService#changePlan과 동일 전이 패턴). 대상이 이미 ACTIVE 구독과 같으면 멱등 no-op(200).
        회사 구독은 company.ownerUserId만, 개인 구독은 그 구독의 소유 사용자만 요청할 수 있다
        (PLAN_FORBIDDEN). 대상 플랜은 STANDARD/ENTERPRISE만 허용 — FREE 요청은 INVALID_INPUT(400).
        동시 결제 경합(부분 UQ 위반)은 PLAN_ACTIVE_SUBSCRIPTION_CONFLICT(409).
        `MembershipController.checkout` 구현됨.
      security:
        - SessionCookie: []
          XsrfToken: []
      tags: [membership]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [planName]
              properties:
                planName: { type: string, enum: [STANDARD, ENTERPRISE], example: ENTERPRISE }
      responses:
        "200":
          description: 결제(플랜 전이) 성공 — 갱신된 내 플랜 반환
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MyPlanApiResponse" }
        "400":
          description: FREE 대상 요청 등 잘못된 입력 (INVALID_INPUT)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "401":
          description: 미인증 (UNAUTHORIZED)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "403":
          description: 구독 소유자 아님 (PLAN_FORBIDDEN)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "404":
          description: 활성 구독 없음 (PLAN_NOT_FOUND)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "409":
          description: 동시 결제 경합 (PLAN_ACTIVE_SUBSCRIPTION_CONFLICT)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }

  /api/me/plan/upgrade-inquiry:
    post:
      summary: 업그레이드 문의 (마이페이지, HAJA-177)
      description: >
        PG 실결제 대체 — 구독 상태를 UPGRADE_REQUESTED 로 전이한다(멱등). 회사 구독은 회사 대표
        (company.ownerUserId)만, 개인 구독은 그 구독의 소유 사용자만 요청할 수 있다(PLAN_FORBIDDEN).
        `MembershipController.requestUpgrade` 구현됨.
      security:
        - SessionCookie: []
          XsrfToken: []
      tags: [membership]
      responses:
        "200":
          description: 문의 접수 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UpgradeInquiryApiResponse" }
        "401":
          description: 미인증 (UNAUTHORIZED)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "403":
          description: 구독 소유자 아님 (PLAN_FORBIDDEN)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "404":
          description: 활성 구독 없음 (PLAN_NOT_FOUND)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }

  /api/admin/plans:
    get:
      summary: 요금제 카탈로그 조회 (관리자 플랜·쿼터, FR-8-A #507)
      description: >
        제공 중인 전체 요금제 목록(플랜 변경 선택지). ADMIN 전용 — `/api/admin/**` 는 SecurityConfig 필터에서
        hasRole(ADMIN) 로 강제한다. `AdminPlanController.getPlanCatalog` 구현됨.
      security:
        - SessionCookie: []
      tags: [admin]
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminPlanCatalogApiResponse" }
        "401":
          description: 미인증 (UNAUTHORIZED)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "403":
          description: ADMIN 아님 (FORBIDDEN)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }

  /api/admin/plan:
    get:
      summary: 현재 회사 플랜 + 사용량 조회 (관리자 플랜·쿼터, FR-8-A #507)
      description: >
        요청 관리자 회사(company_id)의 현재 구독 요금제·한도와 이번 달 사용량(월 분석 장수 등). 회사 스코프는
        서비스가 company_id 로 강제하며, 그 회사에 유효한 승인 멤버십이 없으면(§2.6 미승인 멤버십은 상속 대상
        아님) 회사 플랜을 상속하지 않아 PLAN_NOT_FOUND(404)다. companyId 없는 관리자는 PLAN_FORBIDDEN(403).
        `AdminPlanController.getCurrentPlan` 구현됨.
      security:
        - SessionCookie: []
      tags: [admin]
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminPlanApiResponse" }
        "401":
          description: 미인증 (UNAUTHORIZED)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "403":
          description: ADMIN 아님 / 회사 없는 관리자 (FORBIDDEN / PLAN_FORBIDDEN)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "404":
          description: 상속 가능한 활성 구독 없음 (PLAN_NOT_FOUND)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
    patch:
      summary: 회사 플랜 변경 (관리자 플랜·쿼터, FR-8-A #507)
      description: >
        요청 관리자 회사의 구독 요금제를 변경한다 — 기존 ACTIVE(또는 UPGRADE_REQUESTED) 구독을 EXPIRED 로
        내리고 신규 ACTIVE 구독을 발급하는 단일 트랜잭션 전이(table_design.md §user_plans). 변경 이력은
        user_plans 행으로 보존되어 `/api/admin/plan/history` 로 조회한다. 대상이 현재와 같고 이미 ACTIVE 면
        멱등 no-op(200, 이력 추가 없음). 동시 변경 경합은 PLAN_ACTIVE_SUBSCRIPTION_CONFLICT(409).
        `AdminPlanController.changePlan` 구현됨.
      security:
        - SessionCookie: []
          XsrfToken: []
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AdminPlanChangeRequest" }
      responses:
        "200":
          description: 변경 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminPlanApiResponse" }
        "400":
          description: 잘못된 요금제명 (INVALID_INPUT)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "401":
          description: 미인증 (UNAUTHORIZED)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "403":
          description: ADMIN 아님 / 회사 없는 관리자 (FORBIDDEN / PLAN_FORBIDDEN)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "404":
          description: 상속 가능한 활성 구독 없음 (PLAN_NOT_FOUND)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "409":
          description: 동시 변경 경합 (PLAN_ACTIVE_SUBSCRIPTION_CONFLICT)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }

  /api/admin/plan/history:
    get:
      summary: 회사 플랜 변경 이력 조회 (관리자 플랜·쿼터, FR-8-A #507)
      description: >
        요청 관리자 회사의 구독 변경 이력(요금제·기간·상태)을 최신 순으로 반환한다 — 각 항목이 user_plans 행
        하나이며 startedAt/endedAt·planName·status 로 "이전값→이후값·언제"를 표현한다.
        `AdminPlanController.getHistory` 구현됨. page 는 1부터 시작(PR#525 머신 리뷰 P3 반영 — 이력이
        무한정 누적되는 문제로 plan-quota 와 동일한 페이지네이션 계약을 추가했다).
      security:
        - SessionCookie: []
      tags: [admin]
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1, minimum: 1 }
        - name: size
          in: query
          schema: { type: integer, default: 20, minimum: 1, maximum: 100 }
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminPlanHistoryApiResponse" }
        "401":
          description: 미인증 (UNAUTHORIZED)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "403":
          description: ADMIN 아님 / 회사 없는 관리자 (FORBIDDEN / PLAN_FORBIDDEN)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "404":
          description: 상속 가능한 활성 구독 없음 (PLAN_NOT_FOUND)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }

  /api/admin/plan-quota:
    get:
      summary: 회사 멤버별 쿼터 사용 현황 조회 (관리자 플랜·쿼터, FR-8-A #507, frontend #508)
      description: >
        요청 관리자 회사에 소속된 활성(status=ACTIVE) 멤버별 이번 달 쿼터 사용량과 KPI 통계를 반환한다.
        plan/quotaLimit 은 회사가 구독한 단일 플랜값이라 모든 행에서 동일하고(company_memberships 상속
        아님 — user_plans 는 회사 단위 1건), 활성 구독이 없으면(PLAN_NOT_FOUND 상황) 목록 조회 자체는
        실패시키지 않고 plan/quotaLimit/companyPlan 을 전부 null 로 반환한다 — `/api/admin/plan`·
        `/api/admin/plan/history` 와 달리 "구독 없음"도 정상 상태로 보여줘야 하는 목록 뷰이기 때문이다.
        quotaUsed 는 담당 점검자(inspections.assigned_inspector_id) 단위 media 집계 근사치(멤버별 실제
        업로더 FK 부재 — MediaRepository 문서 참고). stats(activeUsers/totalQuotaUsagePercent/companyPlan)는
        검색어(keyword)와 무관하게 회사 전체 기준으로 집계한다. page 는 1부터 시작.
        `AdminPlanController.getPlanQuota` 구현됨.
      security:
        - SessionCookie: []
      tags: [admin]
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1, minimum: 1 }
        - name: size
          in: query
          schema: { type: integer, default: 10, minimum: 1 }
        - name: keyword
          in: query
          description: 멤버 이름·이메일 부분일치 검색(대소문자 무시)
          schema: { type: string }
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminPlanQuotaApiResponse" }
        "401":
          description: 미인증 (UNAUTHORIZED)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "403":
          description: ADMIN 아님 / 회사 없는 관리자 (FORBIDDEN / PLAN_FORBIDDEN)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "404":
          description: 요청 관리자 본인의 회사 멤버십이 유효 승인 상태가 아님 (PLAN_NOT_FOUND) — 회사 자체의 구독 유무와는 별개
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }

  /api/platform-admin/plans-quota:
    get:
      summary: 전사 사용자별 플랜·쿼터 사용 현황 조회 (플랫폼 관리자, #624, frontend #625)
      description: >
        companyId 스코프 없이 전사 사용자(PLATFORM_ADMIN 자신 제외)를 사용자별로 나열한다. companyId/
        companyName 은 소속 회사(회사 미소속이면 둘 다 null), plan/quotaLimit/remainingDays 는 그 사용자가
        소속된 회사의 활성(ACTIVE) 구독에서 나온다 — 회사마다 구독 플랜이 다를 수 있어(단일 회사 스코프인
        /api/admin/plan-quota 와 달리) 행마다 값이 다를 수 있다. 회사 미소속(개인 계정)이거나 소속 회사에
        활성 구독이 없으면 plan/quotaLimit/remainingDays 전부 null 이고 status 는 EXPIRED. user_plans 에
        구독 만료 예정일 컬럼이 없어(ended_at 은 실제 종료 시각만 기록) remainingDays 는 구독을 월 단위로
        간주해 `startedAt + 1개월`을 만료 예정일로 근사 계산한 값이다(순수 조회 시점 파생값, DB에 아무것도
        쓰지 않음). status 는 만료(remainingDays<=0)면 EXPIRED, 갱신 임박(남은 7일 이하)이면 WARNING, 그 외
        ACTIVE. stats(activeUsers/totalQuotaUsagePercent)는 검색어(keyword)·플랜(plan) 필터와 무관하게 전사
        기준으로 집계하며, totalQuotaUsagePercent 는 회사마다 한도가 다를 수 있어 유효 한도를 가진 사용자별
        사용률의 평균이다. page 는 1부터 시작. `PlatformAdminPlanQuotaController.getPlanQuota` 구현됨.
      security:
        - SessionCookie: []
      tags: [platform-admin]
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1, minimum: 1 }
        - name: size
          in: query
          schema: { type: integer, default: 10, minimum: 1 }
        - name: keyword
          in: query
          description: 사용자 이름·이메일·소속 기업명 부분일치 검색(대소문자 무시)
          schema: { type: string }
        - name: plan
          in: query
          description: 소속 회사의 구독 플랜으로 좁혀본다(회사 단위 필터 — 해당 플랜을 구독 중인 회사의 사용자만 반환).
          schema: { type: string, enum: [FREE, STANDARD, ENTERPRISE] }
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlatformAdminPlanQuotaApiResponse" }
        "401":
          description: 미인증 (UNAUTHORIZED)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "403":
          description: PLATFORM_ADMIN 아님 (FORBIDDEN)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }

  /api/platform-admin/plans:
    get:
      summary: 요금제 정책 카탈로그 조회 (플랫폼 관리자, #624 후속)
      description: >
        FREE/STANDARD/ENTERPRISE 전체 요금제의 가격·한도·기능 제공 여부를 반환한다(PLATFORM_ADMIN 전용).
        `AdminPlanController`(#507, "/api/admin/plans")와 같은 plans 테이블을 보되 편집 권한만 다르다.
        `PlatformAdminPlanPolicyController.getCatalog` 구현됨.
      security:
        - SessionCookie: []
      tags: [platform-admin]
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlatformAdminPlanCatalogApiResponse" }
        "401":
          description: 미인증 (UNAUTHORIZED)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "403":
          description: PLATFORM_ADMIN 아님 (FORBIDDEN)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
    put:
      summary: 요금제 정책 일괄 변경 (플랫폼 관리자, #624 후속, 사용자 지시)
      description: >
        FREE/STANDARD/ENTERPRISE 3개 플랜의 가격·한도·기능 제공 여부를 한 번에 원자적으로 교체한다
        (PLATFORM_ADMIN 전용). plans 배열은 3개 플랜명을 각각 정확히 한 번씩 포함해야 한다(누락·중복·
        미지원 플랜명은 400 PLAN_POLICY_INVALID). hasAiAddon은 이 화면의 편집 대상이 아니라 요청에
        없으며, 변경 후에도 기존 값이 그대로 유지된다. plans 는 회사 스코프 없는 전역 참조 데이터라
        변경 즉시 그 플랜을 구독 중인 모든 회사/개인의 한도·가격 표시에 반영된다(user_plans 자체는
        건드리지 않음 — 플랜 변경을 일으키지 않는다). `PlatformAdminPlanPolicyController.updatePolicies` 구현됨.
      security:
        - SessionCookie: []
          XsrfToken: []
      tags: [platform-admin]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PlatformAdminPlanPolicyUpdateRequest" }
      responses:
        "200":
          description: 변경 성공 — 갱신된 카탈로그 반환
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlatformAdminPlanCatalogApiResponse" }
        "400":
          description: 입력값 오류(INVALID_INPUT) 또는 3개 플랜 구성 오류(PLAN_POLICY_INVALID)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "401":
          description: 미인증 (UNAUTHORIZED)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "403":
          description: PLATFORM_ADMIN 아님 (FORBIDDEN)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }

