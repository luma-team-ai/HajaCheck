  /api/dashboard/summary:
    get:
      summary: 대시보드 요약 카드 (HAJA-17, dev-03-01)
      description: >
        로그인 사용자 소유 시설물 기준 요약 지표 4종(총 시설물·이번 달 분석·검수대기·조치대기)과 각 항목의
        전월/전주 대비 변화율을 반환한다. 스냅샷 테이블이 없어 changeRate 는 근사치로 계산한다 —
        totalFacilitiesChangeRate 는 누적 시설물 수 기준, 나머지는 점검/하자 생성시각 기준 이번 달·주
        vs 지난 달·주 비교. 분모가 0이면 분자>0일 때만 100%, 그 외 0%로 처리한다. ownerId 는 인증
        주체에서만 취득한다(cross-owner IDOR 방지). `DashboardController.getSummary` 구현됨.
      security:
        - SessionCookie: []
      tags: [dashboard]
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DashboardSummaryApiResponse" }
        "401":
          description: 미인증 (UNAUTHORIZED)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }

  /api/dashboard/grade-distribution:
    get:
      summary: 등급 분포 (HAJA-17, dev-03-01)
      description: >
        로그인 사용자 소유 시설물의 결함 등급(A~E) 분포를 반환한다. 등급 분류된 하자가 한 건이라도 있으면
        A~E 5개 항목 전부 반환(집계 없는 등급은 percent=0, 막대그래프 합계 100% 보장). 등급 분류된 하자가
        0건이면(미분류 grade=null 하자만 있는 경우 포함) 빈 목록을 반환한다(#347) — "데이터 없음"과
        "전 등급 0%"를 구분하기 위함. `DashboardController.getGradeDistribution` 구현됨.
      security:
        - SessionCookie: []
      tags: [dashboard]
      responses:
        "200":
          description: 조회 성공(등급 분류된 하자 0건이면 빈 배열)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GradeDistributionListApiResponse" }
        "401":
          description: 미인증 (UNAUTHORIZED)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }

  /api/dashboard/pending-priority:
    get:
      summary: 조치 우선순위 목록 (HAJA-17, dev-03-01)
      description: >
        로그인 사용자 소유 시설물의 조치대기 결함을 등급·최신순으로 반환한다. location 은 시설물 명칭까지만
        제공한다(defects/media 스키마에 세부 위치 컬럼 없음). `DashboardController.getPendingPriority` 구현됨.
      security:
        - SessionCookie: []
      tags: [dashboard]
      responses:
        "200":
          description: 조회 성공(0건이면 빈 배열)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PendingPriorityListApiResponse" }
        "401":
          description: 미인증 (UNAUTHORIZED)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }

  /api/dashboard/recent-inspections:
    get:
      summary: 최근 점검 목록 (HAJA-17, dev-03-01)
      description: >
        로그인 사용자 소유 시설물의 최근 점검을 점검일 최신순으로 반환한다. status 는 DB 6단계
        (inspection_status_type)를 화면 4단계로 축약한다: CREATED/UPLOADING/ANALYZING→분석중,
        ANALYZED→검수대기, REVIEWED→조치대기, REPORTED→완료. `DashboardController.getRecentInspections` 구현됨.
      security:
        - SessionCookie: []
      tags: [dashboard]
      responses:
        "200":
          description: 조회 성공(0건이면 빈 배열)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RecentInspectionListApiResponse" }
        "401":
          description: 미인증 (UNAUTHORIZED)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }

  /api/dashboard/upcoming-inspections:
    get:
      summary: 다가오는 점검 예정 시설물 조회 (대시보드 위젯, dev-03-02)
      description: >
        인증 사용자가 소유한(owner_id) 시설물 중 next_inspection_due_at 이 오늘 이후이며 오늘부터
        days 일 이내로 임박한 것을 nextInspectionDueAt 오름차순으로 최대 limit 건 반환한다. 접근
        범위는 기존 대시보드 엔드포인트와 동일한 owner_id 단일 스코프이며 ownerId 는 세션 인증
        주체에서만 취득한다(요청 파라미터로 받지 않음, IDOR 방지). next_inspection_due_at 이 null 인
        시설물은 제외한다. 조회 결과가 0건이면 200 빈 배열.
      security:
        - SessionCookie: []
          XsrfToken: []
      tags: [dashboard]
      parameters:
        - name: days
          in: query
          required: false
          schema: { type: integer, default: 30, minimum: 1, maximum: 365 }
          description: 오늘부터 N일 이내 도래분 (기본 30, 최대 365)
        - name: limit
          in: query
          required: false
          schema: { type: integer, default: 5, minimum: 1 }
          description: 최대 반환 개수 (기본 5)
      responses:
        "200":
          description: 성공 (조회 0건이면 빈 배열)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UpcomingInspectionListApiResponse" }
        "401":
          description: 미인증 (UNAUTHORIZED)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }

  /api/inspections:
    post:
      summary: 점검(회차) 생성
      description: >
        인증 사용자가 접근 가능한 시설에 점검 회차를 생성하고 담당 점검자를 지정한다.
        assignedInspectorId는 ACTIVE이면서 INSPECTOR 또는 ADMIN인 사용자만 허용하며,
        createdBy는 요청 바디가 아니라 인증 주체에서 서버가 기록한다.
      security:
        - SessionCookie: []
          XsrfToken: []
      tags: [inspection]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/InspectionCreateRequest" }
      responses:
        "201":
          description: 점검 회차 생성 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InspectionApiResponse" }
        "400":
          description: 입력값 또는 담당 점검자 상태/역할 오류
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "401":
          description: 미인증
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "403":
          description: 시설 접근 권한 없음
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }

  /api/inspections/{id}/media:
    post:
      summary: 촬영 데이터 업로드
      description: >
        점검 회차에 이미지(JPG/PNG)를 다중 업로드한다(dev-05-03). 업로드는 동기 처리(매직바이트 검증
        → 원본 저장 → 썸네일 재인코딩 → EXIF/GPS 추출 → DB 저장까지 한 요청 안에서 완료)되므로
        202(Accepted)이 아니라 201(Created)로 확정한다. 영상(VIDEO)·프레임 자동 추출은 후속 PR 범위.
        원본은 어떤 응답에도 직접 노출되지 않는다 — thumbnailUrl은 인가된 다운로드 API 경로다.
      security:
        - SessionCookie: []
          XsrfToken: []
      tags: [media]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [files]
              properties:
                files:
                  type: array
                  minItems: 1
                  maxItems: 10
                  items: { type: string, format: binary }
      responses:
        "201":
          description: 업로드 성공(업로드된 각 파일에 대응하는 미디어 목록)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MediaListApiResponse" }
        "400":
          description: 파일 누락/형식 불일치(매직바이트 검증 실패)/용량 초과/개수 초과
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "401":
          description: 미인증
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "404":
          description: 점검 회차 미존재 또는 타인 소유(존재 여부 열거 방지 통일 응답)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }

  /api/media/{id}/thumbnail:
    get:
      summary: 미디어 썸네일 조회
      description: >
        재인코딩된 썸네일(JPEG) 바이트를 반환한다. 원본은 어떤 엔드포인트로도 직접 서빙하지 않는다
        (PRD FR-2 업로드 보안 검증). 원본 크기 재인코딩본("뷰어용") 서빙은 "결과 뷰어" 과업 범위.
      security:
        - SessionCookie: []
          XsrfToken: []
      tags: [media]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        "200":
          description: 썸네일 이미지(JPEG)
          content:
            image/jpeg:
              schema: { type: string, format: binary }
        "401":
          description: 미인증
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "404":
          description: 미디어 미존재 또는 타인 소유(존재 여부 열거 방지 통일 응답)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }

  /api/inspections/{id}/analyze:
    post:
      summary: AI 분석 요청
      tags: [inspection]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "202": { description: TODO — 황승현 확정 필요(비동기 잡 패턴) }

  /api/inspections/{id}/defects:
    get:
      summary: 분석 결과(하자 목록) 조회
      description: >
        점검 회차(inspection) 하나에 속한 하자 전체를 반환한다(뷰어·검수 공용, FR-4). 소유권은
        본인 소유 시설물만 허용하며, 미존재와 타인 소유를 구분하지 않고 404로 통일한다(IDOR 방지).
        `defects.is_deleted=false`만 반환하고(오탐 삭제된 항목 제외), 정렬은 `id ASC`로 고정한다
        (프론트 오버레이 번호가 탐지 순서와 어긋나지 않도록). 페이지네이션 없음 — 한 회차의 하자
        수는 뷰어가 한 화면에 그릴 수 있는 범위로 가정(대량이면 후속 별도 이슈).
      security:
        - SessionCookie: []
      tags: [defect]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        "200":
          description: 조회 성공(빈 배열 포함)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DefectDetailListApiResponse" }
        "401":
          description: 미인증
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "404":
          description: 점검 회차 미존재 또는 타인 소유(INSPECTION_NOT_FOUND, 존재 여부 열거 방지 통일 응답)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }

  /api/defects:
    get:
      summary: 하자 목록 검색·필터 (FR-012, 계획/미구현)
      description: >
        서버가 인증 주체로부터 조회 가능한 시설물 범위를 먼저 계산한다: 본인 소유 시설물(facilities.owner_id),
        회사 소속 공유 시설물(등록자가 아니어도 시설물 소유자와 요청자 양쪽 모두가 같은 회사에 대해 유효한
        company_memberships를 가진 경우에 한해 포함 — 요청자 자신의 멤버십이 미승인·회수·만료 상태면 제외),
        관리자는 전체 시설물. 이와 별개로 inspections.assigned_inspector_id가 본인인 점검 회차는
        시설물 범위 밖이어도 항상 포함한다. 모든 역할에서 defects.is_deleted=false를 강제한다. 아래 쿼리
        파라미터는 이 서버 유도 소유권 범위를 좁히는 용도로만 사용하며 클라이언트 입력으로 범위를 확장할 수
        없다. 정렬은 created_at DESC, id DESC로 고정해 페이지 간 결과 순서를 안정적으로 유지한다.
      security:
        - SessionCookie: []
      tags: [defect]
      parameters:
        - name: type
          in: query
          description: 하자 유형 코드 목록(콤마 구분)
          style: form
          explode: false
          schema:
            type: array
            uniqueItems: true
            items: { $ref: "#/components/schemas/DefectTypeCode" }
        - name: grade
          in: query
          description: 하자 등급 코드 목록(콤마 구분)
          style: form
          explode: false
          schema:
            type: array
            uniqueItems: true
            items: { $ref: "#/components/schemas/DefectGradeCode" }
        - name: status
          in: query
          description: 하자 상태 코드 목록(콤마 구분)
          style: form
          explode: false
          schema:
            type: array
            uniqueItems: true
            items: { $ref: "#/components/schemas/DefectStatusCode" }
        - name: confidenceMin
          in: query
          description: AI 탐지 신뢰도 하한(0~1)
          schema: { type: number, format: double, minimum: 0, maximum: 1 }
        - name: page
          in: query
          description: 0부터 시작하는 페이지 번호
          schema: { type: integer, minimum: 0, default: 0 }
        - name: size
          in: query
          description: 페이지 크기(최대 100)
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
      responses:
        "200":
          description: 소유권·논리 삭제·필터 조건을 모두 만족하는 하자 페이지
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DefectListApiResponse" }
        "401":
          description: 미인증
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "403":
          description: >
            인증됐지만 이 엔드포인트를 사용할 역할이 아님. 허용된 역할이지만 소유·배정 범위에
            결과가 없거나 필터/논리 삭제 조건 적용 후 0건이면 403이 아니라 200 빈 페이지를 반환한다.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }

  /api/defects/nl-search:
    post:
      summary: 하자 자연어 검색 공개 게이트웨이 (FR-013, 계획/미구현)
      description: >
        세션 인증과 점검자 역할을 검사하고 has_ai_addon=true인 활성 플랜만 허용한다.
        회사 플랜은 회사 status=APPROVED, verification_status=VERIFIED 및 company_memberships의
        유효한 승인 멤버십(status=APPROVED, 미회수, 미만료, users.company_id 일치)을 모두 검증하며
        users.company_id만으로 상속하지 않는다. 게이트 실패 시 내부
        FastAPI를 호출하지 않는다. 성공한 요청만 내부 POST /ai/nl-search로 전달하고 내부 오류 코드에서
        예외·토큰 값을 제거한 뒤 Spring ApiResponse로 보존한다.
      security:
        - SessionCookie: []
          XsrfToken: []
      tags: [defect, ai]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/NlSearchRequest" }
      responses:
        "200":
          description: 변환 성공 또는 전달된 LLM 오류 — success 필드로 구분
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NlSearchApiResponse" }
        "400":
          description: 빈 질의 또는 trim 후 500자 초과(INVALID_INPUT/VALIDATION_ERROR)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "401":
          description: 미인증
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "403":
          description: 점검자 권한 없음 또는 AI 부가 기능 미보유(AI_ADDON_REQUIRED)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }

  /api/defects/{id}:
    patch:
      summary: 검수 — 오탐 수정·등급 조정 (defect_revisions append-only)
      description: >
        점검자가 하자를 검수한다(FR-4, 휴먼 인 더 루프). `grade`(등급 조정) 또는 `isDeleted`(오탐 삭제,
        Soft Delete) 중 **정확히 하나**만 지정한다 — 둘 다 지정하거나 둘 다 생략하면 400. 각 변경은
        `defects` 테이블을 직접 덮어쓰지 않고 `defect_revisions`에 append-only 이력(누가·언제·무엇을·왜)을
        별도로 남긴다. `revisedBy`는 세션 사용자로 서버가 채우며 요청 바디에 포함하지 않는다.
        이미 RESOLVED 상태인 하자는 등급을 더 바꿀 수 없다(Defect.review 도메인 가드 — 409). **상태(status)
        전이는 이 엔드포인트의 책임이 아니다** — 검수확정 이후 상태 흐름은 #17 전용 API가 담당한다.
      security:
        - SessionCookie: []
          XsrfToken: []
      tags: [defect]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DefectRevisionRequest" }
      responses:
        "200":
          description: 검수 반영된 하자 상세
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DefectApiResponse" }
        "400":
          description: grade/isDeleted 둘 다 지정 또는 둘 다 누락, reason 누락 등(INVALID_INPUT)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "401":
          description: 미인증
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "404":
          description: 하자 미존재 또는 타인 소유(DEFECT_NOT_FOUND, 존재 여부 열거 방지 통일 응답)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "409":
          description: RESOLVED 상태인 하자의 등급 변경 시도(INVALID_STATE_TRANSITION)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }

  /api/inspections/{inspectionId}/reports:
    parameters:
      - name: inspectionId
        in: path
        required: true
        schema: { type: integer, format: int64 }
    post:
      summary: 보고서 초안 생성 (#446 / HAJA-283)
      description: >
        점검의 확정 하자(CONFIRMED/ACTION_PENDING/IN_PROGRESS/RESOLVED, DETECTED 제외)를 근거로
        AiProxyService(`/api/ai/report`)를 호출해 AI 보고서 초안(DRAFT)을 생성한다. 확정 하자가 0건이어도
        빈 목록으로 정상 진행한다(결함 없는 정상 점검도 유효한 보고서 유스케이스). 소유권 검증은
        InspectionService.getInspection 에 위임 — 미존재/타인 소유 모두 404 통일 응답.
        grounding 결과가 즉시 기록되며(비동기 아님) `passed=false`여도 초안 자체는 생성된다(확정만 차단).
        `ReportController.generateDraft` 구현됨.
      security:
        - SessionCookie: []
          XsrfToken: []
      tags: [report]
      responses:
        "201":
          description: 초안 생성 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReportDetailApiResponse" }
        "401":
          description: 미인증 (UNAUTHORIZED)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "404":
          description: 점검 미존재 또는 타인 소유 (INSPECTION_NOT_FOUND)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "502":
          description: REPORT_GENERATION_FAILED(내부 AI 프록시가 논리적으로 생성을 거부)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
    get:
      summary: 보고서 버전 목록 (#446 / HAJA-283)
      description: >
        점검에 속한 보고서를 버전 내림차순으로 반환한다. 소유권 검증은 InspectionService.getInspection 에
        위임(미존재/타인 소유 모두 404). `ReportController.listReports` 구현됨.
      security:
        - SessionCookie: []
      tags: [report]
      responses:
        "200":
          description: 조회 성공(0건이면 빈 배열)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReportSummaryListApiResponse" }
        "401":
          description: 미인증 (UNAUTHORIZED)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "404":
          description: 점검 미존재 또는 타인 소유 (INSPECTION_NOT_FOUND)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }

  /api/reports/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer, format: int64 }
    get:
      summary: 보고서 상세 조회 (#446 / HAJA-283)
      description: >
        보고서 단건을 콘텐츠(JSON, 파싱된 구조)와 함께 조회한다. 미존재/타인 소유(점검 기준 소유권) 모두
        REPORT_NOT_FOUND(404)로 통일 응답한다(MediaService.getThumbnail 과 동일 패턴).
        `ReportController.getReport` 구현됨.
      security:
        - SessionCookie: []
      tags: [report]
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReportDetailApiResponse" }
        "401":
          description: 미인증 (UNAUTHORIZED)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "404":
          description: 미존재 또는 타인 소유 (REPORT_NOT_FOUND)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
    patch:
      summary: 보고서 본문 수정 (#446 / HAJA-283)
      description: >
        DRAFT 상태 보고서의 본문(JSON 문자열)을 수정한다. 이미 확정(FINALIZED)된 보고서는
        INVALID_STATE_TRANSITION(409)로 거부한다. 수정 시 이전 콘텐츠에 대한 grounding 판정
        (groundingCheckPassed/groundingWarnings)은 항상 null 로 초기화된다 — 바뀐 본문은 재검증 전까지
        확정할 수 없다(finalizeReport 는 groundingCheckPassed=true 를 요구). `ReportController.updateContent` 구현됨.
      security:
        - SessionCookie: []
          XsrfToken: []
      tags: [report]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateReportContentRequest" }
      responses:
        "200":
          description: 수정 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReportDetailApiResponse" }
        "400":
          description: INVALID_INPUT(빈 값 또는 유효하지 않은 JSON)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "401":
          description: 미인증 (UNAUTHORIZED)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "404":
          description: 미존재 또는 타인 소유 (REPORT_NOT_FOUND)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "409":
          description: 이미 확정된 보고서 (INVALID_STATE_TRANSITION)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }

  /api/reports/{id}/finalize:
    post:
      summary: 보고서 확정 (#446 / HAJA-283)
      description: >
        근거 검증(groundingCheckPassed=true)을 통과한 DRAFT 보고서만 pdfUrl과 함께 FINALIZED로 확정한다.
        groundingCheckPassed 가 true 가 아니면(false 또는 아직 미기록) INVALID_STATE_TRANSITION(409).
        pdfUrl 은 이 보고서의 업로드 엔드포인트(`/api/reports/{id}/pdf/{storageKey}`) prefix 로 시작해야
        하며(#455 P2-2, 임의 문자열·타 보고서 pdfUrl 재사용 차단), 아니면 REPORT_PDF_URL_INVALID(400).
        확정 후 재요청은 이미 FINALIZED 상태이므로 INVALID_STATE_TRANSITION(409)로 거부된다(비멱등).
        `ReportController.finalizeReport` 구현됨.
      security:
        - SessionCookie: []
          XsrfToken: []
      tags: [report]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/FinalizeReportRequest" }
      responses:
        "200":
          description: 확정 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReportDetailApiResponse" }
        "400":
          description: REPORT_PDF_URL_INVALID(pdfUrl이 이 보고서의 업로드 경로가 아님)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "401":
          description: 미인증 (UNAUTHORIZED)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "404":
          description: 미존재 또는 타인 소유 (REPORT_NOT_FOUND)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "409":
          description: 근거 검증 미통과 또는 이미 확정됨 (INVALID_STATE_TRANSITION)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }

  /api/reports/{id}/pdf:
    post:
      summary: 보고서 PDF 업로드 (#446 / HAJA-283, #455 P2-3)
      description: >
        확정용 PDF 파일을 저장하고 접근 URL(`/api/reports/{id}/pdf/{storageKey}`)을 반환한다(별도로
        `/finalize` 요청에 전달). content-type이 application/pdf가 아니면 거부하고, 실제 바이트도 PDF
        매직넘버(%PDF-)로 시작하는지 검증한다(content-type 헤더 스푸핑 방지). 업로드 전 보고서 소유권을
        검증한다(존재하지 않거나 타인 소유 보고서에 대한 업로드 차단). `ReportController.uploadPdf` 구현됨.
      security:
        - SessionCookie: []
          XsrfToken: []
      tags: [report]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string, format: binary }
      responses:
        "201":
          description: 업로드 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReportPdfApiResponse" }
        "400":
          description: FILE_REQUIRED | FILE_INVALID_TYPE(PDF 아님, 매직넘버 불일치 포함) | FILE_TOO_LARGE
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "401":
          description: 미인증 (UNAUTHORIZED)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "404":
          description: 보고서 미존재 또는 타인 소유 (REPORT_NOT_FOUND)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }

  /api/reports/{id}/pdf/{storageKey}:
    get:
      summary: 보고서 PDF 다운로드 (#446 / HAJA-283, #455 P2-1)
      description: >
        업로드된 보고서 PDF를 소유권 검증 후 스트리밍한다. 정적 리소스 핸들러로 직접 서빙하지 않는
        이유가 이 소유권 검증(IDOR 방지)을 강제하기 위함이다 — 미존재/타인 소유 모두 REPORT_NOT_FOUND(404),
        저장된 파일 자체가 없으면 FILE_NOT_FOUND(404). `ReportController.downloadPdf` 구현됨.
      security:
        - SessionCookie: []
      tags: [report]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
        - name: storageKey
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: PDF 파일 다운로드 성공
          content:
            application/pdf:
              schema: { type: string, format: binary }
        "401":
          description: 미인증 (UNAUTHORIZED)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "404":
          description: 보고서 미존재/타인 소유 (REPORT_NOT_FOUND) 또는 저장된 파일 없음 (FILE_NOT_FOUND)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }

  /api/notifications:
    get:
      summary: 알림 목록 조회
      description: >
        AP-020(#25 / HAJA-38 FR-9). 로그인 사용자에게 온 알림을 읽음/미읽음 모두 포함해(센터는 이력 표시)
        생성일 최신순(동률 시 id desc) 상위 30건으로 반환한다. 수신자(userId)는 인증 주체에서만 취득하며
        요청 파라미터/바디로 받지 않는다(cross-owner IDOR 방지). 이 엔드포인트는 조회만 다룬다 —
        읽음처리는 PATCH /api/notifications/{id}/read(HAJA-274), 이벤트 발행(트리거)은 별도 계약(후속).
      security:
        - SessionCookie: []
      tags: [notification]
      responses:
        "200":
          description: 조회 성공(알림이 없으면 빈 배열)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NotificationListApiResponse" }
        "401":
          description: 미인증 (UNAUTHORIZED)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }

  /api/notifications/{id}/read:
    patch:
      summary: 알림 읽음 처리
      description: >
        HAJA-274(FR-9). 로그인 사용자 소유의 알림을 읽음 상태로 전환한다. 이미 읽은 알림에 대한
        재요청도 200으로 성공 처리하는 멱등 연산이다. 수신자(userId)는 인증 주체에서만 취득하며,
        미존재 또는 타인 소유 알림은 리소스 존재 열거(cross-user IDOR)를 막기 위해 모두 404로 통일 응답한다.
      security:
        - SessionCookie: []
          XsrfToken: []
      tags: [notification]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: 읽음 처리 성공(멱등 — 이미 읽음도 200)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VoidApiResponse" }
        "401":
          description: 미인증 (UNAUTHORIZED)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "404":
          description: 미존재 또는 타인 소유 (NOTIFICATION_NOT_FOUND)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }

components:
  securitySchemes:
    InternalKey:
      type: apiKey
      in: header
      name: X-Internal-Key
      description: Spring Boot가 FastAPI 내부 호출에 부착하는 AI_INTERNAL_KEY
    InternalServiceToken:
      type: apiKey
      in: header
      name: X-Internal-Service-Token
      description: Spring Boot와 FastAPI 환경변수에만 주입하는 내부 호출 토큰
    SessionCookie:
      type: apiKey
      in: cookie
      name: SESSION
      description: Spring Security 인증 세션 쿠키
    XsrfToken:
      type: apiKey
      in: header
      name: X-XSRF-TOKEN
      description: 상태 변경 요청에 필요한 double-submit CSRF 토큰

  schemas:
    # ── auth 도메인 (Spring Boot envelope: { success, data, error }) ──
    LoginRequest:
      type: object
      required: [loginId, password]
      properties:
        loginId: { type: string, description: 로그인 ID(=email), example: company@haja.com }
        password: { type: string, format: password, example: "pw123456" }

    UserResponse:
      type: object
      description: 사용자 응답(민감 필드 password_hash/social_id 제외)
      properties:
        id: { type: integer, format: int64, example: 1 }
        email: { type: string, example: company@haja.com }
        name: { type: string, example: 기업사용자 }
        role: { type: string, enum: [ADMIN, INSPECTOR, USER, COUNSELOR], example: USER }
        companyId: { type: integer, format: int64, nullable: true, example: 10 }
        profileImageUrl: { type: string, nullable: true, example: "https://.../p.png" }

    ApiError:
      type: object
      properties:
        code: { type: string, example: AUTH_INVALID_CREDENTIALS }
        message: { type: string, example: 아이디 또는 비밀번호가 올바르지 않습니다. }

    UserApiResponse:
      type: object
      description: 성공 envelope — data=UserResponse
      properties:
        success: { type: boolean, example: true }
        data: { $ref: "#/components/schemas/UserResponse" }
        error: { type: object, nullable: true, example: null }

    VoidApiResponse:
      type: object
      properties:
        success: { type: boolean, example: true }
        data: { type: object, nullable: true, example: null }
        error: { type: object, nullable: true, example: null }

    ErrorApiResponse:
      type: object
      description: 실패 envelope — error=ApiError
      properties:
        success: { type: boolean, example: false }
        data: { type: object, nullable: true, example: null }
        error: { $ref: "#/components/schemas/ApiError" }

    AIErrorCode:
      type: string
      enum: [LLM_TIMEOUT, LLM_RATE_LIMIT, LLM_INVALID_OUTPUT, RAG_NO_RESULT, VALIDATION_ERROR]
      description: >-
        LLM 계열(TIMEOUT/RATE_LIMIT/INVALID_OUTPUT)·RAG_NO_RESULT 외에,
        VALIDATION_ERROR 는 LLM 호출이 없는 순수 코드 대조 경로(grounding-check 등)의
        입력·대조 검증 실패용 (#122).

    AIError:
      type: object
      properties:
        code: { $ref: "#/components/schemas/AIErrorCode" }
        message: { type: string }

    AIUsage:
      type: object
      properties:
        tokens: { type: integer }

    AIResponse:
      type: object
      description: 모든 /ai/** 공통 응답 envelope (AI_개발_컨벤션.md §5)
      properties:
        success: { type: boolean }
        data: {}
        usage: { $ref: "#/components/schemas/AIUsage" }
        error: { $ref: "#/components/schemas/AIError" }

    DefectTypeCode:
      type: string
      description: >-
        탐지 클래스 3종 확정(PRD v0.42, 2026-07-13) — LEAK_EFFLORESCENCE(누수·백태)·PAINT_DAMAGE(도장손상)는
        데이터 확보 상황상 이번 범위에서 제외됨. DB `defect_type` enum·프론트 DefectType은 별도 확인·정합 필요.
      enum: [CRACK, SPALLING, REBAR_EXPOSURE]

    DefectGradeCode:
      type: string
      enum: [A, B, C, D, E]

    DefectStatusCode:
      type: string
      enum: [DETECTED, CONFIRMED, ACTION_PENDING, IN_PROGRESS, RESOLVED]

    InspectionStatusCode:
      type: string
      enum: [CREATED, UPLOADING, ANALYZING, ANALYZED, REVIEWED, REPORTED]

    InspectionCreateRequest:
      type: object
      additionalProperties: false
      required: [facilityId, inspectionDate, assignedInspectorId]
      properties:
        facilityId: { type: integer, format: int64, minimum: 1 }
        inspectionDate: { type: string, format: date }
        assignedInspectorId:
          type: integer
          format: int64
          minimum: 1
          description: ACTIVE이며 INSPECTOR 또는 ADMIN 역할인 담당자 식별자

    FacilityCreateRequest:
      type: object
      additionalProperties: false
      required: [name, type]
      description: ownerId 는 인증 주체에서 서버가 기록하므로 요청 바디에 포함하지 않는다.
      properties:
        name: { type: string, maxLength: 200 }
        type: { type: string, maxLength: 20 }
        address: { type: string, maxLength: 300, nullable: true }
        latitude: { type: number, format: double, minimum: -90.0, maximum: 90.0, nullable: true }
        longitude: { type: number, format: double, minimum: -180.0, maximum: 180.0, nullable: true }
        builtYear: { type: integer, nullable: true }
        scale: { type: string, maxLength: 100, nullable: true }
        inspectionCycleMonths: { type: integer, minimum: 0, nullable: true }
        nextInspectionDueAt: { type: string, format: date, nullable: true }

    FacilityUpdateRequest:
      type: object
      additionalProperties: false
      required: [name, type]
      description: FacilityCreateRequest 와 동일 필드 집합(전체 교체 방식).
      properties:
        name: { type: string, maxLength: 200 }
        type: { type: string, maxLength: 20 }
        address: { type: string, maxLength: 300, nullable: true }
        latitude: { type: number, format: double, minimum: -90.0, maximum: 90.0, nullable: true }
        longitude: { type: number, format: double, minimum: -180.0, maximum: 180.0, nullable: true }
        builtYear: { type: integer, nullable: true }
        scale: { type: string, maxLength: 100, nullable: true }
        inspectionCycleMonths: { type: integer, minimum: 0, nullable: true }
        nextInspectionDueAt: { type: string, format: date, nullable: true }

    FacilityScheduleRequest:
      type: object
      additionalProperties: false
      required: [inspectionCycleMonths]
      description: >
        점검주기 설정 요청(dev-04-03). 기준일(오늘)은 서버가 산출하므로 요청 바디에 포함하지 않는다.
      properties:
        inspectionCycleMonths: { type: integer, minimum: 1 }

    FacilityResponse:
      type: object
      additionalProperties: false
      required: [id, ownerId, name, type, createdAt, updatedAt]
      properties:
        id: { type: integer, format: int64 }
        ownerId: { type: integer, format: int64 }
        name: { type: string }
        type: { type: string }
        address: { type: string, nullable: true }
        latitude: { type: number, format: double, nullable: true }
        longitude: { type: number, format: double, nullable: true }
        builtYear: { type: integer, nullable: true }
        scale: { type: string, nullable: true }
        inspectionCycleMonths: { type: integer, nullable: true }
        nextInspectionDueAt: { type: string, format: date, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    FacilityDetailResponse:
      type: object
      additionalProperties: false
      required: [facility, inspections]
      description: >
        ⚠️ 계획안(미구현) — dev-04-02 점검이력 결합 후속 작업에서 채택 예정. 현재 GET /api/facilities/{id}
        는 flat FacilityResponse 를 반환한다. 채택 시 응답 구조 변경(breaking)이므로 계약 오너 승인 필요.
        시설물 상세 + 해당 시설의 점검 회차 이력(최신순).
      properties:
        facility: { $ref: "#/components/schemas/FacilityResponse" }
        inspections:
          type: array
          items: { $ref: "#/components/schemas/InspectionResponse" }

    FacilityApiResponse:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean }
        data:
          nullable: true
          oneOf:
            - { $ref: "#/components/schemas/FacilityResponse" }
        error:
          nullable: true
          oneOf:
            - { $ref: "#/components/schemas/ApiError" }

    FacilityListApiResponse:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean }
        data:
          nullable: true
          type: array
          items: { $ref: "#/components/schemas/FacilityResponse" }
        error:
          nullable: true
          oneOf:
            - { $ref: "#/components/schemas/ApiError" }

    UpcomingInspectionResponse:
      type: object
      additionalProperties: false
      required: [facilityId, facilityName, nextInspectionDueAt, dDay]
      properties:
        facilityId: { type: integer, format: int64 }
        facilityName: { type: string }
        nextInspectionDueAt: { type: string, format: date }
        dDay: { type: integer, description: "오늘 기준 잔여일(nextInspectionDueAt - 오늘). 0=오늘. 오늘 이후만 조회하므로 음수 없음" }
        inspectionCycleMonths: { type: integer, nullable: true }

    UpcomingInspectionListApiResponse:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean }
        data:
          nullable: true
          type: array
          items: { $ref: "#/components/schemas/UpcomingInspectionResponse" }
        error:
          nullable: true
          oneOf:
            - { $ref: "#/components/schemas/ApiError" }

    FacilityDetailApiResponse:
      type: object
      description: ⚠️ 계획안(미구현) — FacilityDetailResponse 채택 시 사용.
      required: [success, data, error]
      properties:
        success: { type: boolean }
        data:
          nullable: true
          oneOf:
            - { $ref: "#/components/schemas/FacilityDetailResponse" }
        error:
          nullable: true
          oneOf:
            - { $ref: "#/components/schemas/ApiError" }

    InspectionResponse:
      type: object
      additionalProperties: false
      required: [id, facilityId, createdBy, assignedInspectorId, roundNo, inspectionDate, status, createdAt]
      properties:
        id: { type: integer, format: int64 }
        facilityId: { type: integer, format: int64 }
        createdBy: { type: integer, format: int64 }
        assignedInspectorId: { type: integer, format: int64 }
        roundNo: { type: integer, minimum: 1 }
        inspectionDate: { type: string, format: date }
        status: { $ref: "#/components/schemas/InspectionStatusCode" }
        createdAt: { type: string, format: date-time }

    InspectionApiResponse:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean }
        data:
          nullable: true
          oneOf:
            - { $ref: "#/components/schemas/InspectionResponse" }
        error:
          nullable: true
          oneOf:
            - { $ref: "#/components/schemas/ApiError" }

    MediaFileTypeCode:
      type: string
      enum: [IMAGE, VIDEO]

    MediaResponse:
      type: object
      additionalProperties: false
      required: [id, inspectionId, fileType, thumbnailUrl, createdAt]
      properties:
        id: { type: integer, format: int64 }
        inspectionId: { type: integer, format: int64 }
        fileType: { $ref: "#/components/schemas/MediaFileTypeCode" }
        thumbnailUrl:
          type: string
          description: 인가된 썸네일 조회 API 경로(/api/media/{id}/thumbnail) — 저장소 원본 경로 아님.
        mimeType: { type: string, nullable: true }
        capturedAt: { type: string, format: date-time, nullable: true, description: EXIF 촬영시각(없으면 null) }
        gpsLat: { type: number, nullable: true }
        gpsLng: { type: number, nullable: true }
        createdAt: { type: string, format: date-time }

    MediaListApiResponse:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean }
        data:
          nullable: true
          type: array
          items: { $ref: "#/components/schemas/MediaResponse" }
        error:
          nullable: true
          oneOf:
            - { $ref: "#/components/schemas/ApiError" }

    NullableDefectGradeCode:
      type: string
      enum: [A, B, C, D, E]
      nullable: true

    DefectListItem:
      type: object
      additionalProperties: false
      required: [id, inspectionId, facilityId, type, grade, status, confidence, isReviewed, createdAt]
      properties:
        id: { type: integer, format: int64 }
        inspectionId: { type: integer, format: int64 }
        facilityId: { type: integer, format: int64 }
        type: { $ref: "#/components/schemas/DefectTypeCode" }
        grade: { $ref: "#/components/schemas/NullableDefectGradeCode" }
        status: { $ref: "#/components/schemas/DefectStatusCode" }
        confidence: { type: number, format: double, minimum: 0, maximum: 1 }
        isReviewed: { type: boolean }
        createdAt: { type: string, format: date-time }

    DefectPage:
      type: object
      additionalProperties: false
      required: [content, page, size, totalElements, totalPages]
      properties:
        content:
          type: array
          items: { $ref: "#/components/schemas/DefectListItem" }
        page: { type: integer, minimum: 0 }
        size: { type: integer, minimum: 1, maximum: 100 }
        totalElements: { type: integer, format: int64, minimum: 0 }
        totalPages: { type: integer, minimum: 0 }

    DefectListApiResponse:
      type: object
      description: GET /api/defects 전용 Spring ApiResponse envelope
      required: [success, data, error]
      properties:
        success: { type: boolean }
        data:
          nullable: true
          oneOf:
            - { $ref: "#/components/schemas/DefectPage" }
        error:
          nullable: true
          oneOf:
            - { $ref: "#/components/schemas/ApiError" }

    DefectDetailItem:
      type: object
      additionalProperties: false
      description: >
        DefectListItem + 뷰어 오버레이·정밀 검수에 필요한 필드(bbox·균열 실측치). 목록(#/api/defects)은
        가벼운 DefectListItem을 쓰고, 점검 회차 단위 조회·검수 API는 이 스키마를 쓴다.
      required: [id, inspectionId, type, grade, status, confidence, isReviewed, createdAt]
      properties:
        id: { type: integer, format: int64 }
        inspectionId: { type: integer, format: int64 }
        type: { $ref: "#/components/schemas/DefectTypeCode" }
        grade: { $ref: "#/components/schemas/NullableDefectGradeCode" }
        status: { $ref: "#/components/schemas/DefectStatusCode" }
        confidence: { type: number, format: double, minimum: 0, maximum: 1 }
        isReviewed: { type: boolean }
        bboxX: { type: number, format: double, nullable: true }
        bboxY: { type: number, format: double, nullable: true }
        bboxW: { type: number, format: double, nullable: true }
        bboxH: { type: number, format: double, nullable: true }
        crackWidthMm: { type: number, format: double, nullable: true }
        crackLengthMm: { type: number, format: double, nullable: true }
        createdAt: { type: string, format: date-time }

    DefectDetailListApiResponse:
      type: object
      description: GET /api/inspections/{id}/defects 전용 Spring ApiResponse envelope(페이지네이션 없음)
      required: [success, data, error]
      properties:
        success: { type: boolean }
        data:
          nullable: true
          type: array
          items: { $ref: "#/components/schemas/DefectDetailItem" }
        error:
          nullable: true
          oneOf:
            - { $ref: "#/components/schemas/ApiError" }

    DefectApiResponse:
      type: object
      description: PATCH /api/defects/{id} 전용 Spring ApiResponse envelope
      required: [success, data, error]
      properties:
        success: { type: boolean }
        data:
          nullable: true
          oneOf:
            - { $ref: "#/components/schemas/DefectDetailItem" }
        error:
          nullable: true
          oneOf:
            - { $ref: "#/components/schemas/ApiError" }

    DefectRevisionRequest:
      type: object
      additionalProperties: false
      description: >
        grade·isDeleted 중 정확히 하나만 지정(둘 다 또는 둘 다 아님이면 400). isDeleted는 오탐 삭제
        전용이라 true만 허용 — 이 API로 복구(false)는 지원하지 않는다.
      required: [reason]
      properties:
        grade: { $ref: "#/components/schemas/DefectGradeCode" }
        isDeleted: { type: boolean, enum: [true] }
        reason:
          type: string
          minLength: 1
          maxLength: 500
          description: defect_revisions.reason — 오탐/등급 조정 사유(검수 감사 추적)

    NlSearchRequest:
      type: object
      additionalProperties: false
      required: [query]
      properties:
        query:
          type: string
          minLength: 1
          maxLength: 500
          description: 양끝 공백 제거 후 1~500자인 자연어 질의
          example: D등급 이상 조치 대기 하자

    NlSearchFilters:
      type: object
      additionalProperties: false
      required: [type, grade, status, confidenceMin]
      properties:
        type:
          type: array
          uniqueItems: true
          items: { $ref: "#/components/schemas/DefectTypeCode" }
        grade:
          type: array
          uniqueItems: true
          items: { $ref: "#/components/schemas/DefectGradeCode" }
        status:
          type: array
          uniqueItems: true
          items: { $ref: "#/components/schemas/DefectStatusCode" }
        confidenceMin:
          type: number
          format: double
          minimum: 0
          maximum: 1
          nullable: true

    NlSearchResult:
      type: object
      additionalProperties: false
      required: [filters, unsupported_terms, clarifying_question, interpretation_confidence]
      properties:
        filters: { $ref: "#/components/schemas/NlSearchFilters" }
        unsupported_terms:
          type: array
          items: { type: string }
        clarifying_question:
          type: string
          nullable: true
        interpretation_confidence:
          type: number
          format: double
          minimum: 0
          maximum: 1

    NlSearchAIResponse:
      type: object
      description: 내부 /ai/nl-search 전용 AIResponse envelope
      required: [success, data, usage, error]
      properties:
        success: { type: boolean }
        data:
          nullable: true
          oneOf:
            - { $ref: "#/components/schemas/NlSearchResult" }
        usage:
          nullable: true
          oneOf:
            - { $ref: "#/components/schemas/AIUsage" }
        error:
          nullable: true
          oneOf:
            - { $ref: "#/components/schemas/AIError" }

    NlSearchApiResponse:
      type: object
      description: 공개 /api/defects/nl-search 전용 Spring ApiResponse envelope
      required: [success, data, error]
      properties:
        success: { type: boolean }
        data:
          nullable: true
          oneOf:
            - { $ref: "#/components/schemas/NlSearchResult" }
        error:
          nullable: true
          oneOf:
            - { $ref: "#/components/schemas/ApiError" }

    SourceCitation:
      type: object
      description: RAG 답변이 인용한 문서 1건. Chroma metadata `source`는 API 경계에서 `title`로 매핑한다.
      required: [doc_id, title, collection, locator, snippet, chunk_ref]
      properties:
        doc_id: { type: string, pattern: "^[1-9][0-9]*$", example: "42" }
        title: { type: string, minLength: 1, example: "시설물의 안전 및 유지관리에 관한 특별법" }
        collection: { type: string, enum: [regulations, defect_kb], example: regulations }
        locator: { type: string, minLength: 1, example: "제12조" }
        snippet: { type: string, minLength: 1, example: "관리주체는 시설물의 안전점검을 정기적으로 실시하여야 한다." }
        chunk_ref: { type: string, minLength: 1, example: "42_3" }

    RagAnswerData:
      type: object
      description: AIResponse.data 의 실제 형태(성공 시) — /ai/rag-chat
      required: [answer, sources]
      properties:
        answer: { type: string, example: "균열 보수는 손상 정도와 구조 안전성 평가 결과에 따라 보수 공법을 선택합니다." }
        sources:
          type: array
          items: { $ref: "#/components/schemas/SourceCitation" }

    DefectExplainRequest:
      type: object
      required: [defect_type, severity_grade, location, facility_type]
      properties:
        defect_type: { type: string, example: 철근 노출 }
        severity_grade: { type: string, enum: [A, B, C, D, E], example: D }
        location: { type: string, example: 교각 하부 }
        facility_type: { type: string, example: 교량 }

    DefectExplain:
      type: object
      description: AIResponse.data 의 실제 형태(성공 시)
      properties:
        cause: { type: string, description: 추정 원인 }
        risk: { type: string, description: 방치 시 위험 }
        action: { type: string, description: 조치 방안 }

    ReportDefectInput:
      type: object
      required: [defect_type, location, severity_grade, description]
      properties:
        defect_type: { type: string, example: 균열 }
        location: { type: string, example: 1동 1층 기둥 }
        severity_grade: { type: string, enum: [A, B, C, D, E], example: B }
        description: { type: string, example: 기둥 표면 수평 균열 }

    ReportGenerateRequest:
      type: object
      description: >
        correlation 필드 3개는 모두 함께 제공하거나 모두 생략한다. 모두 생략하면 기존 호환 경로이며,
        모두 제공하면 응답에 같은 값과 content_hash가 포함된다. 현재 값의 서버 발급·점검 귀속은 강제되지 않는다.
      required: [facility_info, confirmed_defects]
      properties:
        facility_info:
          type: object
          required: [name, location]
          properties:
            name: { type: string, example: Haja APT }
            location: { type: string, example: 서울시 }
        confirmed_defects:
          type: array
          maxItems: 100
          items:
            { $ref: "#/components/schemas/ReportDefectInput" }
        on_mismatch:
          type: string
          enum: [regenerate, warn]
          default: regenerate
        grounding_request_id:
          type: string
          minLength: 1
          description: 선택적 correlation 요청 ID. inspection_id, report_version과 함께 제공해야 한다.
          example: rpt-01J2Y8A7M6
        inspection_id:
          type: integer
          format: int64
          minimum: 1
          description: 선택적 점검 ID. 다른 correlation 필드와 함께 제공해야 한다.
          example: 42
        report_version:
          type: integer
          minimum: 1
          description: 선택적 보고서 업무 버전. 다른 correlation 필드와 함께 제공해야 한다.
          example: 3

    ReportOverview:
      type: object
      required: [purpose, facility_summary, scope]
      properties:
        purpose: { type: string }
        facility_summary: { type: string }
        scope: { type: string }

    ReportSummary:
      type: object
      required: [overall_opinion, total_count, count_by_grade, key_findings]
      properties:
        overall_opinion: { type: string }
        total_count: { type: integer, minimum: 0 }
        count_by_grade:
          type: object
          additionalProperties: { type: integer, minimum: 0 }
        key_findings:
          type: array
          items: { type: string }

    ReportDetailItem:
      type: object
      required: [defect_type, location, severity_grade, description, cause]
      properties:
        defect_type: { type: string }
        location: { type: string }
        severity_grade: { type: string, enum: [A, B, C, D, E] }
        description: { type: string }
        cause: { type: string }

    ReportRecommendationItem:
      type: object
      required: [target, method, priority, legal_basis, legal_basis_verified]
      properties:
        target: { type: string }
        method: { type: string }
        priority: { type: string }
        legal_basis: { type: string }
        legal_basis_verified: { type: boolean }

    ReportGenerateData:
      type: object
      required: [overview, summary, detail, recommendation, grounding_ok]
      properties:
        overview: { $ref: "#/components/schemas/ReportOverview" }
        summary: { $ref: "#/components/schemas/ReportSummary" }
        detail:
          type: object
          required: [items]
          properties:
            items:
              type: array
              items: { $ref: "#/components/schemas/ReportDetailItem" }
        recommendation:
          type: object
          required: [items, monitoring_points]
          properties:
            items:
              type: array
              items: { $ref: "#/components/schemas/ReportRecommendationItem" }
            monitoring_points:
              type: array
              items: { type: string }
        grounding_ok: { type: boolean }
        grounding_request_id:
          type: string
          minLength: 1
          description: correlation 요청에서 세 필드를 모두 제공한 경우에만 존재한다.
        inspection_id:
          type: integer
          format: int64
          minimum: 1
          description: correlation 요청에서 세 필드를 모두 제공한 경우에만 존재한다.
        report_version:
          type: integer
          minimum: 1
          description: correlation 요청에서 세 필드를 모두 제공한 경우에만 존재한다.
        content_hash:
          type: string
          pattern: "^[0-9a-f]{64}$"
          description: correlation 필드를 제외한 보고서 본문 canonical JSON의 SHA-256 hex.

    ReportAIResponse:
      type: object
      required: [success, data, usage, error]
      properties:
        success: { type: boolean }
        data:
          nullable: true
          allOf:
            - { $ref: "#/components/schemas/ReportGenerateData" }
        usage:
          nullable: true
          allOf:
            - { $ref: "#/components/schemas/AIUsage" }
        error:
          nullable: true
          allOf:
            - { $ref: "#/components/schemas/AIError" }

    FastApiValidationError:
      type: object
      required: [detail]
      properties:
        detail:
          type: array
          items:
            type: object
            additionalProperties: true

    # ── grounding-check (구현됨, ai-server/ai/core/grounding.py) ──
    GroundingDefect:
      type: object
      description: 대조 기준이 되는 실측 하자 1건
      required: [defect_type, grade]
      properties:
        defect_type: { type: string, example: 균열 }
        grade: { type: string, enum: [A, B, C, D, E], example: B }

    GroundingClaims:
      type: object
      description: 생성물(LLM 출력)이 주장하는 수치·등급 — 체인의 structured output에서 채운다
      properties:
        total_count: { type: integer, nullable: true, example: 1 }
        count_by_grade:
          type: object
          additionalProperties: { type: integer }
          example: { "B": 1 }
        count_by_type:
          type: object
          additionalProperties: { type: integer }
          example: { "균열": 1 }
        mentioned_grades:
          type: array
          items: { type: string }
          example: ["B"]

    GroundingCheckRequest:
      type: object
      required: [defects, claims]
      properties:
        defects:
          type: array
          items: { $ref: "#/components/schemas/GroundingDefect" }
        claims: { $ref: "#/components/schemas/GroundingClaims" }
        on_mismatch:
          type: string
          enum: [regenerate, warn]
          default: regenerate
          description: 불일치 발생 시 조치 — REGENERATE(재생성 권고) | WARN(경고 배지)

    GroundingCheckItem:
      type: object
      properties:
        field: { type: string, example: "grade:B" }
        claimed: { type: string, example: "1" }
        actual: { type: string, example: "1" }
        status: { type: string, enum: [MATCH, MISMATCH, UNVERIFIABLE] }
        detail: { type: string }

    GroundingResult:
      type: object
      description: AIResponse.data 의 실제 형태(성공 시) — grounded=True 라도 action!=PASS 면 경고 배지 필요(#121)
      properties:
        grounded: { type: boolean }
        action: { type: string, enum: [PASS, REGENERATE, WARN] }
        ground_truth:
          type: object
          properties:
            total_count: { type: integer }
            count_by_grade:
              type: object
              additionalProperties: { type: integer }
            count_by_type:
              type: object
              additionalProperties: { type: integer }
        checks:
          type: array
          items: { $ref: "#/components/schemas/GroundingCheckItem" }
        mismatches:
          type: array
          items: { $ref: "#/components/schemas/GroundingCheckItem" }
        unverifiable:
          type: array
          items: { $ref: "#/components/schemas/GroundingCheckItem" }

    # ── briefing (구현됨, ai-server/ai/chains/briefing_chain.py) ──
    DashboardStats:
      type: object
      description: 대시보드 현황 데이터(브리핑 입력) — 값은 백엔드 집계 실측치
      required:
        [
          total_facilities,
          monthly_analysis,
          pending_review,
          pending_action,
          this_week_defects,
          last_week_defects,
          top_defect_type,
          critical_defects,
        ]
      properties:
        total_facilities: { type: integer, example: 12 }
        monthly_analysis: { type: integer, example: 34 }
        pending_review: { type: integer, example: 5 }
        pending_action: { type: integer, example: 2 }
        this_week_defects: { type: integer, example: 8 }
        last_week_defects: { type: integer, example: 10 }
        top_defect_type: { type: string, example: 균열 }
        critical_defects: { type: integer, example: 1 }
        grade_distribution:
          type: object
          additionalProperties: { type: integer }
          example: { "A": 3, "B": 4, "C": 1 }

    WeeklyBriefing:
      type: object
      description: AIResponse.data 의 실제 형태(성공 시)
      properties:
        briefing: { type: string, description: "카드 본문(2~4문장)" }
        recommendation: { type: string, description: "권고 조치(1~2문장)" }
        facts:
          type: object
          description: 코드로 계산한 파생 사실(프론트 배지용)
          properties:
            this_week_defects: { type: integer }
            last_week_defects: { type: integer }
            change_pct: { type: integer, nullable: true }
            trend: { type: string, enum: [감소, 증가, 유지] }
            top_defect_type: { type: string }
            critical_defects: { type: integer }

    # ── 기업 인증 (구현됨, backend/auth) ──
    CompanySignupRequest:
      type: object
      description: multipart/form-data(@ModelAttribute) — 약관 버전은 서버 소유, 클라이언트는 동의 여부만 전송
      required:
        [
          email,
          password,
          companyName,
          businessRegistrationNumber,
          representativeName,
          address,
          agreeTermsOfService,
          agreePrivacyPolicy,
        ]
      properties:
        email: { type: string, format: email, example: company@haja.com }
        password: { type: string, format: password, description: "8자 이상, 영문+숫자 포함", example: "pw123456" }
        companyName: { type: string, maxLength: 200, example: "(주)하자체크" }
        businessRegistrationNumber: { type: string, pattern: '\d{3}-?\d{2}-?\d{5}', example: "123-45-67890" }
        representativeName: { type: string, maxLength: 100, example: 김민수 }
        address: { type: string, maxLength: 300, example: 서울시 강남구 ... }
        addressDetail: { type: string, maxLength: 200, nullable: true }
        agreeTermsOfService: { type: boolean }
        agreePrivacyPolicy: { type: boolean }
        businessRegistrationFile:
          type: string
          format: binary
          description: "필수, MIME∈{image/jpeg,image/png,application/pdf}, ≤10MB"

    CompanySignupResponse:
      type: object
      description: signupToken 은 승인 대기 화면 상태조회용 불투명 랜덤 문자열(PK 비노출)
      properties:
        companyId: { type: integer, format: int64, example: 1 }
        maskedEmail: { type: string, example: "h***@c***.com" }
        status: { type: string, enum: [PENDING_REVIEW, APPROVED, REJECTED], example: PENDING_REVIEW }
        signupToken: { type: string }

    CompanySignupApiResponse:
      type: object
      properties:
        success: { type: boolean, example: true }
        data: { $ref: "#/components/schemas/CompanySignupResponse" }
        error: { type: object, nullable: true, example: null }

    EmailAvailabilityResponse:
      type: object
      properties:
        available: { type: boolean }

    EmailAvailabilityApiResponse:
      type: object
      properties:
        success: { type: boolean, example: true }
        data: { $ref: "#/components/schemas/EmailAvailabilityResponse" }
        error: { type: object, nullable: true, example: null }

    SignupStatusResponse:
      type: object
      description: rejectionReason 은 REJECTED 일 때만 존재
      properties:
        status: { type: string, enum: [PENDING_REVIEW, APPROVED, REJECTED] }
        companyName: { type: string }
        rejectionReason: { type: string, nullable: true }

    SignupStatusApiResponse:
      type: object
      properties:
        success: { type: boolean, example: true }
        data: { $ref: "#/components/schemas/SignupStatusResponse" }
        error: { type: object, nullable: true, example: null }

    FindIdRequest:
      type: object
      description: representativeName·companyName 중 최소 1개 필수(@AssertTrue)
      required: [businessRegistrationNumber]
      properties:
        businessRegistrationNumber: { type: string, example: "123-45-67890" }
        representativeName: { type: string, nullable: true, example: 김민수 }
        companyName: { type: string, nullable: true, example: "(주)하자체크" }

    FindIdResponse:
      type: object
      properties:
        maskedEmail: { type: string, example: "h***@c***.com" }

    FindIdApiResponse:
      type: object
      properties:
        success: { type: boolean, example: true }
        data: { $ref: "#/components/schemas/FindIdResponse" }
        error: { type: object, nullable: true, example: null }

    # ── notification 도메인 (AP-020, #25 / HAJA-38 FR-9) ──
    NotificationTypeCode:
      type: string
      enum: [ANALYSIS_DONE, REVIEW_PENDING, COUNSEL_REPLIED, INSPECTION_DUE]

    NotificationResponse:
      type: object
      additionalProperties: false
      required: [id, type, isRead, createdAt]
      description: >
        payload는 jsonb 원본을 이스케이프된 문자열이 아니라 구조화된 JSON 객체로 그대로 노출한다
        (알림 유형별로 표시·이동에 쓰는 부가 데이터 — 스키마는 유형마다 달라 자유 객체로 둔다).
      properties:
        id: { type: integer, format: int64, example: 1 }
        type: { $ref: "#/components/schemas/NotificationTypeCode" }
        payload:
          type: object
          nullable: true
          additionalProperties: true
          example: { inspectionId: 10 }
        isRead: { type: boolean, example: false }
        createdAt: { type: string, format: date-time }

    NotificationListApiResponse:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean }
        data:
          nullable: true
          type: array
          items: { $ref: "#/components/schemas/NotificationResponse" }
        error:
          nullable: true
          oneOf:
            - { $ref: "#/components/schemas/ApiError" }

    # ── ai-server OCR stub (구현됨, ai-server/routers/ai_router.py 약 224~245행, HAJA-169) ──
    BusinessLicenseOcrRequest:
      type: object
      description: 둘 다 stub 단계는 사용하지 않는다(seam only) — 향후 실제 OCR 교체 시 채택.
      properties:
        image_base64: { type: string, nullable: true }
        file_ref: { type: string, nullable: true }

    BusinessLicenseOcrData:
      type: object
      description: AIResponse.data 의 실제 형태 — stub 은 항상 이 고정값을 반환한다.
      required: [businessRegistrationNumber, companyName, representativeName, raw, stub]
      properties:
        businessRegistrationNumber: { type: string, nullable: true, example: null }
        companyName: { type: string, nullable: true, example: null }
        representativeName: { type: string, nullable: true, example: null }
        raw: { type: object, example: {} }
        stub: { type: boolean, example: true }

    BusinessLicenseOcrAIResponse:
      type: object
      description: 내부 /ai/business-license-ocr 전용 AIResponse envelope(stub 은 항상 success=true)
      required: [success, data, error]
      properties:
        success: { type: boolean, example: true }
        data:
          nullable: true
          oneOf:
            - { $ref: "#/components/schemas/BusinessLicenseOcrData" }
        usage:
          nullable: true
          oneOf:
            - { $ref: "#/components/schemas/AIUsage" }
        error:
          nullable: true
          oneOf:
            - { $ref: "#/components/schemas/AIError" }

    # ── 계정복구 — 비밀번호 재설정 (구현됨, backend/auth, #194 / HAJA-172) ──
    PasswordResetLinkRequest:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email, example: company@haja.com }

    PasswordResetLinkResponse:
      type: object
      description: >
        계정 존재 여부와 무관하게 항상 동일한 값(계정 열거 방지). resetToken 은 절대 포함하지 않는다
        (메일로만 전달).
      required: [requested]
      properties:
        requested: { type: boolean, example: true }

    PasswordResetLinkApiResponse:
      type: object
      properties:
        success: { type: boolean, example: true }
        data: { $ref: "#/components/schemas/PasswordResetLinkResponse" }
        error: { type: object, nullable: true, example: null }

    PasswordResetRequest:
      type: object
      description: newPassword 정책은 가입(CompanySignupRequest.password)과 동일 — 8자 이상, 영문+숫자 포함.
      required: [token, newPassword]
      properties:
        token: { type: string, description: 메일 링크의 1회용 재설정 토큰 }
        newPassword: { type: string, format: password, minLength: 8, example: "newPw123456" }

    PasswordResetResponse:
      type: object
      required: [reset]
      properties:
        reset: { type: boolean, example: true }

    PasswordResetApiResponse:
      type: object
      properties:
        success: { type: boolean, example: true }
        data: { $ref: "#/components/schemas/PasswordResetResponse" }
        error: { type: object, nullable: true, example: null }

    # ── 마이페이지(멤버십) — 내 플랜·사용량·좌석 (구현됨, backend/membership, HAJA-177) ──
    MyPlanResponse:
      type: object
      required: [plan, limits, usage]
      properties:
        plan:
          type: object
          required: [name, priceMonthly, status]
          properties:
            name: { type: string, enum: [FREE, STANDARD, ENTERPRISE], example: STANDARD }
            priceMonthly: { type: number, example: 99000 }
            status: { type: string, enum: [ACTIVE, EXPIRED, UPGRADE_REQUESTED], example: ACTIVE }
        limits:
          type: object
          description: plans.max_* 가 null(무제한)이면 null 을 그대로 반환한다.
          required: [maxFacilities, maxMonthlyAnalyses, maxSeats]
          properties:
            maxFacilities: { type: integer, nullable: true, example: 20 }
            maxMonthlyAnalyses: { type: integer, nullable: true, example: 100 }
            maxSeats: { type: integer, nullable: true, example: 5 }
        usage:
          type: object
          required: [facilityCount, analyzedImageCount, seatCount, period]
          properties:
            facilityCount: { type: integer, example: 3 }
            analyzedImageCount: { type: integer, example: 12 }
            seatCount: { type: integer, example: 2 }
            period: { type: string, format: date, description: "집계 기준월 1일(KST)", example: "2026-07-01" }

    MyPlanApiResponse:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean }
        data:
          nullable: true
          oneOf:
            - { $ref: "#/components/schemas/MyPlanResponse" }
        error:
          nullable: true
          oneOf:
            - { $ref: "#/components/schemas/ApiError" }

    SeatsResponse:
      type: object
      description: >
        개인 사용자는 본인 1인만 담은 목록(used=1)을 반환한다. 이메일은 회사 내부 팀 명부이므로
        비마스킹(동일 회사 소속만 조회 가능).
      required: [used, limit, members]
      properties:
        used: { type: integer, description: "회사 소속 ACTIVE 사용자 총원 수(목록 상한과 무관한 정확한 count)", example: 3 }
        limit: { type: integer, nullable: true, example: 5 }
        members:
          type: array
          maxItems: 200
          items:
            type: object
            required: [userId, name, email, role, status]
            properties:
              userId: { type: integer, format: int64, example: 1 }
              name: { type: string, example: 김민수 }
              email: { type: string, example: member@haja.com }
              role: { type: string, enum: [ADMIN, INSPECTOR, USER, COUNSELOR], example: USER }
              status: { type: string, enum: [ACTIVE, SUSPENDED, WITHDRAWN], example: ACTIVE }

    SeatsApiResponse:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean }
        data:
          nullable: true
          oneOf:
            - { $ref: "#/components/schemas/SeatsResponse" }
        error:
          nullable: true
          oneOf:
            - { $ref: "#/components/schemas/ApiError" }

    UpgradeInquiryResponse:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [ACTIVE, EXPIRED, UPGRADE_REQUESTED], example: UPGRADE_REQUESTED }

    UpgradeInquiryApiResponse:
      type: object
      properties:
        success: { type: boolean, example: true }
        data: { $ref: "#/components/schemas/UpgradeInquiryResponse" }
        error: { type: object, nullable: true, example: null }

    # ── 관리자 플랜·쿼터 관리 (구현됨, backend/admin, FR-8-A #507 / HAJA-258) ──
    AdminPlanItem:
      type: object
      description: 요금제 카탈로그 항목. max_* 는 무제한이면 null.
      required:
        [id, name, maxFacilities, maxMonthlyAnalyses, maxSeats, hasPdfWatermark, hasCounselorAccess, hasAiAddon, priceMonthly]
      properties:
        id: { type: integer, format: int64, example: 2 }
        name: { type: string, enum: [FREE, STANDARD, ENTERPRISE], example: STANDARD }
        maxFacilities: { type: integer, nullable: true, example: 10 }
        maxMonthlyAnalyses: { type: integer, nullable: true, example: 300 }
        maxSeats: { type: integer, example: 5 }
        hasPdfWatermark: { type: boolean, example: false }
        hasCounselorAccess: { type: boolean, example: true }
        hasAiAddon: { type: boolean, example: true }
        priceMonthly: { type: number, nullable: true, example: 29000 }

    AdminPlanCatalogResponse:
      type: object
      required: [plans]
      properties:
        plans:
          type: array
          items: { $ref: "#/components/schemas/AdminPlanItem" }

    AdminPlanCatalogApiResponse:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean }
        data:
          nullable: true
          oneOf:
            - { $ref: "#/components/schemas/AdminPlanCatalogResponse" }
        error:
          nullable: true
          oneOf:
            - { $ref: "#/components/schemas/ApiError" }

    AdminPlanResponse:
      type: object
      description: >
        회사 귀속 현재 구독의 요금제·상태·이번 달 사용량. usage 는 usage_counters 를 읽기만 하며(집계 증가는
        QuotaInterceptor 책임) 당월 집계 행이 없으면 0.
      required: [subscriptionId, plan, status, startedAt, usage]
      properties:
        subscriptionId: { type: integer, format: int64, example: 41 }
        plan: { $ref: "#/components/schemas/AdminPlanItem" }
        status: { type: string, enum: [ACTIVE, EXPIRED, UPGRADE_REQUESTED], example: ACTIVE }
        startedAt: { type: string, format: date-time, example: "2026-07-21T09:00:00Z" }
        usage:
          type: object
          required: [analyzedImageCount, analysisRequestCount, facilityCount, seatCount, period]
          properties:
            analyzedImageCount: { type: integer, example: 12 }
            analysisRequestCount: { type: integer, example: 8 }
            facilityCount: { type: integer, example: 3 }
            seatCount: { type: integer, example: 2 }
            period: { type: string, format: date, description: "집계 기준월 1일(KST)", example: "2026-07-01" }

    AdminPlanApiResponse:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean }
        data:
          nullable: true
          oneOf:
            - { $ref: "#/components/schemas/AdminPlanResponse" }
        error:
          nullable: true
          oneOf:
            - { $ref: "#/components/schemas/ApiError" }

    AdminPlanChangeRequest:
      type: object
      required: [planName]
      properties:
        planName: { type: string, enum: [FREE, STANDARD, ENTERPRISE], example: STANDARD }

    AdminPlanHistoryEntry:
      type: object
      description: 회사 구독 변경 이력 1건(user_plans 행 하나). endedAt 이 null 이면 현재 유효 구독.
      required: [subscriptionId, planName, status, startedAt, endedAt]
      properties:
        subscriptionId: { type: integer, format: int64, example: 41 }
        planName: { type: string, enum: [FREE, STANDARD, ENTERPRISE], example: STANDARD }
        status: { type: string, enum: [ACTIVE, EXPIRED, UPGRADE_REQUESTED], example: ACTIVE }
        startedAt: { type: string, format: date-time, example: "2026-07-21T09:00:00Z" }
        endedAt: { type: string, format: date-time, nullable: true, example: null }

    AdminPlanHistoryResponse:
      type: object
      required: [history, page, size, totalElements]
      properties:
        history:
          type: array
          items: { $ref: "#/components/schemas/AdminPlanHistoryEntry" }
        page: { type: integer, example: 1 }
        size: { type: integer, example: 20 }
        totalElements: { type: integer, format: int64, example: 3 }

    AdminPlanHistoryApiResponse:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean }
        data:
          nullable: true
          oneOf:
            - { $ref: "#/components/schemas/AdminPlanHistoryResponse" }
        error:
          nullable: true
          oneOf:
            - { $ref: "#/components/schemas/ApiError" }

    AdminPlanQuotaMember:
      type: object
      description: 회사 소속 멤버(개인 계정) 1명의 이번 달 쿼터 사용 현황 한 행. plan/quotaLimit 은 회사 단위
        구독값이라 모든 행에서 동일(활성 구독 없으면 둘 다 null). quotaUsed 만 멤버별로 다르다(근사치).
      required: [id, name, email, plan, quotaUsed, quotaLimit]
      properties:
        id: { type: integer, format: int64, example: 12 }
        name: { type: string, example: "김민준" }
        email: { type: string, example: "minjun.kim@company.com" }
        plan: { type: string, enum: [FREE, STANDARD, ENTERPRISE], nullable: true, example: STANDARD }
        quotaUsed: { type: integer, example: 145 }
        quotaLimit: { type: integer, nullable: true, example: 1000 }

    AdminPlanQuotaStats:
      type: object
      description: KPI 카드·"현재 플랜" 카드 값 — 검색어(keyword)와 무관하게 회사 전체 기준으로 집계.
      required: [activeUsers, totalQuotaUsagePercent, companyPlan]
      properties:
        activeUsers: { type: integer, format: int64, example: 7 }
        totalQuotaUsagePercent: { type: integer, example: 72 }
        companyPlan: { type: string, enum: [FREE, STANDARD, ENTERPRISE], nullable: true, example: STANDARD }

    AdminPlanQuotaResponse:
      type: object
      required: [content, page, size, totalElements, stats]
      properties:
        content:
          type: array
          items: { $ref: "#/components/schemas/AdminPlanQuotaMember" }
        page: { type: integer, example: 1 }
        size: { type: integer, example: 10 }
        totalElements: { type: integer, format: int64, example: 8 }
        stats: { $ref: "#/components/schemas/AdminPlanQuotaStats" }

    AdminPlanQuotaApiResponse:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean }
        data:
          nullable: true
          oneOf:
            - { $ref: "#/components/schemas/AdminPlanQuotaResponse" }
        error:
          nullable: true
          oneOf:
            - { $ref: "#/components/schemas/ApiError" }

    # ── 대시보드 개요 집계 (구현됨, backend/core/dashboard, HAJA-17 / dev-03-01) ──
    DashboardSummaryResponse:
      type: object
      required:
        [
          totalFacilities,
          totalFacilitiesChangeRate,
          monthlyAnalyzed,
          monthlyAnalyzedChangeRate,
          pendingReview,
          pendingReviewChangeRate,
          pendingAction,
          pendingActionChangeRate,
        ]
      properties:
        totalFacilities: { type: integer, format: int64, example: 12 }
        totalFacilitiesChangeRate: { type: number, format: double, example: 20.0 }
        monthlyAnalyzed: { type: integer, format: int64, example: 34 }
        monthlyAnalyzedChangeRate: { type: number, format: double, example: -5.5 }
        pendingReview: { type: integer, format: int64, example: 5 }
        pendingReviewChangeRate: { type: number, format: double, example: 0.0 }
        pendingAction: { type: integer, format: int64, example: 2 }
        pendingActionChangeRate: { type: number, format: double, example: 100.0 }

    DashboardSummaryApiResponse:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean }
        data:
          nullable: true
          oneOf:
            - { $ref: "#/components/schemas/DashboardSummaryResponse" }
        error:
          nullable: true
          oneOf:
            - { $ref: "#/components/schemas/ApiError" }

    GradeDistributionItem:
      type: object
      description: >
        하자가 한 건이라도 있으면 A~E 5개 전부(집계 없는 등급은 percent=0), 등급 분류된 하자가 0건이면
        빈 목록(#347) — "데이터 없음"과 "전 등급 0%"는 다른 상태다.
      required: [grade, percent]
      properties:
        grade: { type: string, enum: [A, B, C, D, E] }
        percent: { type: number, format: double, minimum: 0, maximum: 100 }

    GradeDistributionListApiResponse:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean }
        data:
          nullable: true
          type: array
          items: { $ref: "#/components/schemas/GradeDistributionItem" }
        error:
          nullable: true
          oneOf:
            - { $ref: "#/components/schemas/ApiError" }

    PendingPriorityItem:
      type: object
      description: location 은 시설물 명칭까지만 제공한다(세부 위치 컬럼 없음).
      required: [id, grade, title, location, occurredAt]
      properties:
        id: { type: integer, format: int64 }
        grade: { $ref: "#/components/schemas/NullableDefectGradeCode" }
        title: { type: string, description: "하자 유형 한글 라벨", example: 균열 }
        location: { type: string, example: "하자체크 1동" }
        occurredAt: { type: string, format: date-time }

    PendingPriorityListApiResponse:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean }
        data:
          nullable: true
          type: array
          items: { $ref: "#/components/schemas/PendingPriorityItem" }
        error:
          nullable: true
          oneOf:
            - { $ref: "#/components/schemas/ApiError" }

    RecentInspectionItem:
      type: object
      description: >
        status 는 DB 6단계를 화면 4단계로 축약: CREATED/UPLOADING/ANALYZING→분석중, ANALYZED→검수대기,
        REVIEWED→조치대기, REPORTED→완료.
      required: [id, facilityName, inspectedAt, inspector, defectCount, status]
      properties:
        id: { type: integer, format: int64 }
        facilityName: { type: string }
        inspectedAt: { type: string, format: date }
        inspector: { type: string }
        defectCount: { type: integer, format: int64, minimum: 0 }
        status: { type: string, enum: [분석중, 검수대기, 조치대기, 완료] }

    RecentInspectionListApiResponse:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean }
        data:
          nullable: true
          type: array
          items: { $ref: "#/components/schemas/RecentInspectionItem" }
        error:
          nullable: true
          oneOf:
            - { $ref: "#/components/schemas/ApiError" }

    # ── AI 프록시 (구현됨, backend/core/ai, #228·#239·#248 / HAJA-188·192·197) ──
    DefectExplainApiResponse:
      type: object
      description: >
        POST /api/ai/defect-explain 전용 Spring ApiResponse envelope — data 형태는 내부
        AIResponse.data(DefectExplain)와 동일(cause/risk/action).
      required: [success, data, error]
      properties:
        success: { type: boolean }
