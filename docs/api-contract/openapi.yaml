        전용이라 true만 허용 — 이 API로 복구(false)는 지원하지 않는다.
      required: [reason]
      properties:
        grade: { $ref: "#/components/schemas/DefectGradeCode" }
        isDeleted: { type: boolean, enum: [true] }
        reason:
          type: string
          minLength: 1
          maxLength: 500
          description: defect_revisions.reason — 오탐/등급 조정 사유(검수 감사 추적)

    DefectCreateRequest:
      type: object
      additionalProperties: false
      description: >
        POST /api/inspections/{id}/defects 요청 DTO(HAJA-344 #622).
        type은 필수. bbox는 선택적이나 4개(bboxX, Y, W, H) 모두 지정하거나 모두 미지정해야 한다.
        grade는 선택적이며, 미지정 시 미검수 상태로 저장된다.
      required: [type]
      properties:
        type: { $ref: "#/components/schemas/DefectTypeCode" }
        bboxX: { type: number, format: double, nullable: true, description: 경계상자 X 좌표(0~1, 정규화) }
        bboxY: { type: number, format: double, nullable: true, description: 경계상자 Y 좌표(0~1, 정규화) }
        bboxW: { type: number, format: double, nullable: true, description: 경계상자 폭(0~1, 정규화) }
        bboxH: { type: number, format: double, nullable: true, description: 경계상자 높이(0~1, 정규화) }
        grade: { $ref: "#/components/schemas/NullableDefectGradeCode" }

    NlSearchRequest:
      type: object
      additionalProperties: false
      required: [query]
      properties:
        query:
          type: string
          minLength: 1
          maxLength: 500
          description: 양끝 공백 제거 후 1~500자인 자연어 질의
          example: D등급 이상 조치 대기 하자

