          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "404":
          description: 미존재 또는 타인 소유 (FACILITY_NOT_FOUND)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }

