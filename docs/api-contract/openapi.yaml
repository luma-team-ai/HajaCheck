        DefectListItem + 뷰어 오버레이·정밀 검수에 필요한 필드(bbox·균열 실측치). 목록(#/api/defects)은
        가벼운 DefectListItem을 쓰고, 점검 회차 단위 조회·검수 API는 이 스키마를 쓴다.
      required: [id, inspectionId, type, grade, status, confidence, isReviewed, createdAt]
      properties:
        id: { type: integer, format: int64 }
        inspectionId: { type: integer, format: int64 }
        type: { $ref: "#/components/schemas/DefectTypeCode" }
        grade: { $ref: "#/components/schemas/NullableDefectGradeCode" }
        status: { $ref: "#/components/schemas/DefectStatusCode" }
        confidence: { type: number, format: double, minimum: 0, maximum: 1 }
        isReviewed: { type: boolean }
        bboxX: { type: number, format: double, nullable: true }
        bboxY: { type: number, format: double, nullable: true }
        bboxW: { type: number, format: double, nullable: true }
        bboxH: { type: number, format: double, nullable: true }
        crackWidthMm: { type: number, format: double, nullable: true }
        crackLengthMm: { type: number, format: double, nullable: true }
        createdAt: { type: string, format: date-time }

    DefectDetailListApiResponse:
