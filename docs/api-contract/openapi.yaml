        POST /api/ai/report 전용 Spring ApiResponse envelope — data 형태는 내부
        AIResponse.data(ReportGenerateData)와 동일.
      required: [success, data, error]
      properties:
        success: { type: boolean }
        data:
          nullable: true
          oneOf:
            - { $ref: "#/components/schemas/ReportGenerateData" }
        error:
          nullable: true
          oneOf:
            - { $ref: "#/components/schemas/ApiError" }

    AiBriefingFacts:
      type: object
      description: >
        BriefingResponse.BriefingFacts(camelCase) — 내부 FastAPI WeeklyBriefing.facts(snake_case)를
        Spring이 @JsonAlias 로 읽어 camelCase 로 재직렬화한 값(shared/api/aiClient.ts 에 케이스 변환
        인터셉터가 없어 이 필드명이 곧 프론트 타입이다).
      properties:
        thisWeekDefects: { type: integer, nullable: true }
        lastWeekDefects: { type: integer, nullable: true }
        changePct: { type: integer, nullable: true }
        trend: { type: string, enum: [감소, 증가, 유지] }
        topDefectType: { type: string, nullable: true }
        criticalDefects: { type: integer, nullable: true }

    AiBriefingResponse:
      type: object
      description: POST /api/ai/briefing 성공 데이터 — Spring BriefingResponse 그대로(camelCase).
      properties:
        briefing: { type: string }
        recommendation: { type: string }
        facts: { $ref: "#/components/schemas/AiBriefingFacts" }

    BriefingApiResponse:
      type: object
      description: POST /api/ai/briefing 전용 Spring ApiResponse envelope
      required: [success, data, error]
      properties:
        success: { type: boolean }
        data:
          nullable: true
          oneOf:
            - { $ref: "#/components/schemas/AiBriefingResponse" }
        error:
          nullable: true
          oneOf:
            - { $ref: "#/components/schemas/ApiError" }

    # ── 보고서 (구현됨, backend/core/report, #446·#455 / HAJA-283) ──
    ReportStatusCode:
      type: string
      enum: [DRAFT, FINALIZED]

    ReportDetailResponse:
      type: object
      description: >
        content 는 저장 시 이미 JsonValidator 로 검증된 JSON 문자열을 파싱한 구조(ReportGenerateData 형태,
        하지만 편집 가능한 자유 객체라 스키마를 강제하지 않는다). groundingCheckPassed 는 초안 생성/재검증
        직후에만 채워지고, 본문 수정(PATCH) 시 null 로 초기화된다.
      required: [id, inspectionId, version, content, status, createdBy, createdAt]
      properties:
        id: { type: integer, format: int64 }
        inspectionId: { type: integer, format: int64 }
        version: { type: integer, minimum: 1 }
        content: { type: object, description: "보고서 본문 JSON(자유 구조, 편집 가능)" }
        status: { $ref: "#/components/schemas/ReportStatusCode" }
        groundingCheckPassed: { type: boolean, nullable: true }
        pdfUrl: { type: string, nullable: true, example: "/api/reports/1/pdf/abc123.pdf" }
        editedBy: { type: integer, format: int64, nullable: true }
        createdBy: { type: integer, format: int64 }
        createdAt: { type: string, format: date-time }

    ReportDetailApiResponse:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean }
        data:
          nullable: true
          oneOf:
            - { $ref: "#/components/schemas/ReportDetailResponse" }
        error:
          nullable: true
          oneOf:
            - { $ref: "#/components/schemas/ApiError" }

    ReportSummaryItem:
      type: object
      required: [id, inspectionId, version, status, createdAt]
      properties:
        id: { type: integer, format: int64 }
        inspectionId: { type: integer, format: int64 }
        version: { type: integer, minimum: 1 }
        status: { $ref: "#/components/schemas/ReportStatusCode" }
        groundingCheckPassed: { type: boolean, nullable: true }
        createdAt: { type: string, format: date-time }

    ReportSummaryListApiResponse:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean }
        data:
          nullable: true
          type: array
          items: { $ref: "#/components/schemas/ReportSummaryItem" }
        error:
          nullable: true
          oneOf:
            - { $ref: "#/components/schemas/ApiError" }

    UpdateReportContentRequest:
      type: object
      required: [contentJson]
      properties:
        contentJson: { type: string, description: "보고서 본문 전체 교체용 JSON 문자열(유효한 JSON이어야 함)" }

    FinalizeReportRequest:
      type: object
      required: [pdfUrl]
      properties:
        pdfUrl:
          type: string
          description: "이 보고서의 업로드 엔드포인트 prefix(/api/reports/{id}/pdf/)로 시작해야 한다(#455 P2-2)"
          example: "/api/reports/1/pdf/abc123.pdf"

    ReportPdfResponse:
      type: object
      required: [pdfUrl]
      properties:
        pdfUrl: { type: string, example: "/api/reports/1/pdf/abc123.pdf" }

    ReportPdfApiResponse:
      type: object
      properties:
        success: { type: boolean, example: true }
        data: { $ref: "#/components/schemas/ReportPdfResponse" }
        error: { type: object, nullable: true, example: null }
