openapi: 3.0.3
info:
  title: hajaCheck API
  version: "0.6.0-draft"
  description: >
    Contract-First 초안 (PRD §6, §8). 실제 소스 오브 트루스는 이 파일.
    2026-07-19 GET /api/notifications(AP-020, #25 / HAJA-38 FR-9) 계약 추가.
    2026-07-18 미릴리스 draft baseline을 현재 구현에 맞게 정정했다.
    구현된 엔드포인트(ai-server)는 실행 후 /docs(Swagger UI)에서 최신본 재확인 가능.
    나머지(Spring Boot)는 각 담당자가 이 파일에 스펙을 채워나감 — 임의로 필드명·구조를 바꾸지 말 것.
servers:
  - url: /api
    description: Spring Boot (백엔드)
  - url: /ai
    description: >
      FastAPI (ai-server) — **내부 전용**. 외부 공개 안 됨(nginx 공개 `/ai/` 제거, #236).
      스프링 `/api/ai/*` 프록시만 호출하며 `X-Internal-Key`(env `AI_INTERNAL_KEY`) 검증(설정 시 불일치 401, `/health` 제외).
      프론트는 이 서버를 직접 호출하지 않음 → `/api/ai/*`(세션 인증) 경유. 상세 `contract.md` §접근 모델.

paths:
  /health:
    get:
      summary: 헬스체크
      tags: [common]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }

  /ai/ping:
    get:
      summary: AI 서버 envelope 동작 확인
      tags: [ai]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AIResponse" }

  /ai/defect-explain:
    post:
      summary: AI 하자 원인·조치방안 설명 (FR-4 P1, 점검관리B)
      tags: [ai]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DefectExplainRequest" }
      responses:
        "200":
          description: 성공/실패 모두 200 — success 필드로 구분(AI_개발_컨벤션.md §4 표준 폴백)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AIResponse" }

  /ai/grounding-check:
    post:
      summary: 환각 방어 게이트 — 생성물 주장 수치·등급을 실측 defects와 코드로 대조 (HAJA-117)
      description: >
        LLM 호출 없음 — 결정론적 코드 대조. `ai-server/routers/ai_router.py` 구현됨(약 58~65행).
      tags: [ai]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/GroundingCheckRequest" }
      responses:
        "200":
          description: 성공/실패 모두 200 — success 필드로 구분
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AIResponse" }

  /ai/briefing:
    post:
      summary: 대시보드 AI 주간 브리핑 (대시보드 P1)
      description: >
        현황 데이터(코드 집계) → 자연어 요약. 전주 대비 변화율·추세는 코드로 계산해 프롬프트에 주입하고
        LLM은 자연어만 생성(수치 환각 방지). `ai-server/routers/ai_router.py` 구현됨(약 68~75행).
      tags: [ai]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DashboardStats" }
      responses:
        "200":
          description: 성공/실패 모두 200 — success 필드로 구분
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AIResponse" }

  /ai/report:
    post:
      summary: AI 보고서 4개 섹션 병렬 생성 및 Grounding Check (FR-5, 로그인/보고서 담당)
      description: >
        구현된 내부 전용 FastAPI 라우트다. 외부 클라이언트는 인증된 Spring `/api/ai/report`
        프록시를 경유한다. grounding_request_id, inspection_id, report_version은 모두 제공하거나
        모두 생략해야 한다. 모두 생략하면 기존 호환 경로로 처리되어 응답의 correlation 필드와
        content_hash도 생략된다. 모두 제공하면 같은 correlation 값과 보고서 본문의 canonical JSON
        SHA-256 content_hash를 반환한다. 현재 Spring 프록시는 이 값을 서버에서 강제 생성하지 않고
        요청 값을 전달하므로, correlation은 선택적 무결성 대조 계약이며 권한·귀속 보장은 아니다.
      x-internal: true
      security:
        - InternalKey: []
      tags: [ai]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ReportGenerateRequest" }
      responses:
        "200":
          description: 성공 또는 AI/보고서 검증 실패 — success 필드로 구분
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReportAIResponse" }
        "422":
          description: >
            요청 모델 검증 실패. correlation 필드 일부 입력, 빈 grounding_request_id,
            1 미만 inspection_id/report_version 등이 해당하며 FastAPI detail[] 형식으로 반환한다.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FastApiValidationError" }

  /ai/rag-chat:
    post:
      summary: RAG 챗봇 질의 (FR-6, 고객지원)
      description: >
        (계획/미구현, 내부 전용) Spring Boot가 인증 사용자 소유이면서 session_type=RAG인
        세션인지 검증한 뒤 호출한다. 존재하지 않거나 타인 소유인 세션은 Spring Boot가
        동일하게 404로 처리하며 FastAPI를 호출하지 않는다. 프론트엔드는 이 엔드포인트를
        직접 호출하지 않는다. Spring Boot는 환경변수로 주입된 내부 서비스 토큰을
        X-Internal-Service-Token 헤더로 전달하고 FastAPI는 누락 또는 불일치 요청을 거부한다.
        운영 nginx는 이 경로를 FastAPI로 직접 프록시하지 않는다. 성공 시 AIResponse.data는 RagAnswerData(answer, sources[])
        형태이며, sources[]는 문서명·컬렉션·표시 라벨·원문 발췌·Chroma 청크 참조를 포함한다.
      x-internal: true
      security:
        - InternalServiceToken: []
      tags: [ai]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [question, session_id]
              properties:
                question: { type: string, example: "균열 보수 기준은 무엇인가요?" }
                session_id:
                  type: integer
                  format: int64
                  description: Spring Boot가 소유권과 RAG 세션 유형을 검증한 서버 관리 식별자
                  example: 42
      responses:
        "200":
          description: 성공/실패 모두 200 — success 필드로 구분
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AIResponse" }

  /ai/nl-search:
    post:
      summary: 자연어 질의를 하자 필터로 변환 (HAJA-120, 계획/미구현)
      description: >
        Spring Boot의 공개 POST /api/defects/nl-search 게이트웨이만 호출하는 내부 전용 경로다.
        FastAPI는 X-Internal-Service-Token이 누락되거나 일치하지 않으면 LLM 호출 전에 거부한다.
        DB를 조회하지 않고 질의를 NlSearchResult로 변환하며, 입력 검증 및 LLM 실패도 공통
        AIResponse envelope으로 반환한다. 운영 nginx는 이 경로를 외부에 직접 노출하지 않는다.
      x-internal: true
      security:
        - InternalServiceToken: []
      tags: [ai, defect]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/NlSearchRequest" }
      responses:
        "200":
          description: 성공 또는 VALIDATION_ERROR/LLM 오류 — success 필드로 구분
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NlSearchAIResponse" }
        "401":
          description: X-Internal-Service-Token 누락 또는 불일치
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AIResponse" }

  /api/auth/companies:
    post:
      summary: 기업 회원가입 (multipart/form-data)
      description: >
        User(passwordHash·ACTIVE) + Company(PENDING_REVIEW) + UserConsent(약관 2건) 원자 생성.
        `CompanySignupController.signup` 구현됨. 검증 실패는 401 금지(400/404/409만 사용).
      tags: [auth]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema: { $ref: "#/components/schemas/CompanySignupRequest" }
      responses:
        "201":
          description: 가입 신청 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CompanySignupApiResponse" }
        "409":
          description: AUTH_EMAIL_DUPLICATED | AUTH_BUSINESS_NUMBER_DUPLICATED
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "400":
          description: FILE_REQUIRED | FILE_INVALID_TYPE | FILE_TOO_LARGE | INVALID_INPUT
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }

  /api/auth/email-availability:
    get:
      summary: 이메일(아이디) 중복확인
      description: "`CompanySignupController.checkEmailAvailability` 구현됨."
      tags: [auth]
      parameters:
        - name: email
          in: query
          required: true
          schema: { type: string, format: email }
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EmailAvailabilityApiResponse" }

  /api/auth/companies/status:
    get:
      summary: 가입 상태 조회 (승인 대기 화면 새로고침)
      description: "`CompanySignupController.getSignupStatus` 구현됨. token=signupToken(불투명 문자열)."
      tags: [auth]
      parameters:
        - name: token
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SignupStatusApiResponse" }
        "404":
          description: AUTH_SIGNUP_TOKEN_INVALID
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }

  /api/auth/id-inquiry:
    post:
      summary: 아이디(이메일) 찾기
      description: >
        사업자등록번호 + (대표자명|상호명 최소 1개) 매칭 → 마스킹 이메일. 계정 열거 방지를 위해
        무매칭 시 통일 메시지. `AccountRecoveryController.findId` 구현됨.
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/FindIdRequest" }
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FindIdApiResponse" }
        "404":
          description: AUTH_ACCOUNT_NOT_FOUND
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }

  # ── 아래는 계획 단계(경로안) — 각 담당자가 구현 시 requestBody/responses 채울 것 ──

  /api/auth/login:
    post:
      summary: 자체(기업 email/password) 로그인
      description: >
        loginId(=email)/password 로 인증. 성공 시 세션 쿠키(SESSION) 발급.
        실패는 계정 열거 방지를 위해 id/pw/미존재/잠금 구분 없이 401 AUTH_INVALID_CREDENTIALS 로 통일.
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: 로그인 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserApiResponse" }
        "401":
          description: 인증 실패 (AUTH_INVALID_CREDENTIALS)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }

  /api/auth/logout:
    post:
      summary: 로그아웃
      description: 세션 무효화 + SecurityContext clear
      tags: [auth]
      responses:
        "200":
          description: 로그아웃 성공 (data=null)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VoidApiResponse" }

  /api/auth/oauth2/{provider}:
    get:
      summary: 소셜 로그인 시작 (Kakao/Google)
      description: >
        브라우저를 이 경로로 이동시키면 제공자 인가 화면으로 302 리다이렉트된다.
        인가 완료 후 서버가 콜백(/login/oauth2/code/{provider})을 처리하고,
        성공 시 app.oauth2.success-redirect, 실패 시 failure-redirect(프론트)로 리다이렉트한다.
      tags: [auth]
      parameters:
        - name: provider
          in: path
          required: true
          schema: { type: string, enum: [kakao, google] }
      responses:
        "302": { description: 제공자 인가 화면 또는 프론트로 리다이렉트 }

  /api/users/me:
    get:
      summary: 내 정보 조회
      description: 세션의 인증 사용자 정보 반환. 미인증 시 401 UNAUTHORIZED(JSON).
      tags: [auth]
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserApiResponse" }
        "401":
          description: 미인증 (UNAUTHORIZED)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }

  /api/facilities:
    post:
      summary: 시설물 등록
      description: >
        인증 사용자가 시설물을 등록한다. ownerId 는 요청 바디가 아니라 인증 주체에서 서버가 기록한다.
        name/type 은 필수(DDL NOT NULL), 나머지는 선택 입력이다.
      security:
        - SessionCookie: []
          XsrfToken: []
      tags: [facility]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/FacilityCreateRequest" }
      responses:
        "201":
          description: 시설물 등록 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FacilityApiResponse" }
        "400":
          description: 입력값 오류 (INVALID_INPUT)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "401":
          description: 미인증 (UNAUTHORIZED)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
    get:
      summary: 내 시설물 목록 조회
      description: 인증 주체가 소유한(ownerId 일치) 시설물만 반환한다.
      security:
        - SessionCookie: []
          XsrfToken: []
      tags: [facility]
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FacilityListApiResponse" }
        "401":
          description: 미인증 (UNAUTHORIZED)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }

  /api/facilities/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer, format: int64 }
    get:
      summary: 시설물 상세 조회
      description: >
        소유자 스코프로 조회한다. 미존재와 타인 소유를 구분하지 않고 모두 404 FACILITY_NOT_FOUND 로
        응답해 리소스 존재 여부 열거(cross-owner IDOR)를 차단한다.
        ⚠️ 현재 구현(PR #176)은 시설물 단건(FacilityResponse)만 반환한다. 점검이력(inspections) 결합은
        dev-04-02 후속 작업으로 미구현 — 아래 FacilityDetailResponse 참조(계획안).
      security:
        - SessionCookie: []
          XsrfToken: []
      tags: [facility]
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FacilityApiResponse" }
        "401":
          description: 미인증 (UNAUTHORIZED)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "404":
          description: 미존재 또는 타인 소유 (FACILITY_NOT_FOUND)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
    put:
      summary: 시설물 수정
      security:
        - SessionCookie: []
          XsrfToken: []
      tags: [facility]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/FacilityUpdateRequest" }
      responses:
        "200":
          description: 수정 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FacilityApiResponse" }
        "400":
          description: 입력값 오류 (INVALID_INPUT)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "401":
          description: 미인증 (UNAUTHORIZED)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "404":
          description: 미존재 또는 타인 소유 (FACILITY_NOT_FOUND)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
    delete:
      summary: 시설물 삭제
      description: 하드 삭제(facilities 테이블에 is_deleted 컬럼 없음).
      security:
        - SessionCookie: []
          XsrfToken: []
      tags: [facility]
      responses:
        "200":
          description: 삭제 성공 (data=null)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VoidApiResponse" }
        "401":
          description: 미인증 (UNAUTHORIZED)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "404":
          description: 미존재 또는 타인 소유 (FACILITY_NOT_FOUND)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }

  /api/facilities/{id}/schedule:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer, format: int64 }
    post:
      summary: 시설물 점검주기 설정
      description: >
        인증 사용자 소유의 시설물에 점검 주기(개월)를 설정하고 다음 점검일(nextInspectionDueAt)을
        산출·저장한다(FR-019, dev-04-03). 기준일은 1차로 "설정일(오늘)" 기준으로 산출한다
        (최종 점검일 기준 정교화는 dev-03-02 후속 작업). 미존재/타인 소유 모두 404 FACILITY_NOT_FOUND.
      security:
        - SessionCookie: []
          XsrfToken: []
      tags: [facility]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/FacilityScheduleRequest" }
      responses:
        "200":
          description: 점검주기 설정 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FacilityApiResponse" }
        "400":
          description: 입력값 오류 (INVALID_INPUT)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "401":
          description: 미인증 (UNAUTHORIZED)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "404":
          description: 미존재 또는 타인 소유 (FACILITY_NOT_FOUND)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }

  /api/inspections:
    post:
      summary: 점검(회차) 생성
      description: >
        인증 사용자가 접근 가능한 시설에 점검 회차를 생성하고 담당 점검자를 지정한다.
        assignedInspectorId는 ACTIVE이면서 INSPECTOR 또는 ADMIN인 사용자만 허용하며,
        createdBy는 요청 바디가 아니라 인증 주체에서 서버가 기록한다.
      security:
        - SessionCookie: []
          XsrfToken: []
      tags: [inspection]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/InspectionCreateRequest" }
      responses:
        "201":
          description: 점검 회차 생성 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InspectionApiResponse" }
        "400":
          description: 입력값 또는 담당 점검자 상태/역할 오류
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "401":
          description: 미인증
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "403":
          description: 시설 접근 권한 없음
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }

  /api/inspections/{id}/media:
    post:
      summary: 촬영 데이터 업로드
      description: >
        점검 회차에 이미지(JPG/PNG)를 다중 업로드한다(dev-05-03). 업로드는 동기 처리(매직바이트 검증
        → 원본 저장 → 썸네일 재인코딩 → EXIF/GPS 추출 → DB 저장까지 한 요청 안에서 완료)되므로
        202(Accepted)이 아니라 201(Created)로 확정한다. 영상(VIDEO)·프레임 자동 추출은 후속 PR 범위.
        원본은 어떤 응답에도 직접 노출되지 않는다 — thumbnailUrl은 인가된 다운로드 API 경로다.
      security:
        - SessionCookie: []
          XsrfToken: []
      tags: [media]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [files]
              properties:
                files:
                  type: array
                  minItems: 1
                  maxItems: 10
                  items: { type: string, format: binary }
      responses:
        "201":
          description: 업로드 성공(업로드된 각 파일에 대응하는 미디어 목록)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MediaListApiResponse" }
        "400":
          description: 파일 누락/형식 불일치(매직바이트 검증 실패)/용량 초과/개수 초과
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "401":
          description: 미인증
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "404":
          description: 점검 회차 미존재 또는 타인 소유(존재 여부 열거 방지 통일 응답)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }

  /api/media/{id}/thumbnail:
    get:
      summary: 미디어 썸네일 조회
      description: >
        재인코딩된 썸네일(JPEG) 바이트를 반환한다. 원본은 어떤 엔드포인트로도 직접 서빙하지 않는다
        (PRD FR-2 업로드 보안 검증). 원본 크기 재인코딩본("뷰어용") 서빙은 "결과 뷰어" 과업 범위.
      security:
        - SessionCookie: []
          XsrfToken: []
      tags: [media]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        "200":
          description: 썸네일 이미지(JPEG)
          content:
            image/jpeg:
              schema: { type: string, format: binary }
        "401":
          description: 미인증
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "404":
          description: 미디어 미존재 또는 타인 소유(존재 여부 열거 방지 통일 응답)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }

  /api/inspections/{id}/analyze:
    post:
      summary: AI 분석 요청
      tags: [inspection]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "202": { description: TODO — 황승현 확정 필요(비동기 잡 패턴) }

  /api/inspections/{id}/defects:
    get:
      summary: 분석 결과(하자 목록) 조회
      tags: [defect]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: TODO — 오영석 확정 필요 }

  /api/defects:
    get:
      summary: 하자 목록 검색·필터 (FR-012, 계획/미구현)
      description: >
        서버가 인증 주체로부터 조회 가능한 시설물 범위를 먼저 계산한다: 본인 소유 시설물(facilities.owner_id),
        회사 소속 공유 시설물(등록자가 아니어도 시설물 소유자와 요청자 양쪽 모두가 같은 회사에 대해 유효한
        company_memberships를 가진 경우에 한해 포함 — 요청자 자신의 멤버십이 미승인·회수·만료 상태면 제외),
        관리자는 전체 시설물. 이와 별개로 inspections.assigned_inspector_id가 본인인 점검 회차는
        시설물 범위 밖이어도 항상 포함한다. 모든 역할에서 defects.is_deleted=false를 강제한다. 아래 쿼리
        파라미터는 이 서버 유도 소유권 범위를 좁히는 용도로만 사용하며 클라이언트 입력으로 범위를 확장할 수
        없다. 정렬은 created_at DESC, id DESC로 고정해 페이지 간 결과 순서를 안정적으로 유지한다.
      security:
        - SessionCookie: []
      tags: [defect]
      parameters:
        - name: type
          in: query
          description: 하자 유형 코드 목록(콤마 구분)
          style: form
          explode: false
          schema:
            type: array
            uniqueItems: true
            items: { $ref: "#/components/schemas/DefectTypeCode" }
        - name: grade
          in: query
          description: 하자 등급 코드 목록(콤마 구분)
          style: form
          explode: false
          schema:
            type: array
            uniqueItems: true
            items: { $ref: "#/components/schemas/DefectGradeCode" }
        - name: status
          in: query
          description: 하자 상태 코드 목록(콤마 구분)
          style: form
          explode: false
          schema:
            type: array
            uniqueItems: true
            items: { $ref: "#/components/schemas/DefectStatusCode" }
        - name: confidenceMin
          in: query
          description: AI 탐지 신뢰도 하한(0~1)
          schema: { type: number, format: double, minimum: 0, maximum: 1 }
        - name: page
          in: query
          description: 0부터 시작하는 페이지 번호
          schema: { type: integer, minimum: 0, default: 0 }
        - name: size
          in: query
          description: 페이지 크기(최대 100)
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
      responses:
        "200":
          description: 소유권·논리 삭제·필터 조건을 모두 만족하는 하자 페이지
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DefectListApiResponse" }
        "401":
          description: 미인증
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "403":
          description: >
            인증됐지만 이 엔드포인트를 사용할 역할이 아님. 허용된 역할이지만 소유·배정 범위에
            결과가 없거나 필터/논리 삭제 조건 적용 후 0건이면 403이 아니라 200 빈 페이지를 반환한다.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }

  /api/defects/nl-search:
    post:
      summary: 하자 자연어 검색 공개 게이트웨이 (FR-013, 계획/미구현)
      description: >
        세션 인증과 점검자 역할을 검사하고 has_ai_addon=true인 활성 플랜만 허용한다.
        회사 플랜은 회사 status=APPROVED, verification_status=VERIFIED 및 company_memberships의
        유효한 승인 멤버십(status=APPROVED, 미회수, 미만료, users.company_id 일치)을 모두 검증하며
        users.company_id만으로 상속하지 않는다. 게이트 실패 시 내부
        FastAPI를 호출하지 않는다. 성공한 요청만 내부 POST /ai/nl-search로 전달하고 내부 오류 코드에서
        예외·토큰 값을 제거한 뒤 Spring ApiResponse로 보존한다.
      security:
        - SessionCookie: []
          XsrfToken: []
      tags: [defect, ai]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/NlSearchRequest" }
      responses:
        "200":
          description: 변환 성공 또는 전달된 LLM 오류 — success 필드로 구분
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NlSearchApiResponse" }
        "400":
          description: 빈 질의 또는 trim 후 500자 초과(INVALID_INPUT/VALIDATION_ERROR)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "401":
          description: 미인증
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }
        "403":
          description: 점검자 권한 없음 또는 AI 부가 기능 미보유(AI_ADDON_REQUIRED)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }

  /api/defects/{id}:
    patch:
      summary: 검수 — 오탐 수정·등급 조정 (defect_revisions append-only)
      tags: [defect]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: TODO — 오영석 확정 필요 }

  /api/reports:
    post:
      summary: 보고서 생성 요청 (비동기 잡 발족)
      tags: [report]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [facility_id, inspection_id]
              properties:
                facility_id: { type: integer, example: 1 }
                inspection_id: { type: integer, example: 10 }
      responses:
        "202":
          description: 보고서 생성 비동기 잡 발족 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  job_id: { type: string, example: "job-report-999" }

  /api/reports/{id}/pdf:
    get:
      summary: 보고서 PDF 다운로드
      tags: [report]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: PDF 파일 다운로드 성공
          content:
            application/pdf:
              schema: { type: string, format: binary }
        "404":
          description: 보고서 또는 PDF 파일을 찾을 수 없음

  /api/notifications:
    get:
      summary: 알림 목록 조회
      description: >
        AP-020(#25 / HAJA-38 FR-9). 로그인 사용자에게 온 알림을 읽음/미읽음 모두 포함해(센터는 이력 표시)
        생성일 최신순(동률 시 id desc) 상위 30건으로 반환한다. 수신자(userId)는 인증 주체에서만 취득하며
        요청 파라미터/바디로 받지 않는다(cross-owner IDOR 방지). 이벤트 발행(트리거)·읽음처리
        PATCH는 별도 계약(후속) — 이 엔드포인트는 조회만 다룬다.
      security:
        - SessionCookie: []
      tags: [notification]
      responses:
        "200":
          description: 조회 성공(알림이 없으면 빈 배열)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NotificationListApiResponse" }
        "401":
          description: 미인증 (UNAUTHORIZED)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorApiResponse" }

components:
  securitySchemes:
    InternalKey:
      type: apiKey
      in: header
      name: X-Internal-Key
      description: Spring Boot가 FastAPI 내부 호출에 부착하는 AI_INTERNAL_KEY
    InternalServiceToken:
      type: apiKey
      in: header
      name: X-Internal-Service-Token
      description: Spring Boot와 FastAPI 환경변수에만 주입하는 내부 호출 토큰
    SessionCookie:
      type: apiKey
      in: cookie
      name: SESSION
      description: Spring Security 인증 세션 쿠키
    XsrfToken:
      type: apiKey
      in: header
      name: X-XSRF-TOKEN
      description: 상태 변경 요청에 필요한 double-submit CSRF 토큰

  schemas:
    # ── auth 도메인 (Spring Boot envelope: { success, data, error }) ──
    LoginRequest:
      type: object
      required: [loginId, password]
      properties:
        loginId: { type: string, description: 로그인 ID(=email), example: company@haja.com }
        password: { type: string, format: password, example: "pw123456" }

    UserResponse:
      type: object
      description: 사용자 응답(민감 필드 password_hash/social_id 제외)
      properties:
        id: { type: integer, format: int64, example: 1 }
        email: { type: string, example: company@haja.com }
        name: { type: string, example: 기업사용자 }
        role: { type: string, enum: [ADMIN, INSPECTOR, USER, COUNSELOR], example: USER }
        companyId: { type: integer, format: int64, nullable: true, example: 10 }
        profileImageUrl: { type: string, nullable: true, example: "https://.../p.png" }

    ApiError:
      type: object
      properties:
        code: { type: string, example: AUTH_INVALID_CREDENTIALS }
        message: { type: string, example: 아이디 또는 비밀번호가 올바르지 않습니다. }

    UserApiResponse:
      type: object
      description: 성공 envelope — data=UserResponse
      properties:
        success: { type: boolean, example: true }
        data: { $ref: "#/components/schemas/UserResponse" }
        error: { type: object, nullable: true, example: null }

    VoidApiResponse:
      type: object
      properties:
        success: { type: boolean, example: true }
        data: { type: object, nullable: true, example: null }
        error: { type: object, nullable: true, example: null }

    ErrorApiResponse:
      type: object
      description: 실패 envelope — error=ApiError
      properties:
        success: { type: boolean, example: false }
        data: { type: object, nullable: true, example: null }
        error: { $ref: "#/components/schemas/ApiError" }

    AIErrorCode:
      type: string
      enum: [LLM_TIMEOUT, LLM_RATE_LIMIT, LLM_INVALID_OUTPUT, RAG_NO_RESULT, VALIDATION_ERROR]
      description: >-
        LLM 계열(TIMEOUT/RATE_LIMIT/INVALID_OUTPUT)·RAG_NO_RESULT 외에,
        VALIDATION_ERROR 는 LLM 호출이 없는 순수 코드 대조 경로(grounding-check 등)의
        입력·대조 검증 실패용 (#122).

    AIError:
      type: object
      properties:
        code: { $ref: "#/components/schemas/AIErrorCode" }
        message: { type: string }

    AIUsage:
      type: object
      properties:
        tokens: { type: integer }

    AIResponse:
      type: object
      description: 모든 /ai/** 공통 응답 envelope (AI_개발_컨벤션.md §5)
      properties:
        success: { type: boolean }
        data: {}
        usage: { $ref: "#/components/schemas/AIUsage" }
        error: { $ref: "#/components/schemas/AIError" }

    DefectTypeCode:
      type: string
      description: >-
        탐지 클래스 3종 확정(PRD v0.42, 2026-07-13) — LEAK_EFFLORESCENCE(누수·백태)·PAINT_DAMAGE(도장손상)는
        데이터 확보 상황상 이번 범위에서 제외됨. DB `defect_type` enum·프론트 DefectType은 별도 확인·정합 필요.
      enum: [CRACK, SPALLING, REBAR_EXPOSURE]

    DefectGradeCode:
      type: string
      enum: [A, B, C, D, E]

    DefectStatusCode:
      type: string
      enum: [DETECTED, CONFIRMED, ACTION_PENDING, IN_PROGRESS, RESOLVED]

    InspectionStatusCode:
      type: string
      enum: [CREATED, UPLOADING, ANALYZING, ANALYZED, REVIEWED, REPORTED]

    InspectionCreateRequest:
      type: object
      additionalProperties: false
      required: [facilityId, inspectionDate, assignedInspectorId]
      properties:
        facilityId: { type: integer, format: int64, minimum: 1 }
        inspectionDate: { type: string, format: date }
        assignedInspectorId:
          type: integer
          format: int64
          minimum: 1
          description: ACTIVE이며 INSPECTOR 또는 ADMIN 역할인 담당자 식별자

    FacilityCreateRequest:
      type: object
      additionalProperties: false
      required: [name, type]
      description: ownerId 는 인증 주체에서 서버가 기록하므로 요청 바디에 포함하지 않는다.
      properties:
        name: { type: string, maxLength: 200 }
        type: { type: string, maxLength: 20 }
        address: { type: string, maxLength: 300, nullable: true }
        latitude: { type: number, format: double, minimum: -90.0, maximum: 90.0, nullable: true }
        longitude: { type: number, format: double, minimum: -180.0, maximum: 180.0, nullable: true }
        builtYear: { type: integer, nullable: true }
        scale: { type: string, maxLength: 100, nullable: true }
        inspectionCycleMonths: { type: integer, minimum: 0, nullable: true }
        nextInspectionDueAt: { type: string, format: date, nullable: true }

    FacilityUpdateRequest:
      type: object
      additionalProperties: false
      required: [name, type]
      description: FacilityCreateRequest 와 동일 필드 집합(전체 교체 방식).
      properties:
        name: { type: string, maxLength: 200 }
        type: { type: string, maxLength: 20 }
        address: { type: string, maxLength: 300, nullable: true }
        latitude: { type: number, format: double, minimum: -90.0, maximum: 90.0, nullable: true }
        longitude: { type: number, format: double, minimum: -180.0, maximum: 180.0, nullable: true }
        builtYear: { type: integer, nullable: true }
        scale: { type: string, maxLength: 100, nullable: true }
        inspectionCycleMonths: { type: integer, minimum: 0, nullable: true }
        nextInspectionDueAt: { type: string, format: date, nullable: true }

    FacilityScheduleRequest:
      type: object
      additionalProperties: false
      required: [inspectionCycleMonths]
      description: >
        점검주기 설정 요청(dev-04-03). 기준일(오늘)은 서버가 산출하므로 요청 바디에 포함하지 않는다.
      properties:
        inspectionCycleMonths: { type: integer, minimum: 1 }

    FacilityResponse:
      type: object
      additionalProperties: false
      required: [id, ownerId, name, type, createdAt, updatedAt]
      properties:
        id: { type: integer, format: int64 }
        ownerId: { type: integer, format: int64 }
        name: { type: string }
        type: { type: string }
        address: { type: string, nullable: true }
        latitude: { type: number, format: double, nullable: true }
        longitude: { type: number, format: double, nullable: true }
        builtYear: { type: integer, nullable: true }
        scale: { type: string, nullable: true }
        inspectionCycleMonths: { type: integer, nullable: true }
        nextInspectionDueAt: { type: string, format: date, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    FacilityDetailResponse:
      type: object
      additionalProperties: false
      required: [facility, inspections]
      description: >
        ⚠️ 계획안(미구현) — dev-04-02 점검이력 결합 후속 작업에서 채택 예정. 현재 GET /api/facilities/{id}
        는 flat FacilityResponse 를 반환한다. 채택 시 응답 구조 변경(breaking)이므로 계약 오너 승인 필요.
        시설물 상세 + 해당 시설의 점검 회차 이력(최신순).
      properties:
        facility: { $ref: "#/components/schemas/FacilityResponse" }
        inspections:
          type: array
          items: { $ref: "#/components/schemas/InspectionResponse" }

    FacilityApiResponse:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean }
        data:
          nullable: true
          oneOf:
            - { $ref: "#/components/schemas/FacilityResponse" }
        error:
          nullable: true
          oneOf:
            - { $ref: "#/components/schemas/ApiError" }

    FacilityListApiResponse:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean }
        data:
          nullable: true
          type: array
          items: { $ref: "#/components/schemas/FacilityResponse" }
        error:
          nullable: true
          oneOf:
            - { $ref: "#/components/schemas/ApiError" }

    FacilityDetailApiResponse:
      type: object
      description: ⚠️ 계획안(미구현) — FacilityDetailResponse 채택 시 사용.
      required: [success, data, error]
      properties:
        success: { type: boolean }
        data:
          nullable: true
          oneOf:
            - { $ref: "#/components/schemas/FacilityDetailResponse" }
        error:
          nullable: true
          oneOf:
            - { $ref: "#/components/schemas/ApiError" }

    InspectionResponse:
      type: object
      additionalProperties: false
      required: [id, facilityId, createdBy, assignedInspectorId, roundNo, inspectionDate, status, createdAt]
      properties:
        id: { type: integer, format: int64 }
        facilityId: { type: integer, format: int64 }
        createdBy: { type: integer, format: int64 }
        assignedInspectorId: { type: integer, format: int64 }
        roundNo: { type: integer, minimum: 1 }
        inspectionDate: { type: string, format: date }
        status: { $ref: "#/components/schemas/InspectionStatusCode" }
        createdAt: { type: string, format: date-time }

    InspectionApiResponse:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean }
        data:
          nullable: true
          oneOf:
            - { $ref: "#/components/schemas/InspectionResponse" }
        error:
          nullable: true
          oneOf:
            - { $ref: "#/components/schemas/ApiError" }

    MediaFileTypeCode:
      type: string
      enum: [IMAGE, VIDEO]

    MediaResponse:
      type: object
      additionalProperties: false
      required: [id, inspectionId, fileType, thumbnailUrl, createdAt]
      properties:
        id: { type: integer, format: int64 }
        inspectionId: { type: integer, format: int64 }
        fileType: { $ref: "#/components/schemas/MediaFileTypeCode" }
        thumbnailUrl:
          type: string
          description: 인가된 썸네일 조회 API 경로(/api/media/{id}/thumbnail) — 저장소 원본 경로 아님.
        mimeType: { type: string, nullable: true }
        capturedAt: { type: string, format: date-time, nullable: true, description: EXIF 촬영시각(없으면 null) }
        gpsLat: { type: number, nullable: true }
        gpsLng: { type: number, nullable: true }
        createdAt: { type: string, format: date-time }

    MediaListApiResponse:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean }
        data:
          nullable: true
          type: array
          items: { $ref: "#/components/schemas/MediaResponse" }
        error:
          nullable: true
          oneOf:
            - { $ref: "#/components/schemas/ApiError" }

    NullableDefectGradeCode:
      type: string
      enum: [A, B, C, D, E]
      nullable: true

    DefectListItem:
      type: object
      additionalProperties: false
      required: [id, inspectionId, facilityId, type, grade, status, confidence, isReviewed, createdAt]
      properties:
        id: { type: integer, format: int64 }
        inspectionId: { type: integer, format: int64 }
        facilityId: { type: integer, format: int64 }
        type: { $ref: "#/components/schemas/DefectTypeCode" }
        grade: { $ref: "#/components/schemas/NullableDefectGradeCode" }
        status: { $ref: "#/components/schemas/DefectStatusCode" }
        confidence: { type: number, format: double, minimum: 0, maximum: 1 }
        isReviewed: { type: boolean }
        createdAt: { type: string, format: date-time }

    DefectPage:
      type: object
      additionalProperties: false
      required: [content, page, size, totalElements, totalPages]
      properties:
        content:
          type: array
          items: { $ref: "#/components/schemas/DefectListItem" }
        page: { type: integer, minimum: 0 }
        size: { type: integer, minimum: 1, maximum: 100 }
        totalElements: { type: integer, format: int64, minimum: 0 }
        totalPages: { type: integer, minimum: 0 }

    DefectListApiResponse:
      type: object
      description: GET /api/defects 전용 Spring ApiResponse envelope
      required: [success, data, error]
      properties:
        success: { type: boolean }
        data:
          nullable: true
          oneOf:
            - { $ref: "#/components/schemas/DefectPage" }
        error:
          nullable: true
          oneOf:
            - { $ref: "#/components/schemas/ApiError" }

    NlSearchRequest:
      type: object
      additionalProperties: false
      required: [query]
      properties:
        query:
          type: string
          minLength: 1
          maxLength: 500
          description: 양끝 공백 제거 후 1~500자인 자연어 질의
          example: D등급 이상 조치 대기 하자

    NlSearchFilters:
      type: object
      additionalProperties: false
      required: [type, grade, status, confidenceMin]
      properties:
        type:
          type: array
          uniqueItems: true
          items: { $ref: "#/components/schemas/DefectTypeCode" }
        grade:
          type: array
          uniqueItems: true
          items: { $ref: "#/components/schemas/DefectGradeCode" }
        status:
          type: array
          uniqueItems: true
          items: { $ref: "#/components/schemas/DefectStatusCode" }
        confidenceMin:
          type: number
          format: double
          minimum: 0
          maximum: 1
          nullable: true

    NlSearchResult:
      type: object
      additionalProperties: false
      required: [filters, unsupported_terms, clarifying_question, interpretation_confidence]
      properties:
        filters: { $ref: "#/components/schemas/NlSearchFilters" }
        unsupported_terms:
          type: array
          items: { type: string }
        clarifying_question:
          type: string
          nullable: true
        interpretation_confidence:
          type: number
          format: double
          minimum: 0
          maximum: 1

    NlSearchAIResponse:
      type: object
      description: 내부 /ai/nl-search 전용 AIResponse envelope
      required: [success, data, usage, error]
      properties:
        success: { type: boolean }
        data:
          nullable: true
          oneOf:
            - { $ref: "#/components/schemas/NlSearchResult" }
        usage:
          nullable: true
          oneOf:
            - { $ref: "#/components/schemas/AIUsage" }
        error:
          nullable: true
          oneOf:
            - { $ref: "#/components/schemas/AIError" }

    NlSearchApiResponse:
      type: object
      description: 공개 /api/defects/nl-search 전용 Spring ApiResponse envelope
      required: [success, data, error]
      properties:
        success: { type: boolean }
        data:
          nullable: true
          oneOf:
            - { $ref: "#/components/schemas/NlSearchResult" }
        error:
          nullable: true
          oneOf:
            - { $ref: "#/components/schemas/ApiError" }

    SourceCitation:
      type: object
      description: RAG 답변이 인용한 문서 1건. Chroma metadata `source`는 API 경계에서 `title`로 매핑한다.
      required: [doc_id, title, collection, locator, snippet, chunk_ref]
      properties:
        doc_id: { type: string, pattern: "^[1-9][0-9]*$", example: "42" }
        title: { type: string, minLength: 1, example: "시설물의 안전 및 유지관리에 관한 특별법" }
        collection: { type: string, enum: [regulations, defect_kb], example: regulations }
        locator: { type: string, minLength: 1, example: "제12조" }
        snippet: { type: string, minLength: 1, example: "관리주체는 시설물의 안전점검을 정기적으로 실시하여야 한다." }
        chunk_ref: { type: string, minLength: 1, example: "42_3" }

    RagAnswerData:
      type: object
      description: AIResponse.data 의 실제 형태(성공 시) — /ai/rag-chat
      required: [answer, sources]
      properties:
        answer: { type: string, example: "균열 보수는 손상 정도와 구조 안전성 평가 결과에 따라 보수 공법을 선택합니다." }
        sources:
          type: array
          items: { $ref: "#/components/schemas/SourceCitation" }

    DefectExplainRequest:
      type: object
      required: [defect_type, severity_grade, location, facility_type]
      properties:
        defect_type: { type: string, example: 철근 노출 }
        severity_grade: { type: string, enum: [A, B, C, D, E], example: D }
        location: { type: string, example: 교각 하부 }
        facility_type: { type: string, example: 교량 }

    DefectExplain:
      type: object
      description: AIResponse.data 의 실제 형태(성공 시)
      properties:
        cause: { type: string, description: 추정 원인 }
        risk: { type: string, description: 방치 시 위험 }
        action: { type: string, description: 조치 방안 }

    ReportDefectInput:
      type: object
      required: [defect_type, location, severity_grade, description]
      properties:
        defect_type: { type: string, example: 균열 }
        location: { type: string, example: 1동 1층 기둥 }
        severity_grade: { type: string, enum: [A, B, C, D, E], example: B }
        description: { type: string, example: 기둥 표면 수평 균열 }

    ReportGenerateRequest:
      type: object
      description: >
        correlation 필드 3개는 모두 함께 제공하거나 모두 생략한다. 모두 생략하면 기존 호환 경로이며,
        모두 제공하면 응답에 같은 값과 content_hash가 포함된다. 현재 값의 서버 발급·점검 귀속은 강제되지 않는다.
      required: [facility_info, confirmed_defects]
      properties:
        facility_info:
          type: object
          required: [name, location]
          properties:
            name: { type: string, example: Haja APT }
            location: { type: string, example: 서울시 }
        confirmed_defects:
          type: array
          maxItems: 100
          items:
            { $ref: "#/components/schemas/ReportDefectInput" }
        on_mismatch:
          type: string
          enum: [regenerate, warn]
          default: regenerate
        grounding_request_id:
          type: string
          minLength: 1
          description: 선택적 correlation 요청 ID. inspection_id, report_version과 함께 제공해야 한다.
          example: rpt-01J2Y8A7M6
        inspection_id:
          type: integer
          format: int64
          minimum: 1
          description: 선택적 점검 ID. 다른 correlation 필드와 함께 제공해야 한다.
          example: 42
        report_version:
          type: integer
          minimum: 1
          description: 선택적 보고서 업무 버전. 다른 correlation 필드와 함께 제공해야 한다.
          example: 3

    ReportOverview:
      type: object
      required: [purpose, facility_summary, scope]
      properties:
        purpose: { type: string }
        facility_summary: { type: string }
        scope: { type: string }

    ReportSummary:
      type: object
      required: [overall_opinion, total_count, count_by_grade, key_findings]
      properties:
        overall_opinion: { type: string }
        total_count: { type: integer, minimum: 0 }
        count_by_grade:
          type: object
          additionalProperties: { type: integer, minimum: 0 }
        key_findings:
          type: array
          items: { type: string }

    ReportDetailItem:
      type: object
      required: [defect_type, location, severity_grade, description, cause]
      properties:
        defect_type: { type: string }
        location: { type: string }
        severity_grade: { type: string, enum: [A, B, C, D, E] }
        description: { type: string }
        cause: { type: string }

    ReportRecommendationItem:
      type: object
      required: [target, method, priority, legal_basis, legal_basis_verified]
      properties:
        target: { type: string }
        method: { type: string }
        priority: { type: string }
        legal_basis: { type: string }
        legal_basis_verified: { type: boolean }

    ReportGenerateData:
      type: object
      required: [overview, summary, detail, recommendation, grounding_ok]
      properties:
        overview: { $ref: "#/components/schemas/ReportOverview" }
        summary: { $ref: "#/components/schemas/ReportSummary" }
        detail:
          type: object
          required: [items]
          properties:
            items:
              type: array
              items: { $ref: "#/components/schemas/ReportDetailItem" }
        recommendation:
          type: object
          required: [items, monitoring_points]
          properties:
            items:
              type: array
              items: { $ref: "#/components/schemas/ReportRecommendationItem" }
            monitoring_points:
              type: array
              items: { type: string }
        grounding_ok: { type: boolean }
        grounding_request_id:
          type: string
          minLength: 1
          description: correlation 요청에서 세 필드를 모두 제공한 경우에만 존재한다.
        inspection_id:
          type: integer
          format: int64
          minimum: 1
          description: correlation 요청에서 세 필드를 모두 제공한 경우에만 존재한다.
        report_version:
          type: integer
          minimum: 1
          description: correlation 요청에서 세 필드를 모두 제공한 경우에만 존재한다.
        content_hash:
          type: string
          pattern: "^[0-9a-f]{64}$"
          description: correlation 필드를 제외한 보고서 본문 canonical JSON의 SHA-256 hex.

    ReportAIResponse:
      type: object
      required: [success, data, usage, error]
      properties:
        success: { type: boolean }
        data:
          nullable: true
          allOf:
            - { $ref: "#/components/schemas/ReportGenerateData" }
        usage:
          nullable: true
          allOf:
            - { $ref: "#/components/schemas/AIUsage" }
        error:
          nullable: true
          allOf:
            - { $ref: "#/components/schemas/AIError" }

    FastApiValidationError:
      type: object
      required: [detail]
      properties:
        detail:
          type: array
          items:
            type: object
            additionalProperties: true

    # ── grounding-check (구현됨, ai-server/ai/core/grounding.py) ──
    GroundingDefect:
      type: object
      description: 대조 기준이 되는 실측 하자 1건
      required: [defect_type, grade]
      properties:
        defect_type: { type: string, example: 균열 }
        grade: { type: string, enum: [A, B, C, D, E], example: B }

    GroundingClaims:
      type: object
      description: 생성물(LLM 출력)이 주장하는 수치·등급 — 체인의 structured output에서 채운다
      properties:
        total_count: { type: integer, nullable: true, example: 1 }
        count_by_grade:
          type: object
          additionalProperties: { type: integer }
          example: { "B": 1 }
        count_by_type:
          type: object
          additionalProperties: { type: integer }
          example: { "균열": 1 }
        mentioned_grades:
          type: array
          items: { type: string }
          example: ["B"]

    GroundingCheckRequest:
      type: object
      required: [defects, claims]
      properties:
        defects:
          type: array
          items: { $ref: "#/components/schemas/GroundingDefect" }
        claims: { $ref: "#/components/schemas/GroundingClaims" }
        on_mismatch:
          type: string
          enum: [regenerate, warn]
          default: regenerate
          description: 불일치 발생 시 조치 — REGENERATE(재생성 권고) | WARN(경고 배지)

    GroundingCheckItem:
      type: object
      properties:
        field: { type: string, example: "grade:B" }
        claimed: { type: string, example: "1" }
        actual: { type: string, example: "1" }
        status: { type: string, enum: [MATCH, MISMATCH, UNVERIFIABLE] }
        detail: { type: string }

    GroundingResult:
      type: object
      description: AIResponse.data 의 실제 형태(성공 시) — grounded=True 라도 action!=PASS 면 경고 배지 필요(#121)
      properties:
        grounded: { type: boolean }
        action: { type: string, enum: [PASS, REGENERATE, WARN] }
        ground_truth:
          type: object
          properties:
            total_count: { type: integer }
            count_by_grade:
              type: object
              additionalProperties: { type: integer }
            count_by_type:
              type: object
              additionalProperties: { type: integer }
        checks:
          type: array
          items: { $ref: "#/components/schemas/GroundingCheckItem" }
        mismatches:
          type: array
          items: { $ref: "#/components/schemas/GroundingCheckItem" }
        unverifiable:
          type: array
          items: { $ref: "#/components/schemas/GroundingCheckItem" }

    # ── briefing (구현됨, ai-server/ai/chains/briefing_chain.py) ──
    DashboardStats:
      type: object
      description: 대시보드 현황 데이터(브리핑 입력) — 값은 백엔드 집계 실측치
      required:
        [
          total_facilities,
          monthly_analysis,
          pending_review,
          pending_action,
          this_week_defects,
          last_week_defects,
          top_defect_type,
          critical_defects,
        ]
      properties:
        total_facilities: { type: integer, example: 12 }
        monthly_analysis: { type: integer, example: 34 }
        pending_review: { type: integer, example: 5 }
        pending_action: { type: integer, example: 2 }
        this_week_defects: { type: integer, example: 8 }
        last_week_defects: { type: integer, example: 10 }
        top_defect_type: { type: string, example: 균열 }
        critical_defects: { type: integer, example: 1 }
        grade_distribution:
          type: object
          additionalProperties: { type: integer }
          example: { "A": 3, "B": 4, "C": 1 }

    WeeklyBriefing:
      type: object
      description: AIResponse.data 의 실제 형태(성공 시)
      properties:
        briefing: { type: string, description: "카드 본문(2~4문장)" }
        recommendation: { type: string, description: "권고 조치(1~2문장)" }
        facts:
          type: object
          description: 코드로 계산한 파생 사실(프론트 배지용)
          properties:
            this_week_defects: { type: integer }
            last_week_defects: { type: integer }
            change_pct: { type: integer, nullable: true }
            trend: { type: string, enum: [감소, 증가, 유지] }
            top_defect_type: { type: string }
            critical_defects: { type: integer }

    # ── 기업 인증 (구현됨, backend/auth) ──
    CompanySignupRequest:
      type: object
      description: multipart/form-data(@ModelAttribute) — 약관 버전은 서버 소유, 클라이언트는 동의 여부만 전송
      required:
        [
          email,
          password,
          companyName,
          businessRegistrationNumber,
          representativeName,
          address,
          agreeTermsOfService,
          agreePrivacyPolicy,
        ]
      properties:
        email: { type: string, format: email, example: company@haja.com }
        password: { type: string, format: password, description: "8자 이상, 영문+숫자 포함", example: "pw123456" }
        companyName: { type: string, maxLength: 200, example: "(주)하자체크" }
        businessRegistrationNumber: { type: string, pattern: '\d{3}-?\d{2}-?\d{5}', example: "123-45-67890" }
        representativeName: { type: string, maxLength: 100, example: 김민수 }
        address: { type: string, maxLength: 300, example: 서울시 강남구 ... }
        addressDetail: { type: string, maxLength: 200, nullable: true }
        agreeTermsOfService: { type: boolean }
        agreePrivacyPolicy: { type: boolean }
        businessRegistrationFile:
          type: string
          format: binary
          description: "필수, MIME∈{image/jpeg,image/png,application/pdf}, ≤10MB"

    CompanySignupResponse:
      type: object
      description: signupToken 은 승인 대기 화면 상태조회용 불투명 랜덤 문자열(PK 비노출)
      properties:
        companyId: { type: integer, format: int64, example: 1 }
        maskedEmail: { type: string, example: "haja***@check.com" }
        status: { type: string, enum: [PENDING_REVIEW, APPROVED, REJECTED], example: PENDING_REVIEW }
        signupToken: { type: string }

    CompanySignupApiResponse:
      type: object
      properties:
        success: { type: boolean, example: true }
        data: { $ref: "#/components/schemas/CompanySignupResponse" }
        error: { type: object, nullable: true, example: null }

    EmailAvailabilityResponse:
      type: object
      properties:
        available: { type: boolean }

    EmailAvailabilityApiResponse:
      type: object
      properties:
        success: { type: boolean, example: true }
        data: { $ref: "#/components/schemas/EmailAvailabilityResponse" }
        error: { type: object, nullable: true, example: null }

    SignupStatusResponse:
      type: object
      description: rejectionReason 은 REJECTED 일 때만 존재
      properties:
        status: { type: string, enum: [PENDING_REVIEW, APPROVED, REJECTED] }
        companyName: { type: string }
        rejectionReason: { type: string, nullable: true }

    SignupStatusApiResponse:
      type: object
      properties:
        success: { type: boolean, example: true }
        data: { $ref: "#/components/schemas/SignupStatusResponse" }
        error: { type: object, nullable: true, example: null }

    FindIdRequest:
      type: object
      description: representativeName·companyName 중 최소 1개 필수(@AssertTrue)
      required: [businessRegistrationNumber]
      properties:
        businessRegistrationNumber: { type: string, example: "123-45-67890" }
        representativeName: { type: string, nullable: true, example: 김민수 }
        companyName: { type: string, nullable: true, example: "(주)하자체크" }

    FindIdResponse:
      type: object
      properties:
        maskedEmail: { type: string, example: "haja***@check.com" }

    FindIdApiResponse:
      type: object
      properties:
        success: { type: boolean, example: true }
        data: { $ref: "#/components/schemas/FindIdResponse" }
        error: { type: object, nullable: true, example: null }

    # ── notification 도메인 (AP-020, #25 / HAJA-38 FR-9) ──
    NotificationTypeCode:
      type: string
      enum: [ANALYSIS_DONE, REVIEW_PENDING, COUNSEL_REPLIED, INSPECTION_DUE]

    NotificationResponse:
      type: object
      additionalProperties: false
      required: [id, type, isRead, createdAt]
      description: >
        payload는 jsonb 원본을 이스케이프된 문자열이 아니라 구조화된 JSON 객체로 그대로 노출한다
        (알림 유형별로 표시·이동에 쓰는 부가 데이터 — 스키마는 유형마다 달라 자유 객체로 둔다).
      properties:
        id: { type: integer, format: int64, example: 1 }
        type: { $ref: "#/components/schemas/NotificationTypeCode" }
        payload:
          type: object
          nullable: true
          additionalProperties: true
          example: { inspectionId: 10 }
        isRead: { type: boolean, example: false }
        createdAt: { type: string, format: date-time }

    NotificationListApiResponse:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean }
        data:
          nullable: true
          type: array
          items: { $ref: "#/components/schemas/NotificationResponse" }
        error:
          nullable: true
          oneOf:
            - { $ref: "#/components/schemas/ApiError" }
