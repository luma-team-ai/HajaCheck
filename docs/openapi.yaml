openapi: 3.0.3
info:
  title: hajaCheck API
  version: "0.1.0-draft"
  description: >
    Contract-First 초안 (PRD §6, §8). 실제 소스 오브 트루스는 이 파일.
    구현된 엔드포인트(ai-server)는 실행 후 /docs(Swagger UI)에서 최신본 재확인 가능.
    나머지(Spring Boot)는 각 담당자가 이 파일에 스펙을 채워나감 — 임의로 필드명·구조를 바꾸지 말 것.
servers:
  - url: /api
    description: Spring Boot (백엔드)
  - url: /ai
    description: FastAPI (ai-server, 내부 전용)

paths:
  /health:
    get:
      summary: 헬스체크
      tags: [common]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }

  /ai/ping:
    get:
      summary: AI 서버 envelope 동작 확인
      tags: [ai]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AIResponse" }

  /ai/defect-explain:
    post:
      summary: AI 하자 원인·조치방안 설명 (FR-4 P1, 점검관리B)
      tags: [ai]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DefectExplainRequest" }
      responses:
        "200":
          description: 성공/실패 모두 200 — success 필드로 구분(AI_개발_컨벤션.md §4 표준 폴백)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AIResponse" }

  /ai/report:
    post:
      summary: AI 보고서 4개 섹션 병렬 생성 및 Grounding Check (FR-5, 로그인/보고서 담당)
      tags: [ai]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ReportGenerateRequest" }
      responses:
        "200":
          description: 성공/실패 모두 200 — success 필드로 구분
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AIResponse" }

  # ── 아래는 계획 단계(경로안) — 각 담당자가 구현 시 requestBody/responses 채울 것 ──

  /api/auth/oauth2/{provider}:
    get:
      summary: 소셜 로그인 (Kakao/Google)
      tags: [auth]
      parameters:
        - name: provider
          in: path
          required: true
          schema: { type: string, enum: [kakao, google] }
      responses:
        "302": { description: OAuth 리다이렉트 }

  /api/users/me:
    get:
      summary: 내 정보 조회
      tags: [auth]
      responses:
        "200": { description: TODO — 정재봉/오영석 확정 필요 }

  /api/facilities:
    post:
      summary: 시설물 등록
      tags: [facility]
      responses:
        "201": { description: TODO — 김관영/유병현 확정 필요 }

  /api/inspections:
    post:
      summary: 점검(회차) 생성
      tags: [inspection]
      responses:
        "201": { description: TODO — 황승현 확정 필요 }

  /api/inspections/{id}/media:
    post:
      summary: 촬영 데이터 업로드
      tags: [inspection]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "202": { description: TODO — 황승현/허남 확정 필요 }

  /api/inspections/{id}/analyze:
    post:
      summary: AI 분석 요청
      tags: [inspection]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "202": { description: TODO — 황승현 확정 필요(비동기 잡 패턴) }

  /api/inspections/{id}/defects:
    get:
      summary: 분석 결과(하자 목록) 조회
      tags: [defect]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: TODO — 오영석 확정 필요 }

  /api/defects/{id}:
    patch:
      summary: 검수 — 오탐 수정·등급 조정 (defect_revisions append-only)
      tags: [defect]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: TODO — 오영석 확정 필요 }

  /api/reports:
    post:
      summary: 보고서 생성 요청 (비동기 잡 발족)
      tags: [report]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [facility_id, inspection_id]
              properties:
                facility_id: { type: integer, example: 1 }
                inspection_id: { type: integer, example: 10 }
      responses:
        "202":
          description: 보고서 생성 비동기 잡 발족 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  job_id: { type: string, example: "job-report-999" }

  /api/reports/{id}/pdf:
    get:
      summary: 보고서 PDF 다운로드
      tags: [report]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: PDF 파일 다운로드 성공
          content:
            application/pdf:
              schema: { type: string, format: binary }
        "404":
          description: 보고서 또는 PDF 파일을 찾을 수 없음

components:
  schemas:
    AIErrorCode:
      type: string
      enum: [LLM_TIMEOUT, LLM_RATE_LIMIT, LLM_INVALID_OUTPUT, RAG_NO_RESULT, VALIDATION_ERROR]
      description: >-
        LLM 계열(TIMEOUT/RATE_LIMIT/INVALID_OUTPUT)·RAG_NO_RESULT 외에,
        VALIDATION_ERROR 는 LLM 호출이 없는 순수 코드 대조 경로(grounding-check 등)의
        입력·대조 검증 실패용 (#122).

    AIError:
      type: object
      properties:
        code: { $ref: "#/components/schemas/AIErrorCode" }
        message: { type: string }

    AIUsage:
      type: object
      properties:
        tokens: { type: integer }

    AIResponse:
      type: object
      description: 모든 /ai/** 공통 응답 envelope (AI_개발_컨벤션.md §5)
      properties:
        success: { type: boolean }
        data: {}
        usage: { $ref: "#/components/schemas/AIUsage" }
        error: { $ref: "#/components/schemas/AIError" }

    DefectExplainRequest:
      type: object
      required: [defect_type, severity_grade, location, facility_type]
      properties:
        defect_type: { type: string, example: 철근 노출 }
        severity_grade: { type: string, enum: [A, B, C, D, E], example: D }
        location: { type: string, example: 교각 하부 }
        facility_type: { type: string, example: 교량 }

    DefectExplain:
      type: object
      description: AIResponse.data 의 실제 형태(성공 시)
      properties:
        cause: { type: string, description: 추정 원인 }
        risk: { type: string, description: 방치 시 위험 }
        action: { type: string, description: 조치 방안 }

    ReportDefectInput:
      type: object
      required: [defect_type, location, severity_grade, description]
      properties:
        defect_type: { type: string, example: 균열 }
        location: { type: string, example: 1동 1층 기둥 }
        severity_grade: { type: string, enum: [A, B, C, D, E], example: B }
        description: { type: string, example: 기둥 표면 수평 균열 }

    ReportGenerateRequest:
      type: object
      required: [facility_info, confirmed_defects]
      properties:
        facility_info:
          type: object
          properties:
            name: { type: string, example: Haja APT }
            location: { type: string, example: 서울시 }
        confirmed_defects:
          type: array
          items:
            { $ref: "#/components/schemas/ReportDefectInput" }
        on_mismatch:
          type: string
          enum: [regenerate, warn]
          default: regenerate
