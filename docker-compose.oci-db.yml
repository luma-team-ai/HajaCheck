# 개인 전용 옵트인 오버레이 — compose로 뜨는 spring/fastapi가 로컬 postgres/redis 컨테이너 대신
# OCI 공용 개발 DB에 SSH 터널로 붙게 한다. base(docker-compose.yml)·override.yml은 건드리지 않는다
# (base는 운영과 공용 정의라 직접 수정 금지 — docker-compose.prod.yml/arm1.yml과 함께 씀).
#
# 실행 (postgres/redis 로컬 컨테이너는 띄우지 않음):
#   docker compose -f docker-compose.yml -f docker-compose.override.yml -f docker-compose.oci-db.yml \
#     up --build spring fastapi nginx db-tunnel frontend-dev
#
# ✅ 권장: .env에 아래를 설정하면 -f 나열 없이 `docker compose up -d --build` 만으로 동일하게 뜬다(#302).
#   COMPOSE_FILE=docker-compose.yml:docker-compose.override.yml:docker-compose.oci-db.yml
#   -f 를 매번 나열하는 방식은, 한 번이라도 빠뜨리면 컨테이너가 오버레이 없이 재생성돼
#   frontend-dev가 MSW 목 모드로 돌아가 로그인이 조용히 깨진다(아래 frontend-dev 주석 참조).
#
# 필요 환경변수(.env, 미커밋) — 본인 ~/.ssh/config 의 `Host hajacheck-db` 항목과 동일한 값으로 채운다:
#   OCI_SSH_HOST=<OCI 서버 IP/도메인>
#   OCI_SSH_USER=<SSH 계정>
#   OCI_SSH_KEY_PATH=<개인키 절대경로, 예: ~/.ssh/id_ed25519>
#   OCI_DB_REMOTE_PORT=5432        # OCI 상의 실제 PostgreSQL 포트
#   OCI_REDIS_REMOTE_PORT=6380     # OCI 상의 실제 Redis 포트(⚠️ 6379 아님 — ~/.ssh/config LocalForward 6380 127.0.0.1:6380 참고,
#                                   #   sshd PermitOpen이 목적지 포트까지 엄격히 검사해 다르면 "administratively prohibited"로 거부됨)
#
# ⚠️ 공유 DB 오염 주의: 이 오버레이로 붙는 DB는 팀 공용 개발 서버다.
#   application-local.yml.example 안내와 동일하게 app.local-seed.enabled 를 여기서 절대 true 로 켜지 말 것.

services:
  # base(docker-compose.yml)의 로컬 postgres/redis 를 이 오버레이에선 기본 미기동으로 돌린다(#302 후속).
  # 이 오버레이의 spring/fastapi 는 db-tunnel 을 통해 OCI DB 에 붙으므로 로컬 컨테이너는 쓰이지 않는다.
  #
  # ⚠️ profiles 가 없으면 `docker compose up -d`(서비스명 미지정)가 정의된 서비스를 전부 띄워
  #   아무도 안 쓰는 postgres/redis 가 함께 뜬다. 단순 낭비가 아니라 실제로 해롭다:
  #   호스트 포트 127.0.0.1:5432 / 127.0.0.1:6380 을 점유해, 네이티브 SSH 터널 흐름
  #   (~/.ssh/config 의 `LocalForward 6380 127.0.0.1:6380`)이 포트 충돌로 열리지 않는다.
  #   `.env` 에 COMPOSE_FILE 을 고정하면(#302) 서비스명을 나열할 일이 없어 이 문제가 상시화된다.
  #
  # 로컬 DB 컨테이너가 굳이 필요하면(이 오버레이를 쓰면서 동시에? — 정상 흐름은 아님):
  #   docker compose --profile local-db up -d postgres redis
  postgres:
    profiles: ["local-db"]
  redis:
    profiles: ["local-db"]

  db-tunnel:
    build:
      context: .
      dockerfile_inline: |
        FROM alpine:3.20
        RUN apk add --no-cache openssh-client autossh
    restart: unless-stopped
    volumes:
      - ${OCI_SSH_KEY_PATH:?OCI_SSH_KEY_PATH가 .env에 설정되어야 합니다}:/run/secrets/id_tunnel:ro
      # known_hosts를 named volume에 지속 — 없으면 컨테이너 재기동(--build 등)마다 known_hosts가
      # 초기화되어 accept-new가 매번 "최초 접속"으로 취급, host key pinning이 사실상 무력화된다.
      - db-tunnel-ssh:/root/.ssh
    environment:
      AUTOSSH_GATETIME: "0"
    # 개인키 사본은 /tmp(휘발성, named volume 아님)에만 둔다 — /root/.ssh(db-tunnel-ssh 볼륨,
    # known_hosts 지속용)에 같이 넣으면 개인키 사본이 컨테이너 재기동 후에도 디스크에 영구 잔존한다.
    command: >
      sh -c "mkdir -p /root/.ssh &&
      cp /run/secrets/id_tunnel /tmp/id_tunnel &&
      chmod 600 /tmp/id_tunnel &&
      autossh -M 0 -N
      -o StrictHostKeyChecking=accept-new
      -o ServerAliveInterval=30 -o ServerAliveCountMax=3
      -i /tmp/id_tunnel
      -L 0.0.0.0:5432:127.0.0.1:${OCI_DB_REMOTE_PORT:?OCI_DB_REMOTE_PORT가 .env에 설정되어야 합니다}
      -L 0.0.0.0:6380:127.0.0.1:${OCI_REDIS_REMOTE_PORT:?OCI_REDIS_REMOTE_PORT가 .env에 설정되어야 합니다}
      ${OCI_SSH_USER:?OCI_SSH_USER가 .env에 설정되어야 합니다}@${OCI_SSH_HOST:?OCI_SSH_HOST가 .env에 설정되어야 합니다}"
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 5432 && nc -z 127.0.0.1 6380"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks: [hajacheck-net]

  spring:
    depends_on:
      # !reset 은 Compose Spec 확장 병합 태그 — Docker Compose v2.20+ 필요(그 이하 버전은 파싱 오류로
      # 기동 자체가 실패한다). 오류 시 `docker compose version`으로 먼저 확인할 것(§5 트러블슈팅 참고).
      postgres: !reset null
      redis: !reset null
      db-tunnel:
        condition: service_healthy
    volumes:
      # application-docker.yml의 app.file-storage.base-dir 대응 — 미마운트 시 컨테이너 임시 FS에 저장되어
      # 재시작(--build 등) 시 업로드 파일이 유실된다. arm1 운영 compose도 #323에서 동일한 마운트를
      # 추가함(그 전까지는 이 개인 오버레이만 배선돼 있었고, arm1은 마운트 없이 라이브 배포된 상태였다 —
      # 운영 갭이었다. 아래 문장이 한동안 사실이 아니었던 이유).
      - oci-db-uploads:/app/uploads/hajacheck-files
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db-tunnel:5432/hajacheck_dev
      SPRING_DATA_REDIS_HOST: db-tunnel
      SPRING_DATA_REDIS_PORT: 6380
      # application-docker.yml이 운영 도메인(https://hajacheck.luma200ok.com)으로 하드코딩한 OAuth2 redirect-uri·
      # Secure 쿠키·리다이렉트 대상을 로컬(h/ttp:/localhost)용으로 override — 콘솔에 로컬 redirect URI를 추가
      # 등록해뒀다는 전제(카카오/구글 개발자 콘솔). 운영 설정 파일 자체는 건드리지 않는다.
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KAKAO_REDIRECT_URI: "http://localhost/login/oauth2/code/kakao"
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_REDIRECT_URI: "http://localhost/login/oauth2/code/google"
      # application-docker.yml의 ${KAKAO_CLIENT_ID} 등 플레이스홀더 해결용 — base docker-compose.yml은 이 값을
      # 주입하지 않으므로(로컬 OAuth 미사용 전제) 여기서 별도 주입하지 않으면 기동 자체가 실패한다.
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID:?KAKAO_CLIENT_ID가 .env에 설정되어야 합니다}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET:?KAKAO_CLIENT_SECRET가 .env에 설정되어야 합니다}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:?GOOGLE_CLIENT_ID가 .env에 설정되어야 합니다}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:?GOOGLE_CLIENT_SECRET가 .env에 설정되어야 합니다}
      SERVER_SERVLET_SESSION_COOKIE_SECURE: "false"
      # ⚠️ 콜백(redirect-uri)과 반드시 같은 오리진이어야 한다 — http://localhost(80, nginx).
      # 이전엔 :5173(vite dev)이었는데, 이 오버레이가 전제하는 "nginx 80 단일 오리진"과 어긋났다(#302).
      # 그 탓에 80에서 로그인하면 5173(다른 앱)으로 착지했다:
      #   - 80은 nginx가 서빙하는 dist(프로덕션 빌드 → DEV=false → MSW 없음)
      #   - 5173은 vite dev 서버(DEV=true → MSW 기본 켜짐)
      #   → 착지한 5173에서 목 getMe(항상 401)가 실 세션을 가려 /login으로 축출됐다.
      # 운영 설정(application-docker.yml)도 콜백·착지가 같은 오리진(luma200ok.com)이다 — 그 패턴을 따른다.
      APP_OAUTH2_SUCCESS_REDIRECT: "http://localhost/dashboard"
      APP_OAUTH2_FAILURE_REDIRECT: "http://localhost/login?error=oauth"

  fastapi:
    depends_on:
      redis: !reset null
      db-tunnel:
        condition: service_healthy
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD가 .env에 설정되어야 합니다}@db-tunnel:6380/1

  frontend-dev:
    environment:
      # MSW 기본값(DEV=true)은 켜짐 — 이 오버레이로 실 백엔드(spring 컨테이너, OCI DB 연결)를 붙여
      # 통합 테스트하려면 꺼야 getMe 등 목 핸들러(항상 401)가 실제 세션 쿠키를 가리지 않는다.
      # override.yml이 아니라 여기(옵트인)에 둬서, OCI DB 연동을 안 쓰는 팀원의 기본 로컬 개발
      # 흐름(MSW 목 기반)에는 영향 없게 스코프를 좁힌다.
      #
      # ⚠️ 이 값이 빠지면 로그인이 조용히 깨진다 (#302, 2026-07-17 실제 발생).
      #   MSW가 켜진 채 실 백엔드에 붙으면 목 getMe(항상 401)가 실 세션 쿠키를 가려
      #   "로그인 성공 → /login 축출" 무한 루프가 난다. 서버는 인증에 성공하고 세션도 Redis에
      #   저장되므로 서버 로그엔 단서가 없다.
      #   ⚠️ override.yml은 `-f`를 하나라도 명시하면 자동 병합되지 않는다(자동 병합은 `-f` 미지정일 때만).
      #      그래서 위 실행 커맨드가 override.yml까지 3개를 전부 나열한다. 이 커맨드로 띄운 뒤
      #      무심코 `docker compose up -d`(-f 없이)를 돌리면 oci-db.yml이 빠진 채 재생성돼
      #      frontend-dev만 이 값을 잃는다(부분 오염 — 컨테이너는 전부 healthy로 보임).
      #   → 재발 방지: .env에 COMPOSE_FILE 을 설정할 것(.env.example 참조).
      #      설정하면 -f 없이도 항상 3개 파일이 적용된다.
      VITE_ENABLE_MSW: "false"

volumes:
  oci-db-uploads:
  db-tunnel-ssh:
