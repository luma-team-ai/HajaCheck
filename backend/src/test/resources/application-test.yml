spring:
  datasource:
    url: jdbc:h2:mem:hajacheck;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  # 테스트는 기본적으로 Flyway를 끈다(#359). PostgresTestSupport 기반 @SpringBootTest는 스키마를
  # withInitScript(db/HajaCheck_script.sql)로 미리 만들고 Hibernate validate로만 대조하므로 Flyway가
  # 다시 개입할 필요가 없다 — 켜두면 baseline-on-migrate로 V1은 건너뛰고 V2(plans 시드, ON CONFLICT DO
  # NOTHING)만 중복 실행돼 대체로 무해하지만, 의도를 명확히 하기 위해 명시적으로 끈다.
  # Flyway의 baseline+migrate 자체를 검증하는 FlywayBaselineIntegrationTest만 이 값을 true로 재정의한다.
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate.dialect: org.hibernate.dialect.H2Dialect
    show-sql: false
  # 테스트는 Redis 세션 미사용 — 기본(내장) 세션으로 대체
  session:
    store-type: none
  # Redis auto-config 제외(연결 시도 방지)
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.session.SessionAutoConfiguration
  # oauth2Login 필터가 ClientRegistrationRepository 를 필요로 하므로 더미 등록 제공(실제 시크릿 아님)
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: test-kakao-client-id
            client-secret: test-kakao-client-secret
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - profile_nickname
              - account_email
          google:
            client-id: test-google-client-id
            client-secret: test-google-client-secret
            scope:
              - email
              - profile
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

app:
  oauth2:
    success-redirect: http://localhost:5173/dashboard
    failure-redirect: http://localhost:5173/login?error=oauth

# plans 시드 부팅 가드(#517/#518) 비활성 — H2(create-drop)는 엔티티 기반 빈 스키마만 만들고 SQL 시드는
# 적용하지 않는다(PostgresTestSupport 기반 Testcontainers PG 는 HajaCheck_script.sql 로 이미 시드돼 있어
# 이 토글과 무관하게 통과하지만, 순수 H2 @SpringBootTest 는 시드가 없는 게 정상이라 꺼야 한다).
hajacheck:
  membership:
    seed-guard:
      enabled: false
