server:
  # nginx(TLS 종단) 뒤에서 X-Forwarded-* 를 신뢰해 https/Secure 쿠키를 정상 인식.
  forward-headers-strategy: framework
  # TODO(후속, application-prod.yml 신설 시): prod 프로파일에서 세션 쿠키
  #   server.servlet.session.cookie.secure=true / same-site=lax 설정할 것.

spring:
  application:
    name: hajacheck
  profiles:
    active: local
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  session:
    store-type: redis
  servlet:
    multipart:
      # 사업자등록증 업로드 한도(계약: ≤10MB). request 는 파일+폼필드 여유로 12MB.
      max-file-size: 10MB
      max-request-size: 12MB
  # 비밀번호 재설정 메일 발송(#194) — 시크릿은 전부 env 참조, 커밋된 값 없음.
  # ⚠️ SMTP_HOST 미설정 시 값이 "빈 문자열로 존재"한다 → 스프링은 JavaMailSender 빈을 만들지만,
  #    발송 구현체 선택은 SmtpConfiguredCondition(빈값 배제)이 하므로 로컬/dev 는 로그 폴백으로 간다.
  #    운영(arm1)은 compose 의 ${SMTP_HOST:?} 가드가 미설정 기동 자체를 막는다(프로파일 분기 불가 —
  #    arm1 과 로컬이 둘 다 SPRING_PROFILES_ACTIVE=docker 라서).
  mail:
    host: ${SMTP_HOST:}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      # SMTP 왕복이 늘어져도 발송 스레드만 묶이고 응답엔 영향이 없지만(@Async), 스레드 고갈은 막는다.
      mail.smtp.connectiontimeout: 5000
      mail.smtp.timeout: 5000
      mail.smtp.writetimeout: 5000

# 기업 인증(회원가입·아이디/비번 찾기) 설정 — 시크릿 아님(SpringBoot_코드_컨벤션.md §9 @ConfigurationProperties).
app:
  file-storage:
    # local 기본: 임시경로. docker/dev 는 application-docker.yml 에서 마운트 볼륨 경로로 override.
    base-dir: ${java.io.tmpdir}/hajacheck-files
    base-url-path: /files
    allowed-content-types:
      - image/jpeg
      - image/png
      - application/pdf
    max-size-bytes: 10485760
  policy:
    # 약관 버전은 서버 소유(클라이언트 미전송) — 동의 이력에 기록.
    terms-version: "1.0"
    privacy-version: "1.0"
  auth:
    password-reset-ttl: 10m
    signup-status-ttl: 30d
    # 비밀번호 재설정 1단계 rate-limit(2단계엔 걸지 않음 — 계약 §Rate-limit).
    password-reset-rate-limit:
      # 대상 이메일 축 — 사용자 단위 실질 방어(특정 피해자 메일 폭탄 차단).
      email-limit: 3
      email-window: 5m
      # 전역 상한 — SMTP 제공자 쿼터·발신 평판 보호용 "천장"이지 사용자 단위 방어가 아니다.
      # 정상 트래픽(하루 한 자릿수)이 절대 닿지 않을 만큼 크게 잡는다. 근거는 AuthProperties javadoc 참조.
      # ⚠️ 작게 잡으면 공격자가 상한을 채워 정상 사용자를 429로 막는 DoS 킬스위치가 된다(IP 축 미사용).
      global-limit: 60
      global-window: 1m
  # 재설정 메일 발신 주소 + 링크 base. ⚠️ 링크 base 는 반드시 설정값 — 요청 Host 에서 유도 금지(poisoning).
  mail:
    from: ${MAIL_FROM:no-reply@hajacheck.local}
    frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:5173}

# AI 서버(FastAPI) 인증 프록시 설정(#228) — 시크릿(internal-key)은 env 참조, 커밋값 없음.
ai:
  server:
    base-url: ${AI_SERVER_BASE_URL:http://localhost:8000}
    internal-key: ${AI_SERVER_INTERNAL_KEY:}
    connect-timeout-ms: 3000
    read-timeout-ms: 60000

management:
  endpoints:
    web:
      exposure:
        include: health, metrics

springdoc:
  swagger-ui:
    path: /swagger-ui.html
