server:
  # nginx(TLS 종단) 뒤에서 X-Forwarded-* 를 신뢰해 https/Secure 쿠키를 정상 인식.
  forward-headers-strategy: framework
  # TODO(후속, application-prod.yml 신설 시): prod 프로파일에서 세션 쿠키
  #   server.servlet.session.cookie.secure=true / same-site=lax 설정할 것.

spring:
  application:
    name: hajacheck
  profiles:
    active: local
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  session:
    store-type: redis
  servlet:
    multipart:
      # 사업자등록증 업로드 한도(계약: ≤10MB). request 는 파일+폼필드 여유로 12MB.
      max-file-size: 10MB
      max-request-size: 12MB
  # 비밀번호 재설정 메일 발송(#194) — 시크릿은 전부 env 참조, 커밋된 값 없음.
  # ⚠️ SMTP_HOST 미설정 시 값이 "빈 문자열로 존재"한다 → 스프링은 JavaMailSender 빈을 만들지만,
  #    발송 구현체 선택은 SmtpConfiguredCondition(빈값 배제)이 하므로 로컬/dev 는 로그 폴백으로 간다.
  #    운영(arm1·vm)은 compose 의 ${SMTP_HOST:?} 가드가 미설정 기동 자체를 막는다(프로파일 분기 불가 —
  #    arm1 과 로컬이 둘 다 SPRING_PROFILES_ACTIVE=docker 라서).
  mail:
    host: ${SMTP_HOST:}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail.smtp.auth: true
      # ⚠️ TLS 다운그레이드 차단(fail-close). enable 만 켜면 "기회주의적 TLS"라, 서버가 STARTTLS 를 광고하지
      #    않거나 MITM 이 광고를 스트립하면 예외 없이 평문 SMTP 로 폴백한다 → 재설정 링크(=1회용 토큰,
      #    사실상 계정 탈취 수단)가 앱→릴레이 구간에 평문으로 흐른다. 이 기능은 토큰 평문 노출 금지가 전제이므로
      #    (sha256 저장 키·로그 마스킹·응답 DTO 봉인) 전송 구간만 열어둘 수 없다.
      #    required=true 면 STARTTLS 협상 실패 시 발송이 실패한다("STARTTLS is required but host does not
      #    support STARTTLS" — Angus Mail 2.0.3 SMTPTransport 확인). 발송 실패는 응답에 반영되지 않는다(@Async).
      mail.smtp.starttls.enable: true
      mail.smtp.starttls.required: true
      # 호스트명 검증 — 꺼져 있으면 TLS 를 써도 MITM 이 성립한다(아무 유효 인증서나 통과).
      # Angus Mail 2.0.3 의 기본값이 true 임을 바이트코드로 확인했으나(SocketFetcher 가 default=true 로 조회),
      # 구현체 교체·업그레이드로 기본값이 조용히 바뀌어도 안전하도록 명시 고정한다.
      mail.smtp.ssl.checkserveridentity: true
      # 465(SMTPS, 암묵적 TLS) 사용 시에만 true — 465 는 STARTTLS 를 쓰지 않는다. 587(STARTTLS)이 기본.
      # ⚠️ 465 에서도 위 starttls.required 는 무해하다: 이미 SSLSocket 이면 SMTPTransport 가
      #    "STARTTLS requested but already using SSL" 로 건너뛰고 예외를 던지지 않는다(2.0.3 바이트코드 확인).
      #    이 값을 켜지 않고 포트만 465 로 두면 평문으로 말을 걸어 발송이 실패하니 세트로 설정할 것.
      mail.smtp.ssl.enable: ${SMTP_SSL_ENABLE:false}
      # SMTP 왕복이 늘어져도 발송 스레드만 묶이고 응답엔 영향이 없지만(@Async), 스레드 고갈은 막는다.
      mail.smtp.connectiontimeout: 5000
      mail.smtp.timeout: 5000
      mail.smtp.writetimeout: 5000

# 기업 인증(회원가입·아이디/비번 찾기) 설정 — 시크릿 아님(SpringBoot_코드_컨벤션.md §9 @ConfigurationProperties).
app:
  file-storage:
    # local 기본: 임시경로. docker/dev 는 application-docker.yml 에서 마운트 볼륨 경로로 override.
    base-dir: ${java.io.tmpdir}/hajacheck-files
    base-url-path: /files
    allowed-content-types:
      - image/jpeg
      - image/png
      - application/pdf
    max-size-bytes: 10485760
  policy:
    # 약관 버전은 서버 소유(클라이언트 미전송) — 동의 이력에 기록.
    terms-version: "1.0"
    privacy-version: "1.0"
  auth:
    password-reset-ttl: 10m
    signup-status-ttl: 30d
    # 비밀번호 재설정 1단계 rate-limit(2단계엔 걸지 않음 — 계약 §Rate-limit).
    password-reset-rate-limit:
      # 대상 이메일 축 — 사용자 단위 실질 방어(특정 피해자 메일 폭탄 차단).
      email-limit: 3
      email-window: 5m
      # 전역 상한 — SMTP 제공자 쿼터·발신 평판 보호용 "천장"이지 사용자 단위 방어가 아니다.
      # 정상 트래픽(하루 한 자릿수)이 절대 닿지 않을 만큼 크게 잡는다. 근거는 AuthProperties javadoc 참조.
      # ⚠️ 작게 잡으면 공격자가 상한을 채워 정상 사용자를 429로 막는 DoS 킬스위치가 된다(IP 축 미사용).
      global-limit: 60
      global-window: 1m
  # 재설정 메일 발신 주소 + 링크 base. ⚠️ 링크 base 는 반드시 설정값 — 요청 Host 에서 유도 금지(poisoning).
  mail:
    from: ${MAIL_FROM:no-reply@hajacheck.local}
    frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:5173}

# AI 서버(FastAPI) 인증 프록시 설정(#228) — 시크릿(internal-key)은 env 참조, 커밋값 없음.
ai:
  server:
    base-url: ${AI_SERVER_BASE_URL:http://localhost:8000}
    internal-key: ${AI_SERVER_INTERNAL_KEY:}
    connect-timeout-ms: 3000
    read-timeout-ms: 60000

management:
  endpoints:
    web:
      exposure:
        include: health, metrics
  health:
    # 메일 헬스체크 비활성(#310 — #194 회귀 수정). 끄는 이유가 셋이다:
    #
    # 1) 로컬/dev를 깨뜨린다. 로컬 compose는 SMTP_* 를 전달하지 않는 게 설계 의도라
    #    spring.mail.host 가 빈 문자열이 되는데, Boot 의 MailSenderAutoConfiguration 은
    #    @ConditionalOnProperty(name="spring.mail.host") 라 빈 문자열도 "속성 존재"로 보고
    #    JavaMailSender 빈을 만든다. 그러면 MailHealthIndicator 가 붙어 연결을 시도하고
    #    AuthenticationFailedException → health DOWN → 도커 헬스체크 실패 → 스택이 안 뜬다.
    # 2) 운영에서 SMTP 도달성이 서비스 전체 health 를 좌우하면 안 된다. 메일은 비밀번호 재설정
    #    한 기능의 의존성인데, 제공자가 잠깐 흔들렸다고 앱 전체가 DOWN 으로 찍혀 재시작·LB 제거로
    #    이어지는 건 과하다.
    # 3) MailHealthIndicator.testConnection() 은 헬스 폴링마다 SMTP 연결을 연다. 짧은 주기로
    #    돌면 제공자(예: Gmail) 한도를 소모하고 계정이 스로틀·차단될 수 있다.
    #
    # 발송 실패의 관측 지점은 여기가 아니라 PasswordResetMailDispatcher 의 WARN 로그다.
    mail:
      enabled: false

springdoc:
  swagger-ui:
    path: /swagger-ui.html
