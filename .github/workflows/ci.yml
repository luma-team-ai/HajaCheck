# CI — PR 시 변경 파트만 빌드/테스트 (PRD §6.1, path filter)
name: CI

on:
  pull_request:
    branches: [main, develop]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      ai-server: ${{ steps.filter.outputs.ai-server }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend: ['backend/**']
            ai-server: ['ai-server/**']
            frontend: ['frontend/**']

  backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Build & Test
        working-directory: backend
        run: ./gradlew build

  ai-server:
    needs: changes
    if: needs.changes.outputs.ai-server == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Test
        working-directory: ai-server
        run: |
          pip install -r requirements.txt pytest
          pytest

  frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Lint & Build
        working-directory: frontend
        run: |
          npm ci
          npm run lint
          npm run build
