name: PACA Sync

# PR 머지 시 제목의 [HAJA-N]을 파싱해 PACA 태스크를 Done으로 이동
on:
  pull_request:
    types: [closed]

jobs:
  sync:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Move PACA task to Done
        env:
          PACA_API_KEY: ${{ secrets.PACA_API_KEY }}
          PACA_URL: https://paca.rkqkdrnportfolio.shop
          PROJECT_ID: 8a31f5aa-58c3-402f-b1ac-e1956695b46e
          DONE_STATUS_ID: e910c5e8-f015-4e37-9a73-1e1a37dc3c50
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          NUM=$(echo "$PR_TITLE" | grep -oE 'HAJA-[0-9]+' | head -1 | cut -d- -f2)
          if [ -z "$NUM" ]; then
            echo "PR 제목에 HAJA-N 없음 — 스킵"; exit 0
          fi
          TASK_ID=$(curl -sf -H "X-API-Key: $PACA_API_KEY" \
            "$PACA_URL/api/v1/projects/$PROJECT_ID/tasks?page_size=200" \
            | python3 -c "import json,sys; items=json.load(sys.stdin)['data']['items']; print(next((t['id'] for t in items if t['task_number']==$NUM), ''))")
          if [ -z "$TASK_ID" ]; then
            echo "HAJA-$NUM 태스크를 PACA에서 못 찾음 — 스킵"; exit 0
          fi
          curl -sf -X PATCH -H "X-API-Key: $PACA_API_KEY" -H "Content-Type: application/json" \
            -d "{\"status_id\":\"$DONE_STATUS_ID\"}" \
            "$PACA_URL/api/v1/projects/$PROJECT_ID/tasks/$TASK_ID"
          echo "HAJA-$NUM ($TASK_ID) → Done"
