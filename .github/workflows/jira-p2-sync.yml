name: Jira P2 Sync

# GitHub 이슈에 'ai:p2-followup' 라벨이 붙으면(PR머신이 P2 등급 리뷰 코멘트 처리 시 자동 부여)
# Jira(HAJA 프로젝트)에 후속 태스크를 자동 생성해 추적한다.
# PACA(자체 호스팅 PM 툴) 폐기 후 Jira+Slack 체계로 전환하며 옛 paca-p2-sync.yml을 대체한다.
# 멱등성: Jira 라벨 `gh-<이슈번호>` 존재 시 재생성하지 않음(JQL로 사전 조회).
# 담당자: 팀원 8명 전원 Jira 사이트 초대 완료. `JIRA_USER_MAP` 시크릿(GitHub 로그인 → Jira accountId
#         JSON)으로 GitHub 이슈 담당자를 Jira 이슈 담당자로 자동 매핑한다. 매핑에 없거나 GitHub 이슈에
#         담당자가 없으면 기존처럼 Unassigned로 생성한다(하위호환 유지).
#         (labels의 gh-<이슈번호>로 원본 GitHub 이슈를 역추적할 수 있다.)
# 부모 에픽: 원본 태스크가 속한 에픽을 그대로 상속받아 parent로 연결한다(원본 태스크를 못 찾거나
#         부모 에픽이 없으면 parent 없이 생성 — 하위호환 유지).
on:
  issues:
    types: [labeled]

permissions:
  issues: write

jobs:
  create-task:
    if: github.event.label.name == 'ai:p2-followup'
    runs-on: ubuntu-latest
    steps:
      - name: Create Jira task for P2 issue
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA }}
          JIRA_SITE: https://human2-team.atlassian.net
          PROJECT_KEY: HAJA
          ISSUE_TYPE: 작업
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          JIRA_USER_MAP: ${{ secrets.JIRA_USER_MAP }}
          ISSUE_ASSIGNEE: ${{ github.event.issue.assignee.login }}
        run: |
          set -u
          export MARK="gh-${ISSUE_NUM}"

          # 1) 멱등성: 같은 gh-<이슈번호> 라벨의 Jira 이슈가 이미 있으면 스킵
          JQL="project=${PROJECT_KEY} AND labels=\"${MARK}\""
          JQL_ENC=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1]))" "$JQL")
          SEARCH_RESP=$(curl -sf -u "$JIRA_EMAIL:$JIRA_TOKEN" "$JIRA_SITE/rest/api/3/search?jql=$JQL_ENC&fields=key" || echo "")
          EXIST=$(printf '%s' "$SEARCH_RESP" | python3 -c "import json,sys; d=json.loads(sys.stdin.read() or '{}'); issues=d.get('issues') or []; print(issues[0]['key'] if issues else '')" 2>/dev/null || echo "")
          if [ -n "$EXIST" ]; then
            echo "이미 Jira ${EXIST} 로 추적 중 — 스킵"; exit 0
          fi

          # 2) 제목에서 기존 [HAJA-N] 접두 제거 후 [P2] 부여
          CLEAN=$(printf '%s' "$ISSUE_TITLE" | sed -E 's/^\[HAJA-[0-9]+\][[:space:]]*//')
          export SUMMARY="[P2] ${CLEAN}"

          # 2.5) GitHub 이슈 담당자 → Jira accountId 매핑 조회 (JIRA_USER_MAP)
          ASSIGNEE_ACCOUNT_ID=""
          if [ -n "$ISSUE_ASSIGNEE" ]; then
            ASSIGNEE_ACCOUNT_ID=$(python3 -c "import json,os; m=json.loads(os.environ.get('JIRA_USER_MAP') or '{}'); print(m.get(os.environ['ISSUE_ASSIGNEE'], ''))")
          fi
          export ASSIGNEE_ACCOUNT_ID
          if [ -n "$ASSIGNEE_ACCOUNT_ID" ]; then
            echo "담당자 매핑: ${ISSUE_ASSIGNEE} → ${ASSIGNEE_ACCOUNT_ID}"
          else
            echo "담당자 매핑 없음(assignee='${ISSUE_ASSIGNEE}') — Unassigned로 생성"
          fi

          # 2.6) 원본(주담당) 태스크의 부모 에픽 조회 → 새 P2 이슈도 같은 에픽에 연결
          PARENT_EPIC=""
          PARENT_SEARCH_RESP=$(curl -sf -u "$JIRA_EMAIL:$JIRA_TOKEN" "$JIRA_SITE/rest/api/3/search?jql=$JQL_ENC&fields=parent" || echo "")
          PARENT_EPIC=$(printf '%s' "$PARENT_SEARCH_RESP" | python3 -c "import json,sys; d=json.loads(sys.stdin.read() or '{}'); issues=d.get('issues') or []; parent=(issues[0].get('fields',{}) or {}).get('parent') if issues else None; print((parent or {}).get('key','') if parent else '')" 2>/dev/null || echo "")
          export PARENT_EPIC
          if [ -n "$PARENT_EPIC" ]; then
            echo "원본 태스크의 부모 에픽: ${PARENT_EPIC} → P2 이슈도 동일 에픽에 연결"
          else
            echo "원본 태스크에 부모 에픽 없음(또는 원본을 못 찾음) — parent 없이 생성"
          fi

          # 3) Jira 이슈 생성 요청 페이로드 구성 (description은 ADF 최소 구조, assignee/parent는 있을 때만)
          PAYLOAD=$(python3 -c "import json,os; fields={'project': {'key': os.environ['PROJECT_KEY']}, 'issuetype': {'name': os.environ['ISSUE_TYPE']}, 'summary': os.environ['SUMMARY'], 'description': {'type': 'doc', 'version': 1, 'content': [{'type': 'paragraph', 'content': [{'type': 'text', 'text': 'GitHub 원본: ' + os.environ['ISSUE_URL']}]}]}, 'labels': ['P2', 'gh-sync', os.environ['MARK']]}; acc=os.environ.get('ASSIGNEE_ACCOUNT_ID'); fields.update({'assignee': {'id': acc}} if acc else {}); parent_epic=os.environ.get('PARENT_EPIC'); fields.update({'parent': {'key': parent_epic}} if parent_epic else {}); print(json.dumps({'fields': fields}))")

          RESP=$(curl -s -w '\n%{http_code}' -X POST -u "$JIRA_EMAIL:$JIRA_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" "$JIRA_SITE/rest/api/3/issue")
          CODE=$(printf '%s' "$RESP" | tail -1)
          BODY=$(printf '%s' "$RESP" | sed '$d')
          if [ "$CODE" != "200" ] && [ "$CODE" != "201" ]; then
            echo "Jira 이슈 생성 실패 (HTTP $CODE): $BODY"; exit 0
          fi

          JIRA_KEY=$(printf '%s' "$BODY" | python3 -c "import json,sys; print(json.loads(sys.stdin.read() or '{}').get('key',''))" 2>/dev/null || echo "")
          echo "P2 이슈 #${ISSUE_NUM} → Jira ${JIRA_KEY}"

          # 4) 원본 이슈에 역링크 코멘트 (마커로 중복 코멘트 방지 참고용)
          if [ -n "$JIRA_KEY" ]; then
            gh issue comment "$ISSUE_NUM" -R "$REPO" \
              --body "📋 Jira 등록: **${JIRA_KEY}** — ${JIRA_SITE}/browse/${JIRA_KEY} (P2) <!-- jira-p2-synced -->"
          fi
