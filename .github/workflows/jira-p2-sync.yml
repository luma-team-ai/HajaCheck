name: Jira P2 Sync

# GitHub 이슈에 'ai:p2-followup' 라벨이 붙으면(PR머신이 P2 등급 리뷰 코멘트 처리 시 자동 부여)
# Jira(HAJA 프로젝트)에 후속 태스크를 자동 생성해 추적한다.
# PACA(자체 호스팅 PM 툴) 폐기 후 Jira+Slack 체계로 전환하며 옛 paca-p2-sync.yml을 대체한다.
# 멱등성: 이 워크플로우 자신의 마커는 `gh-p2-<이슈번호>`(P2_MARK)를 쓴다. `gh-<이슈번호>`(ORIG_MARK)는
#         최초 34개 태스크 동기화 시점부터 원본 태스크 자신의 추적 라벨로 이미 쓰이고 있어서, 같은 이슈번호를
#         공유하는 이 워크플로우가 멱등성 마커로 재사용하면 원본 태스크를 "이미 추적 중"으로 오인해
#         P2 이슈 생성이 항상 스킵되는 라벨 충돌이 있었다(GitHub #73 / Jira HAJA-76). P2_MARK로 분리해 해결.
# 담당자: 팀원 8명 전원 Jira 사이트 초대 완료. `JIRA_USER_MAP` 시크릿(GitHub 로그인 → Jira accountId
#         JSON)으로 GitHub 이슈 담당자를 Jira 이슈 담당자로 자동 매핑한다. 매핑에 없거나 GitHub 이슈에
#         담당자가 없으면 기존처럼 Unassigned로 생성한다(하위호환 유지).
#         (labels의 gh-p2-<이슈번호>로 원본 GitHub 이슈를 역추적할 수 있다.)
# 부모 에픽: ORIG_MARK 전용 별도 JQL로 원본 태스크를 조회하고, 그 parent가 에픽 타입일 때만 새 P2 이슈의
#         parent로 상속한다(원본 태스크를 못 찾거나 부모가 에픽이 아니거나 부모가 없으면 parent 없이 생성
#         — 하위호환 유지). parent를 포함한 생성 요청이 실패하면 parent를 제거하고 1회 재시도한다.
on:
  issues:
    types: [labeled]

permissions:
  issues: write

jobs:
  create-task:
    if: github.event.label.name == 'ai:p2-followup'
    runs-on: ubuntu-latest
    # 같은 이슈에 대한 동시/재라벨 실행을 직렬화해 중복 Jira 이슈 생성을 차단한다.
    # cancel-in-progress: false — 진행 중 실행을 취소하지 않고 큐잉(취소 시 생성 응답 유실로 중복 위험).
    concurrency:
      group: jira-p2-sync-${{ github.event.issue.number }}
      cancel-in-progress: false
    steps:
      - name: Create Jira task for P2 issue
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA }}
          JIRA_SITE: https://human2-team.atlassian.net
          PROJECT_KEY: HAJA
          ISSUE_TYPE: 작업
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          JIRA_USER_MAP: ${{ secrets.JIRA_USER_MAP }}
          ISSUE_ASSIGNEE: ${{ github.event.issue.assignee.login }}
          # 부모 에픽 판정용 issuetype 이름 후보(Jira 사이트 언어/설정에 따라 '에픽' 또는 'Epic'). 콤마 구분.
          EPIC_TYPE_NAMES: "에픽,Epic"
        run: |
          set -u
          export P2_MARK="gh-p2-${ISSUE_NUM}"
          export ORIG_MARK="gh-${ISSUE_NUM}"

          # 생성 응답 유실(타임아웃/연결끊김)로 실제론 이슈가 만들어졌을 수 있으므로, P2_MARK로
          # 재조회해 이미 있으면 그 Jira 키를 돌려준다(없으면 빈 문자열). 중복 이슈 생성 방지용.
          # Jira 검색은 최종적 일관성이라 인덱싱 지연을 백오프(3→6→10초, 최대 3회)로 흡수한다.
          # JQL_ENC는 1) 단계에서 설정된다. stdout에는 키만 출력(로그 없음 — 호출부가 캡처).
          recheck_existing_key() {
            local resp key delay
            for delay in 3 6 10; do
              sleep "$delay"
              resp=$(curl -sf -u "$JIRA_EMAIL:$JIRA_TOKEN" "$JIRA_SITE/rest/api/3/search?jql=$JQL_ENC&fields=key" || echo "")
              key=$(printf '%s' "$resp" | python3 -c "import json,sys; d=json.loads(sys.stdin.read() or '{}'); issues=d.get('issues') or []; print(issues[0]['key'] if issues else '')" 2>/dev/null || echo "")
              if [ -n "$key" ]; then printf '%s' "$key"; return 0; fi
            done
            printf '%s' ""
          }

          # 0) 강한 일관성 우선 멱등성: 원본 GitHub 이슈에 이미 sync 마커 코멘트가 있으면 스킵한다.
          #    GitHub API는 read-your-writes 강한 일관성이라, concurrency로 직렬화된 후속/재라벨 실행이
          #    Jira 검색 인덱싱 지연과 무관하게 즉시 중복을 차단한다(아래 Jira 검색보다 견고).
          SYNCED=$(gh issue view "$ISSUE_NUM" -R "$REPO" --json comments \
            --jq '[.comments[].body | select(contains("<!-- jira-p2-synced -->"))] | length' 2>/dev/null || echo "0")
          if [ "${SYNCED:-0}" != "0" ]; then
            echo "이미 sync 마커 코멘트 존재 — 스킵(GitHub 강한 일관성)"; exit 0
          fi

          # 1) 멱등성(보조): 이 워크플로우 자신의 마커(gh-p2-<이슈번호>) 라벨의 Jira 이슈가 이미 있으면 스킵
          JQL="project=${PROJECT_KEY} AND labels=\"${P2_MARK}\""
          JQL_ENC=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1]))" "$JQL")
          SEARCH_RESP=$(curl -sf -u "$JIRA_EMAIL:$JIRA_TOKEN" "$JIRA_SITE/rest/api/3/search?jql=$JQL_ENC&fields=key" || echo "")
          EXIST=$(printf '%s' "$SEARCH_RESP" | python3 -c "import json,sys; d=json.loads(sys.stdin.read() or '{}'); issues=d.get('issues') or []; print(issues[0]['key'] if issues else '')" 2>/dev/null || echo "")
          if [ -n "$EXIST" ]; then
            echo "이미 Jira ${EXIST} 로 추적 중 — 스킵"; exit 0
          fi

          # 2) 제목에서 기존 [HAJA-N] 접두 제거 후 [P2] 부여
          CLEAN=$(printf '%s' "$ISSUE_TITLE" | sed -E 's/^\[HAJA-[0-9]+\][[:space:]]*//')
          export SUMMARY="[P2] ${CLEAN}"

          # 2.5) GitHub 이슈 담당자 → Jira accountId 매핑 조회 (JIRA_USER_MAP)
          ASSIGNEE_ACCOUNT_ID=""
          if [ -n "$ISSUE_ASSIGNEE" ]; then
            ASSIGNEE_ACCOUNT_ID=$(python3 -c "import json,os; m=json.loads(os.environ.get('JIRA_USER_MAP') or '{}'); print(m.get(os.environ['ISSUE_ASSIGNEE'], ''))")
          fi
          export ASSIGNEE_ACCOUNT_ID
          if [ -n "$ASSIGNEE_ACCOUNT_ID" ]; then
            echo "담당자 매핑: ${ISSUE_ASSIGNEE} → ${ASSIGNEE_ACCOUNT_ID}"
          else
            echo "담당자 매핑 없음(assignee='${ISSUE_ASSIGNEE}') — Unassigned로 생성"
          fi

          # 2.6) 원본(주담당) 태스크는 gh-<이슈번호>(ORIG_MARK) 라벨을 갖고 있으므로, 1)과는 별도의
          #      JQL로 조회해 그 부모 에픽을 확인한다(1)의 JQL을 재사용하면 항상 빈 결과라 죽은 코드가 됨).
          #      [2단계 조회] Jira REST /search 의 parent 필드는 issuetype이 축약(누락)될 수 있어
          #      search에서는 parent.key만 신뢰하고, 그 부모를 GET /issue/{key}?fields=issuetype 로
          #      직접 조회해 에픽 여부를 확정한다(search 응답 축약 여부와 무관하게 정확).
          ORIG_JQL="project=${PROJECT_KEY} AND labels=\"${ORIG_MARK}\""
          ORIG_JQL_ENC=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1]))" "$ORIG_JQL")
          echo "::group::DEBUG epic-parent"
          echo "DEBUG ORIG_MARK=${ORIG_MARK}"
          echo "DEBUG ORIG_JQL=${ORIG_JQL}"
          echo "DEBUG ORIG_JQL_ENC=${ORIG_JQL_ENC}"
          # 디버그: search를 http_code 포함해 호출하여 실제 응답을 관찰
          DBG_SEARCH=$(curl -s -w $'\n%{http_code}' -u "$JIRA_EMAIL:$JIRA_TOKEN" "$JIRA_SITE/rest/api/3/search?jql=$ORIG_JQL_ENC&fields=parent")
          echo "DEBUG search http_code=$(printf '%s' "$DBG_SEARCH" | tail -1)"
          echo "DEBUG search body(앞 900자)=$(printf '%s' "$DBG_SEARCH" | sed '$d' | head -c 900)"
          PARENT_EPIC=""
          # 1단계: 원본 태스크의 부모 key만 얻는다(축약돼도 key는 항상 온다).
          PARENT_SEARCH_RESP=$(curl -sf -u "$JIRA_EMAIL:$JIRA_TOKEN" "$JIRA_SITE/rest/api/3/search?jql=$ORIG_JQL_ENC&fields=parent" || echo "")
          PARENT_KEY=$(printf '%s' "$PARENT_SEARCH_RESP" | python3 -c "import json,sys; d=json.loads(sys.stdin.read() or '{}'); issues=d.get('issues') or []; parent=(issues[0].get('fields',{}) or {}).get('parent') if issues else None; print((parent or {}).get('key','') if parent else '')" 2>/dev/null || echo "")
          echo "DEBUG PARENT_KEY=${PARENT_KEY}"
          # 2단계: 부모를 직접 조회해 issuetype이 에픽인지 확정한다.
          if [ -n "$PARENT_KEY" ]; then
            PARENT_ISSUE_RESP=$(curl -sf -u "$JIRA_EMAIL:$JIRA_TOKEN" "$JIRA_SITE/rest/api/3/issue/${PARENT_KEY}?fields=issuetype" || echo "")
            echo "DEBUG PARENT_ISSUE_RESP(앞 400자)=$(printf '%s' "$PARENT_ISSUE_RESP" | head -c 400)"
            IS_EPIC=$(printf '%s' "$PARENT_ISSUE_RESP" | python3 -c "import json,sys,os; d=json.loads(sys.stdin.read() or '{}'); name=((d.get('fields',{}) or {}).get('issuetype',{}) or {}).get('name',''); names=[n.strip() for n in (os.environ.get('EPIC_TYPE_NAMES') or '에픽,Epic').split(',') if n.strip()]; print(name if name in names else '')" 2>/dev/null || echo "")
            echo "DEBUG IS_EPIC=${IS_EPIC}"
            [ -n "$IS_EPIC" ] && PARENT_EPIC="$PARENT_KEY"
          fi
          echo "DEBUG PARENT_EPIC=${PARENT_EPIC}"
          echo "::endgroup::"
          export PARENT_EPIC
          if [ -n "$PARENT_EPIC" ]; then
            echo "원본 태스크의 부모 에픽: ${PARENT_EPIC} → P2 이슈도 동일 에픽에 연결"
          else
            echo "원본 태스크를 못 찾았거나 부모가 에픽이 아님/부모 없음 — parent 없이 생성"
          fi

          # 3) Jira 이슈 생성 요청 페이로드 구성 (description은 ADF 최소 구조, assignee/parent는 있을 때만)
          PAYLOAD=$(python3 -c "import json,os; fields={'project': {'key': os.environ['PROJECT_KEY']}, 'issuetype': {'name': os.environ['ISSUE_TYPE']}, 'summary': os.environ['SUMMARY'], 'description': {'type': 'doc', 'version': 1, 'content': [{'type': 'paragraph', 'content': [{'type': 'text', 'text': 'GitHub 원본: ' + os.environ['ISSUE_URL']}]}]}, 'labels': ['P2', 'gh-sync', os.environ['P2_MARK']]}; acc=os.environ.get('ASSIGNEE_ACCOUNT_ID'); fields.update({'assignee': {'id': acc}} if acc else {}); parent_epic=os.environ.get('PARENT_EPIC'); fields.update({'parent': {'key': parent_epic}} if parent_epic else {}); print(json.dumps({'fields': fields}))")

          RESP=$(curl -s -w '\n%{http_code}' -X POST -u "$JIRA_EMAIL:$JIRA_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" "$JIRA_SITE/rest/api/3/issue")
          CODE=$(printf '%s' "$RESP" | tail -1)
          BODY=$(printf '%s' "$RESP" | sed '$d')

          # 3.5) 생성 실패 처리 — 먼저 재조회로 '응답만 유실됐고 실제론 생성됨'을 흡수(중복 방지),
          #      그래도 없으면 parent 문제일 수 있으니 parent 제거 후 1회 재시도한다.
          if [ "$CODE" != "200" ] && [ "$CODE" != "201" ]; then
            echo "Jira 이슈 생성 응답 실패(HTTP $CODE): $BODY — 이미 생성됐는지 재조회"
            RECHECK=$(recheck_existing_key)
            if [ -n "$RECHECK" ]; then
              echo "재조회 결과 이미 존재(${RECHECK}) — 중복 생성 방지, 해당 이슈 사용"
              BODY="{\"key\":\"${RECHECK}\"}"; CODE=201
            elif [ -n "$PARENT_EPIC" ]; then
              echo "재조회 결과 없음 — parent(${PARENT_EPIC}) 제거 후 1회 재시도"
              RETRY_PAYLOAD=$(python3 -c "import json,sys; d=json.loads(sys.argv[1]); d['fields'].pop('parent', None); print(json.dumps(d))" "$PAYLOAD")
              RESP=$(curl -s -w '\n%{http_code}' -X POST -u "$JIRA_EMAIL:$JIRA_TOKEN" \
                -H "Content-Type: application/json" \
                -d "$RETRY_PAYLOAD" "$JIRA_SITE/rest/api/3/issue")
              CODE=$(printf '%s' "$RESP" | tail -1)
              BODY=$(printf '%s' "$RESP" | sed '$d')
              # 재시도 응답도 유실됐을 수 있으니 한 번 더 재조회로 중복 방지
              if [ "$CODE" != "200" ] && [ "$CODE" != "201" ]; then
                RECHECK2=$(recheck_existing_key)
                if [ -n "$RECHECK2" ]; then
                  echo "재시도 응답 실패였으나 재조회 결과 존재(${RECHECK2}) — 해당 이슈 사용"
                  BODY="{\"key\":\"${RECHECK2}\"}"; CODE=201
                fi
              fi
            fi
          fi

          if [ "$CODE" != "200" ] && [ "$CODE" != "201" ]; then
            echo "Jira 이슈 생성 최종 실패 (HTTP $CODE): $BODY"
            # 무음 유실 방지: 원본 이슈에 실패를 남기고 워크플로우를 실패로 표면화한다(담당자 인지).
            # exit 0이면 Actions가 초록불로 끝나 Critical P2 추적이 조용히 사라진다.
            gh issue comment "$ISSUE_NUM" -R "$REPO" \
              --body "⚠️ Jira P2 자동 등록 실패 (HTTP ${CODE}). 워크플로우 로그 확인 후 수동 등록이 필요합니다." 2>/dev/null || true
            exit 1
          fi

          JIRA_KEY=$(printf '%s' "$BODY" | python3 -c "import json,sys; print(json.loads(sys.stdin.read() or '{}').get('key',''))" 2>/dev/null || echo "")
          echo "P2 이슈 #${ISSUE_NUM} → Jira ${JIRA_KEY}"

          # 4) 원본 이슈에 역링크 코멘트 (마커로 중복 코멘트 방지 참고용)
          if [ -n "$JIRA_KEY" ]; then
            gh issue comment "$ISSUE_NUM" -R "$REPO" \
              --body "📋 Jira 등록: **${JIRA_KEY}** — ${JIRA_SITE}/browse/${JIRA_KEY} (P2) <!-- jira-p2-synced -->"
          fi
