# HajaCheck nginx — React dist 정적 서빙 + /api·/ws 리버스 프록시 (PRD §6, §6.1)
# TLS(443, 운영)는 이 PR 범위 밖(certbot 발급·서버 커토버 미포함) — nginx/tls.conf.example 참고
# FastAPI(/ai/)는 외부 공개 폐쇄(A안 3/3, #235) — 스프링 `/api/ai/*` 프록시만 경유하므로 여기서 제거.

upstream spring_backend {
    server spring:8080;
}

server {
    listen 80;
    server_name _;

    # 기본 보안 헤더(HSTS/CSP는 TLS 후속 작업에서 추가 — 이 PR 범위 아님)
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # certbot ACME 챌린지(운영, 인증서 발급/갱신용) — 이 PR에서는 경로만 마련
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Spring REST API
    location /api/ {
        proxy_pass http://spring_backend/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # nginx 기본값(1MB)이 Spring의 multipart.max-request-size(205MB, application.yml)보다
        # 훨씬 작아 점검 미디어 다중 업로드가 413으로 끊긴다 — dev.conf와 동일 이유로 맞춘다.
        client_max_body_size 205m;
    }

    # Spring OAuth2 소셜 로그인 콜백(redirection endpoint) — 인가 엔드포인트는 /api/auth/oauth2 로
    # 커스텀됐지만 콜백은 Spring 기본 /login/oauth2/code/* 라 /api 프록시 밖으로 새어 SPA(404)로 가던 것을
    # 백엔드로 전달한다. /login(SPA 로그인 페이지)은 이 규칙(/login/oauth2/)보다 덜 구체적이라 그대로 SPA로 감.
    location /login/oauth2/ {
        proxy_pass http://spring_backend/login/oauth2/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Spring WebSocket(STOMP 상담) — Upgrade/Connection 헤더 필수
    location /ws/ {
        proxy_pass http://spring_backend/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
    }

    # React SPA 정적 서빙 + 클라이언트 라우팅 폴백
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
