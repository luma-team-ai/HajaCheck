# HajaCheck nginx — React dist 정적 서빙 + /api·/ws·/ai 리버스 프록시 (PRD §6, §6.1)
# TLS(443, 운영)는 이 PR 범위 밖(certbot 발급·서버 커토버 미포함) — nginx/tls.conf.example 참고

upstream spring_backend {
    server spring:8080;
}

upstream fastapi_backend {
    server fastapi:8000;
}

server {
    listen 80;
    server_name _;

    # certbot ACME 챌린지(운영, 인증서 발급/갱신용) — 이 PR에서는 경로만 마련
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # FastAPI 헬스체크 — /health(prefix 없음)로 전달. /ai/ 프리픽스 규칙보다 우선(exact match)
    location = /ai/health {
        proxy_pass http://fastapi_backend/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # FastAPI — ai_router prefix="/ai"와 동일하게 프리픽스 보존 전달
    location /ai/ {
        proxy_pass http://fastapi_backend/ai/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Spring REST API
    location /api/ {
        proxy_pass http://spring_backend/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Spring WebSocket(STOMP 상담) — Upgrade/Connection 헤더 필수
    location /ws/ {
        proxy_pass http://spring_backend/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
    }

    # React SPA 정적 서빙 + 클라이언트 라우팅 폴백
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
