# HajaCheck nginx — arm1(공유 호스트) 전용 (이슈 #104 / Design A)
# 이 컨테이너는 network_mode: host로 8100을 직접 리슨한다(공유 호스트 nginx가 80/443에서
# TLS 종료 후 `/`→127.0.0.1:8100, `/ai/`→127.0.0.1:8101로 프록시하는 것과 짝을 이룸 — 그 nginx.conf는
# 이 PR에서 건드리지 않는다). host-net라 서비스명 DNS가 없어 upstream은 127.0.0.1 고정 포트를 사용.
# certbot ACME 경로는 host nginx가 이미 처리하므로 여기서는 불필요(default.conf와의 차이점).

upstream spring_backend {
    server 127.0.0.1:9100;
}

upstream fastapi_backend {
    server 127.0.0.1:8101;
}

server {
    # 127.0.0.1 명시 — host-net라 0.0.0.0면 다른 사이트 컨테이너에서도 접근 가능(defense-in-depth,
    # host nginx가 127.0.0.1:8100으로만 프록시하므로 loopback으로 충분. 리뷰 P2)
    listen 127.0.0.1:8100;
    server_name _;

    # 기본 보안 헤더(HSTS/CSP는 host nginx TLS 계층에서 관리 — 이 PR 범위 아님)
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # host nginx가 `/ai/`를 이미 127.0.0.1:8101(fastapi)로 직접 라우팅하므로 정상 경로에서는
    # 이 컨테이너까지 도달하지 않음 — 여기 /ai/·/ai/health는 8100 직접접근/설정변경 시 폴백용 이중화
    # FastAPI 헬스체크 — /health(prefix 없음)로 전달. /ai/ 프리픽스 규칙보다 우선(exact match)
    location = /ai/health {
        proxy_pass http://fastapi_backend/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # FastAPI — ai_router prefix="/ai"와 동일하게 프리픽스 보존 전달
    location /ai/ {
        proxy_pass http://fastapi_backend/ai/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Spring REST API
    location /api/ {
        proxy_pass http://spring_backend/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Spring WebSocket(STOMP 상담) — Upgrade/Connection 헤더 필수
    location /ws/ {
        proxy_pass http://spring_backend/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
    }

    # React SPA 정적 서빙 + 클라이언트 라우팅 폴백
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
