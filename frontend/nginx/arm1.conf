# HajaCheck nginx — arm1(공유 호스트) 전용 (이슈 #104 / Design A)
# 이 컨테이너는 network_mode: host로 8100을 직접 리슨한다(공유 호스트 nginx가 80/443에서
# TLS 종료 후 `/`→127.0.0.1:8100, `/ai/`→127.0.0.1:8101로 프록시하는 것과 짝을 이룸 — 그 nginx.conf는
# 이 PR에서 건드리지 않는다). host-net라 서비스명 DNS가 없어 upstream은 127.0.0.1 고정 포트를 사용.
# certbot ACME 경로는 host nginx가 이미 처리하므로 여기서는 불필요(default.conf와의 차이점).

upstream spring_backend {
    server 127.0.0.1:9100;
}

server {
    # 127.0.0.1 명시 — host-net라 0.0.0.0면 다른 사이트 컨테이너에서도 접근 가능(defense-in-depth,
    # host nginx가 127.0.0.1:8100으로만 프록시하므로 loopback으로 충분. 리뷰 P2)
    listen 127.0.0.1:8100;
    server_name _;

    # 기본 보안 헤더(HSTS/CSP는 host nginx TLS 계층에서 관리 — 이 PR 범위 아님)
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # FastAPI(/ai/)는 외부 공개 폐쇄(A안 3/3, #235) — 이 컨테이너 폴백 경로도 제거.
    # 스프링 `/api/ai/*` 프록시가 내부에서 127.0.0.1:8101(fastapi)로만 호출하므로 공개 경로 불필요.
    # (운영 host nginx의 `/ai/`→127.0.0.1:8101 location 제거는 배포 후 사람이 별도 수행 — 레포 밖.)

    # Spring REST API
    location /api/ {
        proxy_pass http://spring_backend/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Spring OAuth2 소셜 로그인 콜백(redirection endpoint) — 인가 엔드포인트는 /api/auth/oauth2 로
    # 커스텀됐지만 콜백은 Spring 기본 /login/oauth2/code/* 라 /api 프록시 밖으로 새어 SPA(404)로 가던 것을
    # 백엔드로 전달한다. /login(SPA 로그인 페이지)은 이 규칙(/login/oauth2/)보다 덜 구체적이라 그대로 SPA로 감.
    location /login/oauth2/ {
        proxy_pass http://spring_backend/login/oauth2/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Spring WebSocket(STOMP 상담) — Upgrade/Connection 헤더 필수
    location /ws/ {
        proxy_pass http://spring_backend/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
    }

    # React SPA 정적 서빙 + 클라이언트 라우팅 폴백
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
