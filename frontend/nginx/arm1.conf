# HajaCheck nginx — arm1(공유 호스트) 전용 (이슈 #104 → #258로 bridge 전환)
# 이 컨테이너는 bridge-net(hajacheck-net) 안에서 컨테이너 내부 80을 리슨하고, 호스트에는
# 127.0.0.1:8100→80으로 publish된다(공유 호스트 nginx가 80/443에서 TLS 종료 후
# `/`→127.0.0.1:8100으로 프록시하는 것과 짝을 이룸 — 그 nginx.conf는 이 PR에서 건드리지 않는다).
# bridge-net이라 서비스명 DNS가 살아있어 upstream은 spring 서비스명:8080을 사용.
# certbot ACME 경로는 host nginx가 이미 처리하므로 여기서는 불필요(default.conf와의 차이점).

upstream spring_backend {
    server spring:8080;
}

server {
    # 컨테이너 내부 80 리슨(호스트 publish는 compose의 127.0.0.1:8100:80이 담당 — defense-in-depth,
    # 컨테이너 자체는 0.0.0.0:80이어도 bridge-net 내부에서만 도달 가능하고 호스트 노출은 127.0.0.1로 제한됨)
    listen 80;
    server_name _;

    # 기본 보안 헤더(HSTS/CSP는 host nginx TLS 계층에서 관리 — 이 PR 범위 아님)
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # FastAPI(/ai/)는 외부 공개 폐쇄(A안 3/3, #235) — 이 컨테이너 폴백 경로도 제거.
    # 스프링 `/api/ai/*` 프록시가 bridge-net 내부에서 fastapi:8000(서비스명)으로만 호출하므로
    # 공개 경로 불필요. fastapi는 이 compose에서 더 이상 host 포트를 publish하지 않는다.
    # (운영 host nginx의 `/ai/`→127.0.0.1:8101 location 제거는 배포 후 사람이 별도 수행 — 레포 밖.)

    # Spring REST API
    location /api/ {
        proxy_pass http://spring_backend/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Spring OAuth2 소셜 로그인 콜백(redirection endpoint) — 인가 엔드포인트는 /api/auth/oauth2 로
    # 커스텀됐지만 콜백은 Spring 기본 /login/oauth2/code/* 라 /api 프록시 밖으로 새어 SPA(404)로 가던 것을
    # 백엔드로 전달한다. /login(SPA 로그인 페이지)은 이 규칙(/login/oauth2/)보다 덜 구체적이라 그대로 SPA로 감.
    location /login/oauth2/ {
        proxy_pass http://spring_backend/login/oauth2/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Spring WebSocket(STOMP 상담) — Upgrade/Connection 헤더 필수
    location /ws/ {
        proxy_pass http://spring_backend/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
    }

    # React SPA 정적 서빙 + 클라이언트 라우팅 폴백
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
