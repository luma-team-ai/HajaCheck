# HajaCheck nginx — 로컬 개발 전용 conf (#311)
#
# default.conf 와의 유일한 차이: `location /` 이 dist 정적 서빙이 아니라 frontend-dev(vite)를 프록시한다.
# 목적은 "진입점을 80 하나로 통일"이다.
#
# 왜 필요한가 — 개발 스택엔 프론트가 둘이었다:
#   - 80(nginx)   = 이미지에 구운 dist. --build 해야 반영. 프로덕션 빌드(DEV=false → MSW 존재 불가)
#   - 5173(vite)  = 소스 bind mount + HMR. 저장 즉시 반영. dev 빌드(DEV=true → MSW 기본 켜짐)
# 소셜 로그인 착지(APP_OAUTH2_SUCCESS_REDIRECT)는 고정값이어야 하는데(Host 유도는 poisoning 취약,
# #194 계약) 진입점이 둘이라 어느 값을 넣어도 한쪽은 다른 앱으로 튕겼다 — 그 틈으로 #302(로그인 무한
# 루프)가 터졌다. 80 자리에서 dist 대신 vite 를 서빙하면 진입점이 하나가 되어 튕김 자체가 사라진다.
#
# 이 파일은 override.yml 이 bind mount 로 얹는다(이미지 재빌드 불필요).
# dist 를 검증하려면(배포 직전) override 를 빼고 띄우면 default.conf 가 그대로 쓰인다:
#   COMPOSE_FILE=docker-compose.yml docker compose up -d --build nginx
#
# ⚠️ default.conf / arm1.conf 는 운영·arm1 이 쓰는 파일이므로 절대 이 내용을 옮기지 말 것.

upstream spring_backend {
    server spring:8080;
}

# vite dev 서버(HMR) — 로컬 개발에만 존재하는 서비스(docker-compose.override.yml)
upstream vite_dev {
    server frontend-dev:5173;
}

server {
    listen 80;
    server_name _;

    # 스택 모드 카나리아(#357) — 이 헤더가 있으면 nginx 가 dev.conf(vite 프록시)로 떴다는 뜻.
    # 오버레이를 놓쳐 base default.conf(프로덕션 dist 정적 서빙)로 오염되면 이 헤더가 사라진다.
    # 한 줄로 판별: `curl -sI http://localhost | grep -i x-hajacheck-stack`
    #   → dev 나오면 정상 / 아무것도 안 나오면 프로덕션 dist 모드(오염) → 전체 오버레이로 nginx 재생성.
    # default.conf(프로덕션)에는 이 헤더를 넣지 않는다 — "있음=dev / 없음=prod-dist" 로 구분되게.
    add_header X-HajaCheck-Stack dev always;

    # 기본 보안 헤더 — default.conf 와 동일하게 유지(로컬에서도 같은 조건으로 개발)
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Spring REST API
    location /api/ {
        proxy_pass http://spring_backend/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # nginx 기본값(1MB)이 Spring의 multipart.max-request-size(205MB, application.yml —
        # 점검 미디어 다중 업로드 maxFilesPerRequest(10)×maxSizeBytes(20MB) 기준)보다 훨씬 작아,
        # 이미지 여러 장을 올리면 nginx가 Spring에 닿기도 전에 413으로 끊어버린다(#dev-05-03 실측).
        # 프론트는 이 413을 구분 없이 "네트워크 오류"로만 보여줘 원인을 알기 어려웠다 — Spring 쪽
        # 상한과 맞춰 통과시킨다.
        client_max_body_size 205m;
    }

    # Spring OAuth2 소셜 로그인 콜백 — default.conf 와 동일(콜백은 Spring 기본 /login/oauth2/code/* 라
    # /api 프록시 밖으로 새어 SPA 로 가던 것을 백엔드로 전달). /login(SPA 로그인 페이지)은 이 규칙보다
    # 덜 구체적이라 그대로 SPA(= 아래 location /)로 간다.
    location /login/oauth2/ {
        proxy_pass http://spring_backend/login/oauth2/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Spring WebSocket(STOMP 상담) — Upgrade/Connection 헤더 필수
    location /ws/ {
        proxy_pass http://spring_backend/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
    }

    # ── default.conf 와 다른 유일한 지점 ──────────────────────────────
    # dist 정적 서빙 대신 vite dev 서버를 프록시한다.
    # try_files 폴백이 없는 이유: SPA 라우팅 폴백은 vite 가 자체 처리한다(historyApiFallback).
    location / {
        proxy_pass http://vite_dev;

        # vite HMR 웹소켓(/@vite/client 가 여는 연결) — 이게 없으면 화면은 떠도 저장 시
        # 자동 갱신이 안 된다(수동 새로고침 필요). /ws/ 규칙과 동일 패턴.
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # HMR 웹소켓이 유휴 상태로 끊기지 않도록(기본 60s면 개발 중 조용할 때 끊긴다)
        proxy_read_timeout 3600s;
    }
}
